<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育アプリ</title>
    <meta name="description" content="大阪市の現役小学校教員が制作した、面倒な登録不要で使える無料教育アプリ集「ota tools」。小学校の授業や家庭学習に最適な知育・教育ゲームを多数公開しています。PC・タブレット・スマホ対応。">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ota tools",
      "operatingSystem": "Web",
      "applicationCategory": "EducationalApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      },
      "author": {
        "@type": "Person",
        "name": "太田圭一"
      },
      "description": "大阪市の現役小学校教員が制作した、授業や家庭学習で使える無料の教育・学習用アプリ集です。",
      "audience": {
        "@type": "Audience",
        "audienceType": "小学校教員, 児童, 保護者"
      }
    }
    </script>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect } = React;

        const Header = () => {
            return (
                <header className="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/60 shadow-lg">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-20">
                            {/* h1はページ内に1つにするため、ここはdivに変更 */}
                            <a href="https://otatools.github.io/toolbox/" className="flex items-center gap-4 group cursor-pointer hover:no-underline">
                                <div className="relative flex items-center justify-center w-12 h-12 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl shadow-lg shadow-blue-500/20 transform transition-all duration-300 group-hover:scale-105 group-hover:rotate-3">
                                    <i data-lucide="wrench" className="w-6 h-6 text-white absolute"></i>
                                    <div className="absolute inset-0 bg-white/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                </div>
                                <div className="flex flex-col">
                                    <div className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400 tracking-tight">
                                        ota tools
                                    </div>
                                    <span className="text-[10px] font-bold tracking-widest text-blue-400 uppercase mt-0.5">
                                        Educational Toolkit
                                    </span>
                                </div>
                            </a>
                        </div>
                    </div>
                </header>
            );
        };

        const App = () => {
            // アイコンの描画をReactのマウント後に行う
            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen bg-slate-950 font-sans selection:bg-blue-500/30 overflow-hidden relative flex flex-col">
                    
                    {/* 背景のネオンエフェクト（元サイトを踏襲） */}
                    <div className="fixed inset-0 z-0 pointer-events-none">
                        <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] mix-blend-screen"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-600/10 rounded-full blur-[120px] mix-blend-screen"></div>
                        <div className="absolute top-[40%] left-[50%] w-[30%] h-[30%] bg-indigo-600/10 rounded-full blur-[100px] mix-blend-screen transform -translate-x-1/2 -translate-y-1/2"></div>
                    </div>

                    <Header />

                    {/* メインコンテンツ */}
                    <main className="relative z-10 flex-grow flex items-center justify-center p-4 sm:p-8">
                        <div className="max-w-4xl w-full">
                            
                            {/* グラスモーフィズムカード */}
                            <div className="bg-slate-900/40 backdrop-blur-2xl border border-slate-800/60 rounded-[2rem] p-[clamp(1.5rem,5vw,4rem)] shadow-2xl relative overflow-hidden group">
                                
                                {/* カード内の装飾 */}
                                <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-blue-500/10 to-transparent rounded-bl-full transition-transform duration-700 group-hover:scale-110 pointer-events-none"></div>
                                <div className="absolute bottom-0 left-0 w-48 h-48 bg-gradient-to-tr from-cyan-500/10 to-transparent rounded-tr-full transition-transform duration-700 group-hover:scale-110 pointer-events-none"></div>

                                <div className="relative z-10 flex flex-col items-center text-center space-y-[clamp(1.5rem,4vw,2.5rem)]">
                                    
                                    {/* アイコン */}
                                    <div className="inline-flex items-center justify-center p-[clamp(1rem,2vw,1.25rem)] bg-slate-800/50 rounded-3xl border border-slate-700/50 shadow-inner">
                                        <i data-lucide="graduation-cap" className="w-[clamp(2.5rem,5vw,3rem)] h-[clamp(2.5rem,5vw,3rem)] text-blue-400"></i>
                                    </div>

                                    {/* SEOを意識した見出し(H1~H3)エリア */}
                                    <div className="max-w-3xl flex flex-col items-center gap-[clamp(1rem,2vw,1.5rem)]">
                                        {/* H1: ページ最重要キーワード */}
                                        <h1 className="text-[clamp(1.5rem,4vw+0.5rem,3rem)] font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-100 to-slate-400 leading-tight pb-2 break-keep">
                                            <span className="inline-block">小学校の授業や家庭学習で使える</span>
                                            <wbr/>
                                            <span className="inline-block">無料教育アプリ集</span>
                                        </h1>
                                        
                                        {/* H2: サブキーワード */}
                                        <h2 className="text-[clamp(1.1rem,2vw+0.5rem,1.5rem)] font-bold text-blue-400 break-keep">
                                            学びを遊びに。知育・教育ゲームを多数公開
                                        </h2>

                                        {/* H3: 補足・詳細キーワード */}
                                        <h3 className="text-[clamp(0.9rem,1.5vw+0.5rem,1.25rem)] text-slate-400 leading-relaxed font-medium break-keep">
                                            <span className="font-bold">ota tools</span> は、大阪市の現役小学校教員が制作した学習ツールです。<br />
                                            面倒な登録なしで、ブラウザから誰でもすぐに遊んで学べます。
                                        </h3>
                                    </div>

                                    {/* アプリ集へ飛ぶボタン */}
                                    <div className="pt-4 w-full sm:w-auto">
                                        <a 
                                            href="https://otatools.github.io/toolbox/"
                                            className="group relative flex w-full sm:inline-flex items-center justify-center gap-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-10 py-5 rounded-full font-bold text-lg overflow-hidden transition-all duration-300 hover:scale-105 shadow-[0_0_40px_rgba(59,130,246,0.3)] hover:shadow-[0_0_60px_rgba(59,130,246,0.5)] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-900"
                                        >
                                            <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                                            <span className="relative z-10">アプリ集を使ってみる</span>
                                            <i data-lucide="arrow-right" className="relative z-10 w-6 h-6 transition-transform group-hover:translate-x-1"></i>
                                        </a>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </main>

                    {/* フッター */}
                    <footer className="relative z-10 py-8 text-center border-t border-slate-800/40 mt-auto bg-slate-950/50">
                        <p className="text-slate-500 text-sm font-medium tracking-wide">
                            &copy; {new Date().getFullYear()} ota tools. All rights reserved.
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
