<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育アプリ｜魔法陣パズル</title>
    <meta name="description" content="小学校５年算数科に出てくる魔法陣への興味関心に役立つ大阪市の現役小学校教員が制作したアプリです。ota toolsのアプリの１つです。">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ota tools",
      "operatingSystem": "Web",
      "applicationCategory": "EducationalApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      },
      "author": {
        "@type": "Person",
        "name": "太田圭一"
      },
      "description": "大阪市の現役小学校教員が制作した、授業や家庭で使える無料の教育・学習用アプリです。",
      "audience": {
        "@type": "Audience",
        "audienceType": "小学校教員, 児童, 保護者"
      }
    }
    </script> 
    
    <!-- Google Fonts ロード -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* アイコン(Font Awesome)を保護しつつ、それ以外のすべての要素に M PLUS Rounded 1c を強力に完全適用 */
        *:not(i):not([class*="fa-"]) {
            font-family: 'M PLUS Rounded 1c', sans-serif !important;
            font-weight: 900;
        }

        /* フッタークレジットは太字を解除して、すっきりと見やすく表示する */
        #title-footer {
            font-weight: 500 !important;
        }

        body {
            background-color: #f8fafc;
            transition: background-color 0.5s ease;
        }

        /* 標準のフォーカス、ハイライト等を削除 */
        * {
            outline: none !important;
            -webkit-focus-ring-color: transparent !important;
            -webkit-tap-highlight-color: transparent !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        button, .btn-3d, .key-pad-btn, [onclick], #board div, #delete-pad button {
            touch-action: manipulation !important;
        }

        button, div, svg, span, h1, h2, h3, p, i {
            cursor: default;
        }

        button, 
        .btn-3d, 
        .cursor-pointer, 
        [onclick],
        [onclick] *,
        button * {
            cursor: pointer !important;
        }

        .cursor-default,
        .cursor-default * {
            cursor: default !important;
        }

        /* タイトルロゴを画面幅制限に関わらず、確実に超特大（96px）で描画 (PC用基準) JSでスマホ時に上書きされます */
        #title-main {
            font-size: 96px;
            line-height: 1.1;
            display: block;
            transition: font-size 0.2s ease, line-height 0.2s ease;
        }

        /* 3Dボタンの立体感と押し込み演出 */
        .btn-3d {
            transition: transform 0.04s ease, opacity 0.04s ease;
        }
        .btn-3d:active {
            transform: scale(0.96) !important;
            filter: brightness(0.92);
        }

        .key-pad-btn {
            transition: background-color 0.03s, border-color 0.03s, color 0.03s;
            cursor: pointer !important;
        }
        .key-pad-btn:active:not(:disabled) {
            transform: scale(0.96);
            filter: brightness(1.2) contrast(0.95);
        }

        .key-selected-normal {
            background-color: #4f46e5 !important;
            color: #ffffff !important;
            border: 4px solid #4f46e5 !important;
        }
        .key-selected-underworld {
            background-color: #ef4444 !important;
            color: #ffffff !important;
            border: 4px solid #fecdd3 !important;
        }

        /* セル選択時の美しいアニメーションとグロー効果 */
        @keyframes selectedPulse {
            0%, 100% { border-color: #4f46e5; box-shadow: 0 0 10px rgba(79, 70, 229, 0.4), inset 0 2px 5px rgba(0,0,0,0.1); }
            50% { border-color: #4f46e5; box-shadow: 0 0 20px rgba(79, 70, 229, 0.8), inset 0 2px 5px rgba(0,0,0,0.15); }
        }
        .cell-selected-normal {
            animation: selectedPulse 1s infinite ease-in-out !important;
            background-color: #f8fafc !important; 
            border-style: solid !important;
        }

        @keyframes selectedPulseUnderworld {
            0%, 100% { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5), inset 0 2px 6px rgba(0,0,0,0.5); }
            50% { border-color: #ec7299; box-shadow: 0 0 25px rgba(236, 114, 153, 1), inset 0 2px 6px rgba(0,0,0,0.6); }
        }
        .cell-selected-underworld {
            animation: selectedPulseUnderworld 0.9s infinite ease-in-out !important;
            background-color: rgba(220, 38, 38, 0.25) !important;
            border-style: solid !important;
        }

        /* 通常モードのアニメーション背景 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #8fd3f4, #84fab0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        .animated-bg::before {
            content: "";
            position: fixed;
            top: -10px; left: -10px; width: calc(100vw + 20px); height: calc(100vh + 20px);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        /* 裏モード(ダークテーマ)の妖しい炎とグロー背景 */
        @keyframes fireGradientBG {
            0% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
            100% { background-position: 50% 0%; }
        }
        @keyframes flameWobble {
            0%, 100% { transform: scale(1) translateY(0) rotate(0deg); opacity: 0.35; }
            50% { transform: scale(1.1) translateY(-12px) rotate(2deg); opacity: 0.55; }
        }
        .dark-mode-bg {
            background: linear-gradient(180deg, #100118, #280205, #550404, #180026) !important;
            background-size: 100% 300% !important;
            animation: fireGradientBG 10s ease infinite !important;
            position: relative;
            overflow: hidden;
        }
        .dark-mode-bg::before {
            content: "" !important;
            position: fixed !important;
            bottom: -15%;
            left: -10%;
            width: 120%;
            height: 100%;
            background: radial-gradient(circle at 50% 100%, rgba(239, 68, 68, 0.45), rgba(168, 85, 247, 0.22) 50%, transparent 80%) !important;
            filter: blur(45px) !important;
            animation: flameWobble 6s ease-in-out infinite !important;
            pointer-events: none !important;
            z-index: 0 !important;
        }
        .dark-mode-bg::after {
            content: "" !important;
            position: fixed !important;
            bottom: -20%;
            right: -10%;
            width: 130%;
            height: 90%;
            background: radial-gradient(circle at 75% 100%, rgba(220, 38, 38, 0.35), rgba(236, 72, 153, 0.18) 45%, transparent 75%) !important;
            filter: blur(55px) !important;
            animation: flameWobble 8s ease-in-out infinite alternate !important;
            pointer-events: none !important;
            z-index: 0 !important;
        }

        /* 火の粉アニメーション */
        @keyframes floatSparks {
            0% { transform: translateY(110vh) translateX(0) scale(0.6); opacity: 0; }
            15% { opacity: 0.85; }
            85% { opacity: 0.85; }
            100% { transform: translateY(-10vh) translateX(40px) scale(0.3); opacity: 0; }
        }
        .spark {
            position: fixed;
            bottom: -30px;
            background: radial-gradient(circle, rgba(244,63,94,1) 0%, rgba(249,115,22,0.85) 40%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(0.5px);
            animation: floatSparks 10s linear infinite;
            display: none;
        }
        .dark-mode-bg .spark {
            display: block;
        }

        /* 浮遊・揺れ・出現アニメーション */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px) rotate(-2deg); }
            40% { transform: translateX(6px) rotate(2deg); }
            60% { transform: translateX(-6px) rotate(-2deg); }
            80% { transform: translateX(6px) rotate(2deg); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pop {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #fcd34d;
            animation: confetti-fall 3s linear infinite;
        }

        /* 限界まで大きく広がるレスポンシブボード設計 */
        .puzzle-board-size {
            width: 100%;
            max-width: min(90vw, 36vh); /* モバイル時は1画面(縦並び)に完璧に収まるよう36vh以下に設定 */
            transition: max-width 0.3s ease;
        }
        @media (min-width: 768px) {
            .puzzle-board-size {
                /* PCなどの横長画面(MD以上)では最大530pxまで大きく表示 */
                max-width: 530px !important;
            }
        }

        @keyframes glitch {
            0% { text-shadow: 2px -2px 0 #ff0055, -2px 2px 0 #00ffcc, 0 0 8px rgba(239,68,68,0.7); }
            25% { text-shadow: -2px 2px 0 #ff0055, -2px -2px 0 #00ffcc, 0 0 12px rgba(239,68,68,0.7); }
            50% { text-shadow: 2px 2px 0 #ff0055, -2px -2px 0 #00ffcc, 0 0 8px rgba(239,68,68,0.7); }
            75% { text-shadow: -2px -2px 0 #ff0055, 2px 2px 0 #00ffcc, 0 0 12px rgba(239,68,68,0.7); }
            100% { text-shadow: 2px -2px 0 #ff0055, -2px 2px 0 #00ffcc, 0 0 8px rgba(239,68,68,0.7); }
        }
        .glitch-text {
            animation: glitch 1s infinite linear;
        }

        #corruption-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            pointer-events: none;
        }

        /* ================= ブラウン管（CRT）テレビ起動風アニメーション ================= */
        @keyframes crtOn {
            0% {
                transform: scaleX(0) scaleY(0.005);
                filter: brightness(12) contrast(3) saturate(2);
                opacity: 0;
            }
            15% {
                transform: scaleX(1) scaleY(0.005);
                filter: brightness(12) contrast(3) saturate(2);
                opacity: 1;
            }
            45% {
                transform: scaleX(1) scaleY(0.008);
                filter: brightness(10) contrast(3) saturate(2);
                opacity: 1;
            }
            55% {
                transform: scaleX(1) scaleY(1.15);
                filter: brightness(5) contrast(2.5) saturate(1.8);
            }
            70% {
                transform: scaleX(1) scaleY(0.92);
                filter: brightness(2.5) contrast(1.8) saturate(1.5);
            }
            82% {
                transform: scaleX(1) scaleY(1.03) translateY(-3px);
                filter: brightness(1.6) contrast(1.3);
            }
            92% {
                transform: scaleX(1) scaleY(0.99) translateY(1px);
                filter: brightness(1.1) contrast(1.05);
            }
            100% {
                transform: scaleX(1) scaleY(1) translateY(0);
                filter: brightness(1) contrast(1);
                opacity: 1;
            }
        }
        
        /* 相似スケール枠に干渉せず、内側のコンテンツだけを「ブンッ！」と綺麗に起動させるための専用クラス */
        .crt-on-effect {
            animation: crtOn 0.68s cubic-bezier(0.23, 1, 0.32, 1) forwards !important;
            transform-origin: center center !important;
        }

        /* メインコンテナの絶対中央配置 (Flexboxの拡大縮小前サイズ干渉バグを完全に防ぐ) */
        #app-container {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1);
            transform-origin: center center !important;
        }
    </style>
</head>
<body id="main-body" class="animated-bg h-screen w-screen overflow-hidden flex items-center justify-center p-2 sm:p-4 text-slate-800 box-border relative">

    <!-- 動的バックグラウンドの火の粉 -->
    <div class="spark" style="left: 8%; width: 7px; height: 7px; animation-duration: 9s; animation-delay: 0s;"></div>
    <div class="spark" style="left: 20%; width: 11px; height: 11px; animation-duration: 11s; animation-delay: 1.5s;"></div>
    <div class="spark" style="left: 35%; width: 6px; height: 6px; animation-duration: 7.5s; animation-delay: 3s;"></div>
    <div class="spark" style="left: 48%; width: 9px; height: 9px; animation-duration: 10s; animation-delay: 0.5s;"></div>
    <div class="spark" style="left: 62%; width: 13px; height: 13px; animation-duration: 13s; animation-delay: 2s;"></div>
    <div class="spark" style="left: 78%; width: 8px; height: 8px; animation-duration: 8.5s; animation-delay: 4s;"></div>
    <div class="spark" style="left: 90%; width: 10px; height: 10px; animation-duration: 11s; animation-delay: 5s;"></div>
    <div class="spark" style="left: 14%; width: 12px; height: 12px; animation-duration: 12.5s; animation-delay: 2.5s;"></div>
    <div class="spark" style="left: 28%; width: 8px; height: 8px; animation-duration: 9.5s; animation-delay: 6s;"></div>
    <div class="spark" style="left: 42%; width: 5px; height: 5px; animation-duration: 6s; animation-delay: 1.2s;"></div>
    <div class="spark" style="left: 56%; width: 10px; height: 10px; animation-duration: 10.5s; animation-delay: 4.8s;"></div>
    <div class="spark" style="left: 70%; width: 7px; height: 7px; animation-duration: 8s; animation-delay: 3.2s;"></div>
    <div class="spark" style="left: 84%; width: 12px; height: 12px; animation-duration: 14s; animation-delay: 0.8s;"></div>

    <!-- デバッグ用隠しボタン -->
    <button onclick="debugForceClear()" class="absolute top-2 left-2 z-50 opacity-10 hover:opacity-100 bg-black/50 text-white rounded p-1 text-[10px]" title="[デバッグ] 通常ステージをすべてクリア状態にする">⚙️</button>

    <!-- ダイナミックデジタル侵食スクリーン -->
    <div id="corruption-screen" class="fixed inset-0 z-50 hidden bg-transparent flex flex-col items-center justify-center text-center p-4">
        <canvas id="corruption-canvas"></canvas>
        <div class="relative z-50">
            <h1 id="corruption-text-1" class="text-rose-500 font-extrabold text-2xl sm:text-4xl md:text-5xl glitch-text mb-4 opacity-0 transition-opacity duration-300">SYSTEM OVERRIDE DETECTED...</h1>
            <p id="corruption-text-2" class="text-slate-400 font-bold text-xs sm:text-sm md:text-lg mb-8 opacity-0 transition-opacity duration-300">DOWNLOADING DIGITAL CHASM CORE SYSTEM...</p>
            <div id="corruption-progress-container" class="w-64 h-2 bg-slate-950 border border-rose-950 rounded-full mx-auto overflow-hidden opacity-0 transition-opacity duration-300">
                <div id="corruption-progress" class="w-0 h-full bg-rose-600 shadow-[0_0_8px_rgba(239,68,68,0.8)]" style="width: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- アプリのメインコンテナ (初期状態は opacity-0。JSの100%安全フィット制御により、PC・スマホそれぞれの比率に合わせて拡大縮小) -->
    <div id="app-container" class="absolute top-1/2 left-1/2 z-10 w-[1152px] h-[820px] max-w-none max-h-none bg-white/60 backdrop-blur-md rounded-2xl sm:rounded-[2rem] md:rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col border-[2px] sm:border-[3px] md:border-4 border-white/70 transition-all duration-300 opacity-0 flex-shrink-0">
        
        <!-- ブラウン管（CRT）起動風の二重レイヤーラッパー (アスペクト比維持と起動演出を完全に両立させる) -->
        <div id="app-crt-wrapper" class="w-full h-full flex flex-col relative">

            <!-- ================= タイトル画面 ================= -->
            <div id="screen-title" class="absolute inset-0 flex flex-col pt-4 px-4 pb-2 sm:pt-6 sm:px-6 sm:pb-3 md:pt-10 md:px-10 md:pb-4 z-20 transition-opacity duration-500 bg-transparent overflow-y-auto">
                <div class="flex-grow flex flex-col items-center justify-center py-2">
                    
                    <!-- タイトルロゴ -->
                    <div class="animate-float flex flex-col items-center mb-6 sm:mb-8 md:mb-12">
                        <h1 id="title-main" class="font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-500 tracking-wider drop-shadow-sm text-center leading-tight transition-all duration-500">
                            魔方陣パズル
                        </h1>
                        <!-- サブタイトルをPC版でダイナミックに大きく（md:text-3xl / 30px相当）表現 -->
                        <p id="title-sub" class="text-[10px] sm:text-xs md:text-3xl text-indigo-900 mt-4 sm:mt-6 font-black bg-white/60 px-3 sm:px-6 py-1 sm:py-2.5 rounded-full shadow-sm text-center transition-all duration-500">
                            縦・横・斜めの和を全てそろえよう！
                        </p>
                    </div>
                    
                    <!-- 難易度選択 (通常モード - 動的にスマホ時は横並び/大きく書き換えます) -->
                    <div id="title-difficulty-container" class="w-full max-w-5xl flex flex-col md:flex-row gap-3 sm:gap-4 md:gap-6 justify-center">
                        <button id="btn-diff-easy" onclick="showStageSelect('easy')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-emerald-400 hover:bg-emerald-300 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-emerald-600 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-black shadow-md flex flex-col items-center gap-1 sm:gap-2">
                            <span><i class="fa-solid fa-seedling"></i> 初級</span>
                            <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">ヒントいっぱい</span>
                        </button>
                        <button id="btn-diff-normal" onclick="showStageSelect('normal')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-blue-500 hover:bg-blue-400 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-blue-700 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-black shadow-md flex flex-col items-center gap-1 sm:gap-2">
                            <span><i class="fa-solid fa-fire"></i> 中級</span>
                            <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">ヒント3つ</span>
                        </button>
                        <button id="btn-diff-hard" onclick="showStageSelect('hard')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-rose-500 hover:bg-rose-400 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-rose-700 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-black shadow-md flex flex-col items-center gap-1 sm:gap-2">
                            <span><i class="fa-solid fa-skull"></i> 上級</span>
                            <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">究極の推理！</span>
                        </button>
                    </div>

                    <!-- 難易度選択 (裏モード - 動的にスマホ時は横並び/大きく書き換えます) -->
                    <div id="underworld-difficulty-container" class="w-full max-w-5xl flex-col md:flex-row gap-3 sm:gap-4 md:gap-6 justify-center hidden">
                        <button id="btn-diff-super" onclick="showStageSelect('super')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-red-950/60 hover:bg-red-900/40 text-red-400 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-black shadow-[0_0_15px_rgba(220,38,38,0.3)] flex flex-col items-center gap-1 sm:gap-2 border-[2px] border-b-[6px] sm:border-b-[8px] border-red-900">
                            <span><i class="fa-solid fa-dragon animate-pulse"></i> 超級</span>
                            <span class="text-[10px] sm:text-xs md:text-base font-bold bg-black/30 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full border border-red-900/30">ヒント：10〜8</span>
                        </button>
                        <button id="btn-diff-oni" onclick="showStageSelect('oni')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-purple-950/60 hover:bg-purple-900/40 text-purple-400 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-black shadow-[0_0_15px_rgba(147,51,234,0.3)] flex flex-col items-center gap-1 sm:gap-2 border-[2px] border-b-[6px] sm:border-b-[8px] border-purple-900">

        function getDigitHtml(num, is4x4 = false) {
            if (num === 0) return '';
            const fillCol = "currentColor"; 
            
            // 4x4の裏モード時はセル自体の面積が小さいため、文字高さを64%に調整し、通常3x3モードでは72%で美しく表示する
            const heightClass = is4x4 ? "h-[64%]" : "h-[72%]";
            
            if (num <= 9) {
                // 1桁（1〜9）
                const path = svgPaths[num];
                return `
                    <svg viewBox="0 0 0.8 0.84" class="${heightClass} w-auto aspect-[8/8.4] max-w-[85%] max-h-full flex items-center justify-center transition-all duration-100" style="color: inherit; display: inline-block;">
                        <g transform="translate(0.04, 0.80) scale(1, -1)">
                            <path d="${path}" fill="${fillCol}" />
                        </g>
                    </svg>
                `;
            } else {
                // 2桁（10〜16）
                const tensPath = svgPaths[1];
                const onesPath = svgPaths[num % 10];
                
                // 1桁の数字と【高さ】【サイズ感】を完璧に揃えるため、一切の比率縮小を排除して「等倍 scale(1, -1)」に統一
                // 全体を左寄りにシフト（右寄り偏りの完全解消）しつつ、一の位の形状に合わせ美しい間隔になるようミリ単位で座標を個別マッピング（字間カーニング調整）
                let tensTranslateX = -0.08;
                let onesTranslateX = 0.32;

                if (num === 10) {
                    // 0は左右の膨らみがあるため、中心軸にピタッと揃う左寄り最適値に
                    tensTranslateX = -0.11;
                    onesTranslateX = 0.33;
                } else if (num === 11) {
                    // 「11」は1と1の間をしっかり離し、なおかつ右に偏らないように全体を程よく左にスライド
                    tensTranslateX = -0.05;
                    onesTranslateX = 0.45;
                } else if (num === 12) {
                    // 2は下が広いため適正な位置に配置
                    tensTranslateX = -0.08;
                    onesTranslateX = 0.32;
                } else if (num === 13) {
                    // 3は左側に大きくふくらむため、十の位の「1」とぶつからないよう右へシフト
                    tensTranslateX = -0.08;
                    onesTranslateX = 0.32;
                } else if (num === 14) {
                    // 4は横幅が広いため最適な間隔に
                    tensTranslateX = -0.12;
                    onesTranslateX = 0.31;
                } else if (num === 15) {
                    // 5は上が左へ出っ張るため「1」との間隔を確保
                    tensTranslateX = -0.05;
                    onesTranslateX = 0.33;
                } else if (num === 16) {
                    // 6は左側の膨らみがあるため間隔をマージ
                    tensTranslateX = -0.08;
                    onesTranslateX = 0.32;
                }
                
                // viewBoxを適正な 1.15 に固定し、2桁を等倍でプロ並みに美しく整列
                return `
                    <svg viewBox="0 0 1.15 0.84" class="${heightClass} w-auto aspect-[11.5/8.4] max-w-[95%] max-h-full flex items-center justify-center transition-all duration-100" style="color: inherit; display: inline-block;">
                        <!-- 十の位の「1」 (高さ基準・ベースラインを1桁と100%同一に同期) -->
                        <g transform="translate(${tensTranslateX}, 0.80) scale(1, -1)">
                            <path d="${tensPath}" fill="${fillCol}" />
                        </g>
                        <!-- 一の位 (高さ基準・ベースラインを1桁と100%同一に同期) -->
                        <g transform="translate(${onesTranslateX}, 0.80) scale(1, -1)">
                            <path d="${onesPath}" fill="${fillCol}" />
                        </g>
                    </svg>
                `;
            }

        function triggerUnderworldTransition() {
            const screen = document.getElementById('corruption-screen');
            const canvas = document.getElementById('corruption-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const progressEl = document.getElementById('corruption-progress');
            progressEl.style.width = '0%'; 

            document.getElementById('corruption-text-1').classList.add('opacity-0');
            document.getElementById('corruption-text-2').classList.add('opacity-0');
            document.getElementById('corruption-progress-container').classList.add('opacity-0');

            screen.classList.remove('hidden');

            setTimeout(() => {
                document.getElementById('corruption-text-1').classList.remove('opacity-0');
            }, 300);
            setTimeout(() => {
                document.getElementById('corruption-text-2').classList.remove('opacity-0');
            }, 1000);

            // ステータスバー（プログレスバー）が表示されるタイミング
            let barActive = false;
            setTimeout(() => {
                document.getElementById('corruption-progress-container').classList.remove('opacity-0');
                // バーが表示された「この瞬間」から0%スタートを検知させるためのトリガー
                barActive = true;
            }, 1800);

            // 進行率変数を「画面ハックの浸食度(visualProgress)」と「ステータスバーの進行度(barProgress)」に分離
            let visualProgress = 0;
            let barProgress = 0;

            const fontSize = 16;
            const columns = Math.floor(canvas.width / fontSize) + 1;
            const yPositions = Array(columns).fill(0).map(() => Math.random() * -canvas.height);
            const speeds = Array(columns).fill(0).map(() => Math.random() * 15 + 10);

            function drawMatrix(p) {
                const thresholdY = (p / 100) * canvas.height;

                ctx.clearRect(0, thresholdY, canvas.width, canvas.height - thresholdY);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.fillRect(0, 0, canvas.width, thresholdY);

                ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                const glitchHeight = 100;
                const startGlitchY = Math.max(0, thresholdY - 50);
                
                if (p < 95) {
                    for (let i = 0; i < 8; i++) {
                        const x = Math.random() * canvas.width;
                        const y = startGlitchY + Math.random() * glitchHeight;
                        const w = Math.random() * 200 + 50;
                        const h = Math.random() * 15 + 3;
                        ctx.fillRect(x, y, w, h);
                    }
                }

                ctx.fillStyle = p > 50 ? '#ef4444' : '#10b981';
                ctx.font = `900 ${fontSize}px 'M PLUS Rounded 1c', sans-serif`;

                yPositions.forEach((y, index) => {
                    const x = index * fontSize;
                    const maxAllowedY = thresholdY + 80;

                    if (y > 0 && y < maxAllowedY && y < canvas.height + 50) {
                        const text = String.fromCharCode(Math.floor(Math.random() * 93) + 33);
                        ctx.fillText(text, x, y);
                    }

                    yPositions[index] = y + speeds[index];

                    if (yPositions[index] > Math.min(canvas.height + 50, maxAllowedY)) {
                        if (p < 92) {
                            yPositions[index] = Math.random() * -100;
                        } else {
                            yPositions[index] = 99999; 
                        }
                    }
                });
            }

            const interval = setInterval(() => {
                // 1. 侵食演出はクリック後、即座にスムーズに進行する（元の侵食速度を100%維持）
                if (visualProgress < 100) {
                    visualProgress += 0.6; 
                    if (visualProgress > 100) visualProgress = 100;
                }
                
                // 2. ステータスバーは、コンテナが表示された瞬間に「0%」から一気に「グーン！」と伸び始める
                if (barActive) {
                    if (barProgress < 100) {
                        // 0%からグーンと伸びる加速緩急（気持ちよい速度感）
                        barProgress += 1.4; 
                        if (barProgress > 100) barProgress = 100;
                        progressEl.style.width = barProgress + '%';
                    }
                } else {
                    progressEl.style.width = '0%';
                }

                drawMatrix(visualProgress);

                // 侵食演出が完了し、かつステータスバーが100%に到達、且つ文字が流れきったら裏モードへ
                if (visualProgress >= 100 && barProgress >= 100) {
                    const allDropped = yPositions.every(y => y >= canvas.height + 50);
                    if (allDropped) {
                        clearInterval(interval);
                        
                        ctx.fillStyle = 'rgb(0, 0, 0)';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);

                        setTimeout(() => {
                            applyUnderworldTheme();
                            screen.classList.add('hidden');
                            
                            const finalProgressEl = document.getElementById('corruption-progress');
                            finalProgressEl.style.width = '0%';
                            document.getElementById('corruption-text-1').classList.add('opacity-0');
                            document.getElementById('corruption-text-2').classList.add('opacity-0');
                            document.getElementById('corruption-progress-container').classList.add('opacity-0');

                            showTitle();
                        }, 500);
                    }
                }
            }, 30);
        }

        function backToStageSelect() {
            modalClear.classList.add('hidden');
            modalClear.classList.remove('opacity-100');

            showStageSelect(currentDifficulty);
        }

        function startGame(stageIdx) {
            currentStageIdx = stageIdx;
            screenStages.classList.add('hidden');
            screenGame.classList.remove('hidden');
            
            document.getElementById('game-title').innerText = `ステージ ${stageIdx + 1}`;
            hideError();
            
            boardEl.classList.remove('shake');
            
            const stageData = STAGE_DATA[currentDifficulty][stageIdx];
            const solution = SOLUTIONS[stageData.solIdx];
            
            board = Array(9).fill(0);
            lockedCells = [...stageData.hints];
            
            lockedCells.forEach(idx => {
                board[idx] = solution[idx];
            });
            
            selectedNumber = null;
            selectedCell = null; 

            applyGameLayoutNormal();
            renderBoard();
            renderNumpad();

            setTimeout(adjustAppScale, 10);
        }

        function startUnderworldGame(stageIdx) {
            currentStageIdx = stageIdx;
            screenStages.classList.add('hidden');
            screenGame.classList.remove('hidden');

            const titleMap = { 'super': '超級', 'oni': '鬼級', 'god': '神級' };
            document.getElementById('game-title').innerText = `${titleMap[currentDifficulty]} ステージ ${stageIdx + 1}`;
            hideError();

            boardEl.classList.remove('shake');

            const stageData = UNDERWORLD_STAGE_DATA[currentDifficulty][stageIdx];
            const solution = SOLUTIONS_4X4[stageData.solIdx];
            board = Array(16).fill(0);
            lockedCells = [...stageData.hints];

            lockedCells.forEach(idx => {
                board[idx] = solution[idx];
            });

            selectedNumber = null;
            selectedCell = null; 

            applyGameLayoutUnderworld();
            renderBoard();
            renderNumpad();

            setTimeout(adjustAppScale, 10);
        }

            numpadEl.className = "grid grid-cols-3 grid-rows-3 gap-1.5 md:gap-3 aspect-square w-full bg-white p-2 md:p-3.5 rounded-[1.25rem] md:rounded-[2rem] border-[3px] md:border-4 border-[#f1f5f9] flex-shrink-0";

            const hCont = document.getElementById('game-title-container');
            hCont.className = "flex flex-col items-center justify-center bg-indigo-100 px-4 sm:px-6 md:px-8 py-1 rounded-xl sm:rounded-2xl border-[2px] border-indigo-200 pointer-events-auto shadow-sm";
            document.getElementById('game-title-sub').className = "text-indigo-500 text-[9px] sm:text-[10px] md:text-sm font-black leading-none mb-0.5";
            document.getElementById('game-title-sub').innerText = "パズル";
            document.getElementById('game-title').className = "text-base sm:text-lg md:text-2xl font-black text-indigo-700 tracking-wider leading-none";

            document.getElementById('reset-button').className = "btn-3d h-10 sm:h-12 px-2 sm:px-3 md:px-4 flex items-center justify-center gap-1 sm:gap-2 text-rose-500 bg-rose-100 hover:bg-rose-50 border-b-[3px] md:border-b-4 border-rose-300 rounded-xl sm:rounded-2xl text-[9px] sm:text-[10px] md:text-sm font-black shadow-sm z-10 flex-shrink-0";
        }

        function applyGameLayoutUnderworld() {
            boardEl.className = "grid grid-cols-4 grid-rows-4 gap-1.5 md:gap-3 aspect-square w-full bg-black/45 backdrop-blur-sm p-2 md:p-3.5 rounded-[1.25rem] md:rounded-[2rem] shadow-[inset_0_5px_12_rgba(0,0,0,0.65)] border-[3px] md:border-4 border-red-800/60 flex-shrink-0 relative overflow-hidden";
            numpadEl.className = "grid grid-cols-4 grid-rows-4 gap-1.5 md:gap-3 aspect-square w-full bg-black/25 p-2 md:p-3.5 rounded-[1.25rem] md:rounded-[2rem] border-[3px] md:border-4 border-red-900/40 flex-shrink-0";
            
            document.getElementById('game-back-button').className = "btn-3d w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-red-400 bg-red-950/60 hover:bg-red-900/40 border-b-[3px] md:border-b-4 border-red-900 rounded-xl sm:rounded-2xl text-lg sm:text-xl z-10 flex-shrink-0";

            document.getElementById('game-title-sub').className = "text-red-400 text-[9px] sm:text-[10px] md:text-sm font-black leading-none mb-0.5";

        function resetBoard() {
            if (underworldActive) {
                startUnderworldGame(currentStageIdx);
            } else {
                startGame(currentStageIdx);
            }
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            const size = underworldActive ? 16 : 9;
            
            if (board.includes(0)) {
                hideError(); 
            }

            for (let i = 0; i < size; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'w-full h-full aspect-square relative block';

                const cell = document.createElement('div');
                const val = board[i];
                const isLocked = lockedCells.includes(i);
                
                let classes = 'w-full h-full flex items-center justify-center rounded-xl sm:rounded-2xl select-none transition-all duration-75 ';
                
                if (isLocked) {
                    if (underworldActive) {
                        classes += 'bg-[#500a10] text-red-100 shadow-[inset_0_-2px_4px_rgba(0,0,0,0.4)] border border-[#851d25] cursor-default';
                    } else {
                        classes += 'bg-[#8ca0ba] text-white cursor-default shadow-[inset_0_-2px_4px_rgba(0,0,0,0.15)]';
                    }
                } else {
                    if (underworldActive) {
                        classes += 'bg-black/60 text-red-200 border-dashed border-[2.5px] border-red-750/70 hover:bg-red-950/40 cursor-pointer shadow-[inset_0_2px_6px_rgba(0,0,0,0.5)]';
                        if (selectedCell === i) {
                            classes += ' cell-selected-underworld';
                        }
                    } else {
                        classes += 'bg-white text-[#312e81] border-dashed border-[2.5px] border-[#cbd5e1] cursor-pointer hover:bg-slate-50';
                        if (selectedCell === i) {
                            classes += ' cell-selected-normal';
                        }
                    }

                    cell.onclick = () => {
                        if (isLocked) return;

                        if (selectedNumber !== null) {
                            board[i] = selectedNumber;
                            
                            if (selectedNumber !== 0) {
                                setTimeout(() => {
                                    const animCell = document.getElementById(`cell-${i}`);
                                    if(animCell) {
                                        animCell.classList.remove('pop');
                                        void animCell.offsetWidth;
                                        animCell.classList.add('pop');
                                    }
                                }, 10);
                            }
                            
                            selectedNumber = null;
                            selectedCell = null;
                            
                            renderBoard();
                            renderNumpad();
                            
                            if (!board.includes(0)) {
                                checkWin();
                            }
                        } else {
                            if (selectedCell === i) {
                                selectedCell = null;
                            } else {
                                selectedCell = i;
                            }
                            renderBoard();
                        }
                    };
                }
                
                cell.className = classes;
                if (val !== 0) {
                    cell.innerHTML = getDigitHtml(val, underworldActive);
                } else {
                    cell.innerHTML = '';
                }
                
                cell.id = `cell-${i}`;
                wrapper.appendChild(cell);
                boardEl.appendChild(wrapper);
            }
        }

        function renderNumpad() {
            numpadEl.innerHTML = '';
            const totalKeys = underworldActive ? 16 : 9;
            
            for (let i = 1; i <= totalKeys; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'w-full h-full aspect-square relative';

                const btn = document.createElement('button');
                const isUsed = board.includes(i);
                
                let classes = `w-full h-full rounded-xl sm:rounded-2xl select-none flex items-center justify-center transition-all duration-75 `;
                
                if (isUsed) {
                    if (underworldActive) {
                        classes += ' bg-[#280509] text-[#4d181e] cursor-not-allowed opacity-100 border-[#3d0b10] border-t border-x border-b-[4px] md:border-b-[6px]';
                    } else {
                        classes += ' bg-[#f1f5f9] text-[#cbd5e1] border-[2px] border-[#e2e8f0] cursor-not-allowed opacity-100';
                    }
                } else {
                    classes += ' key-pad-btn';
                    if (underworldActive) {
                        classes += ' border-t border-x border-b-[4px] md:border-b-[6px] bg-[#500a10] hover:bg-[#681017] text-red-100 border-[#851d25] border-b-[#3c050a] shadow-[0_4px_10px_rgba(0,0,0,0.3)]';
                        if (selectedNumber === i) {
                            classes += ' key-selected-underworld';
                        }
                    } else {
                        classes += ' border-[2px] border-b-[4px] md:border-b-[6px] bg-[#eef2ff] hover:bg-[#e0e7ff] text-[#312e81] border-[#a5b4fc] border-b-[#818cf8] shadow-sm';
                        if (selectedNumber === i) {
                            classes += ' key-selected-normal';
                        }
                    }
                }
                
                btn.className = classes;
                btn.innerHTML = getDigitHtml(i, underworldActive);
                btn.disabled = isUsed;
                btn.onclick = () => handleNumberInput(i);
                
                wrapper.appendChild(btn);
                numpadEl.appendChild(wrapper);
            }
            
            const deletePad = document.getElementById('delete-pad');
            if(deletePad) {
                deletePad.innerHTML = '';
                const delBtn = document.createElement('button');
                
                let delClasses = 'w-full py-2 sm:py-3 md:py-4.5 text-xs sm:text-sm md:text-2xl font-black rounded-xl sm:rounded-2xl transition-all duration-75 flex items-center justify-center gap-1 sm:gap-2 ';
                
                if (underworldActive) {
                    delClasses += ' border-t border-x border-b-[4px] md:border-b-[6px] bg-red-700 hover:bg-red-600 text-white border-red-900 border-b-red-950 shadow-md';
                    if (selectedNumber === 0) {
                        delClasses += ' key-selected-underworld';
                    }
                } else {
                    delClasses += ' border-[2px] border-b-[4px] md:border-b-[6px] bg-rose-50 hover:bg-rose-100 text-rose-600 border-rose-300 border-b-rose-400 shadow-sm';
                    if (selectedNumber === 0) {
                        delClasses += ' border-[4px] border-b-[6px] border-rose-600 border-b-rose-800 bg-rose-100';
                    }
                }
                delBtn.className = delClasses;
                delBtn.innerHTML = '<i class="fa-solid fa-eraser pointer-events-none"></i> 消す';
                delBtn.onclick = () => handleNumberInput(0);
                deletePad.appendChild(delBtn);
            }
        }

        function handleNumberInput(num) {
            if (selectedCell !== null) {
                board[selectedCell] = num;
                
                const animCell = document.getElementById(`cell-${selectedCell}`);
                if(animCell && num !== 0) {
                    animCell.classList.remove('pop');
                    void animCell.offsetWidth;
                    animCell.classList.add('pop');
                }
                
                selectedCell = null; 
                selectedNumber = null;
                
                renderBoard();
                renderNumpad();
                
                if (!board.includes(0)) {
                    checkWin();
                }
            } else {
                if (selectedNumber === num) {
                    selectedNumber = null;
                } else {
                    selectedNumber = num;
                }
                renderNumpad();
            }
        }

        function checkWin() {
            if (board.includes(0)) {
                return;
            }

            if (underworldActive) {
                const sums = [
                    board[0] + board[1] + board[2] + board[3],
                    board[4] + board[5] + board[6] + board[7],
                    board[8] + board[9] + board[10] + board[11],
                    board[12] + board[13] + board[14] + board[15],
                    board[0] + board[4] + board[8] + board[12],
                    board[1] + board[5] + board[9] + board[13],
                    board[2] + board[6] + board[10] + board[14],
                    board[3] + board[7] + board[11] + board[15],
                    board[0] + board[5] + board[10] + board[15],
                    board[3] + board[6] + board[9] + board[12]
                ];

                const isAll34 = sums.every(sum => sum === 34);
                const isUnique = new Set(board).size === 16;

                if (isAll34 && isUnique) {
                    saveClearStatus(currentDifficulty, currentStageIdx);
                    showUnderworldClearModal();
                } else {
                    document.getElementById('error-text').innerText = "和が34にならない列があるようだ…";
                    errorMsg.classList.remove('opacity-0');
                    boardEl.classList.remove('shake');
                    void boardEl.offsetWidth;
                    boardEl.classList.add('shake');
                }

            } else {
                const sums = [
                    board[0] + board[1] + board[2],
                    board[3] + board[4] + board[5],
                    board[6] + board[7] + board[8],
                    board[0] + board[3] + board[6],
                    board[1] + board[4] + board[7],
                    board[2] + board[5] + board[8],
                    board[0] + board[4] + board[8],
                    board[2] + board[4] + board[6]
                ];
                
                const isAll15 = sums.every(sum => sum === 15);
                const isUnique = new Set(board).size === 9; 

                if (isAll15 && isUnique) {
                    saveClearStatus(currentDifficulty, currentStageIdx);

                    createConfetti();
                    setTimeout(() => {
                        applyNormalClearModalStyle();
                        modalClear.classList.remove('hidden');
                        setTimeout(() => {
                            modalClear.classList.add('opacity-100');
                            modalContent.classList.remove('scale-90');
                            modalContent.classList.add('scale-100');
                        }, 50);
                    }, 300);
                } else {
                    document.getElementById('error-text').innerText = "合計が15にならない列があるよ！";
                    errorMsg.classList.remove('opacity-0');
                    boardEl.classList.remove('shake');
                    void boardEl.offsetWidth;
                    boardEl.classList.add('shake');
                }
            }
        }

        function applyNormalClearModalStyle() {
            modalContent.className = "bg-gradient-to-b from-yellow-50 to-white rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 w-full max-w-[350px] text-center shadow-[0_0_100px_rgba(250,204,21,0.5)] transform scale-90 transition-transform duration-500 relative border-[4px] md:border-[6px] border-yellow-300 mx-auto";

            document.getElementById('clear-modal-buttons').innerHTML = `

            clearSubline.className = "text-xs sm:text-sm font-black text-red-300 mb-4 sm:mb-6";

            document.getElementById('clear-modal-buttons').innerHTML = `
                <button onclick="nextStage()" class="btn-3d w-full py-3 bg-red-700 hover:bg-red-600 text-white font-black rounded-xl sm:rounded-2xl text-sm sm:text-base shadow-sm flex items-center justify-center gap-2 border-b-[4px] border-red-900">
                    NEXT DEEP REALM <i class="fa-solid fa-forward-step pointer-events-none"></i>
                </button>
                <button onclick="backToStageSelect()" class="btn-3d w-full py-2 bg-stone-900 hover:bg-stone-850 text-stone-400 font-black rounded-xl sm:rounded-2xl text-xs sm:text-sm shadow-sm border-b-[4px] border-stone-950">
                    SELECT OTHER REVERSE REALM
                </button>
            `;

            modalClear.classList.remove('hidden');
            setTimeout(() => {
                modalClear.classList.add('opacity-100');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            }, 50);
        }

        function hideError() {
            errorMsg.classList.add('opacity-0');
            boardEl.classList.remove('shake');
        }

        function nextStage() {
            modalClear.classList.add('hidden');
            modalClear.classList.remove('opacity-100');
            modalContent.classList.add('scale-90');
            modalContent.classList.remove('scale-100');
            confettiContainer.innerHTML = '';
            
            const maxIdx = underworldActive ? UNDERWORLD_STAGE_DATA[currentDifficulty].length : STAGE_DATA[currentDifficulty].length;

            if (currentStageIdx < maxIdx - 1) {
                if (underworldActive) {
                    startUnderworldGame(currentStageIdx + 1);
                } else {
                    startGame(currentStageIdx + 1);
                }
            } else {
                applyNormalClearModalStyle();
                showTitle();
            }
        }

        function createConfetti() {
            confettiContainer.innerHTML = '';
            const colors = ['#fcd34d', '#34d399', '#60a5fa', '#f472b6', '#a78bfa'];
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti rounded-sm md:rounded-md';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                confettiContainer.appendChild(conf);
            }
        }

        // アプリケーションをフォントロード完了後に安全に表示するフェードイン制御
        let appReady = false;
        function revealApp() {
            if (appReady) return;
            appReady = true;

            adjustAppScale();

            const container = document.getElementById('app-container');
            container.classList.remove('opacity-0');
            container.classList.add('opacity-100');
        }

        window.onload = function() {
            if (underworldActive) {
                applyUnderworldTheme();
            }
            checkAndShowUnderworldButton();

            if (document.fonts) {
                document.fonts.ready.then(revealApp);
                setTimeout(revealApp, 1000);
            } else {
                revealApp();
            }
        }
    </script>
