<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔方陣パズル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=M+PLUS+Rounded+1c:wght@700;800&display=swap');
        body {
            font-family: 'Fredoka', 'M PLUS Rounded 1c', sans-serif;
            background-color: #f8fafc;
        }

        /* 動く背景グラデーション */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #a18cd1, #fbc2eb, #8fd3f4, #84fab0);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* ぽよんと跳ねるアニメーション */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        /* 不正解時のシェイクアニメーション */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px) rotate(-2deg); }
            40% { transform: translateX(6px) rotate(2deg); }
            60% { transform: translateX(-6px) rotate(-2deg); }
            80% { transform: translateX(6px) rotate(2deg); }
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        /* 数字が入った時のポップアニメーション */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        .pop {
            animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* クリア時の紙吹雪 */
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #fcd34d;
            animation: confetti-fall 3s linear infinite;
        }

        /* 立体ボタンの押し込み用クラス */
        .btn-3d {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 transparent !important;
        }

        /* 画面サイズに合わせて絶対にはみ出さないための魔法のサイズ計算 */
        .puzzle-board-size {
            width: 100%;
            /* 縦並びの時（スマホなど）: 上下に2つ並ぶので、高さ制限を厳しくして見切れを防ぐ */
            max-width: min(85vw, 32vh); 
        }
        @media (min-width: 768px) {
            .puzzle-board-size {
                /* 横並びの時（PCなど）: 左右に並ぶので、幅を画面半分以下にしつつ、高さは余裕を持たせる */
                max-width: min(42vw, 60vh);
            }
        }
    </style>
</head>
<body class="animated-bg h-screen w-screen overflow-hidden flex items-center justify-center p-2 sm:p-4 text-slate-800 box-border">

    <!-- アプリのメインコンテナ (絶対に画面サイズを超えないように h-full に固定) -->
    <div class="relative w-full h-full max-w-4xl max-h-[850px] bg-white/95 backdrop-blur-sm rounded-2xl sm:rounded-[2rem] md:rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col border-[2px] sm:border-[3px] md:border-4 border-white/50">
        
        <!-- ================= タイトル画面 ================= -->
        <div id="screen-title" class="absolute inset-0 flex flex-col p-4 sm:p-6 md:p-10 z-20 transition-opacity duration-500 bg-white/40 overflow-y-auto">
            <div class="flex-grow flex flex-col items-center justify-center py-2">
                <!-- タイトルロゴ -->
                <div class="animate-float flex flex-col items-center mb-6 sm:mb-8 md:mb-12">
                    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-500 tracking-wider drop-shadow-sm text-center leading-tight">
                        魔方陣パズル
                    </h1>
                    <p class="text-[10px] sm:text-xs md:text-lg text-indigo-900 mt-2 sm:mt-4 font-bold bg-white/60 px-3 sm:px-6 py-1 sm:py-2 rounded-full shadow-sm text-center">
                        縦・横・斜めの和を全てそろえよう！
                    </p>
                </div>
                
                <!-- 難易度選択 -->
                <div class="w-full max-w-3xl flex flex-col md:flex-row gap-3 sm:gap-4 md:gap-6 justify-center">
                    <button onclick="showStageSelect('easy')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-emerald-400 hover:bg-emerald-300 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-emerald-600 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-bold shadow-lg flex flex-col items-center gap-1 sm:gap-2">
                        <span><i class="fa-solid fa-seedling"></i> 初級</span>
                        <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">ヒントいっぱい</span>
                    </button>
                    <button onclick="showStageSelect('normal')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-blue-500 hover:bg-blue-400 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-blue-700 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-bold shadow-lg flex flex-col items-center gap-1 sm:gap-2">
                        <span><i class="fa-solid fa-fire"></i> 中級</span>
                        <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">ヒント3つ</span>
                    </button>
                    <button onclick="showStageSelect('hard')" class="btn-3d flex-1 py-3 sm:py-4 md:py-6 bg-rose-500 hover:bg-rose-400 text-white border-b-[4px] sm:border-b-[6px] md:border-b-[8px] border-rose-700 rounded-[1rem] sm:rounded-[1.5rem] md:rounded-3xl text-lg sm:text-xl md:text-3xl font-bold shadow-lg flex flex-col items-center gap-1 sm:gap-2">
                        <span><i class="fa-solid fa-skull"></i> 上級</span>
                        <span class="text-[10px] sm:text-xs md:text-base font-normal bg-black/10 px-2 sm:px-3 py-0.5 sm:py-1 rounded-full">究極の推理！</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= ステージ選択画面 ================= -->
        <div id="screen-stages" class="absolute inset-0 flex flex-col p-4 sm:p-6 z-10 hidden transition-opacity duration-500 bg-white/90">
            <div class="flex items-center relative mb-2 sm:mb-4 h-10 sm:h-12 flex-shrink-0">
                <button onclick="showTitle()" class="btn-3d absolute left-0 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-slate-500 bg-slate-200 hover:bg-slate-100 border-b-[3px] md:border-b-4 border-slate-400 rounded-xl sm:rounded-2xl text-lg sm:text-xl z-10">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 id="stage-select-title" class="w-full text-center text-xl sm:text-2xl md:text-4xl font-extrabold text-slate-700 tracking-wide">難易度 - ステージ</h2>
            </div>
            
            <div class="flex-grow flex items-center justify-center overflow-y-auto">
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 sm:gap-4 md:gap-6 max-w-3xl w-full p-2" id="stage-buttons">
                    <!-- JSで動的に生成 -->
                </div>
            </div>
        </div>

        <!-- ================= ゲーム画面 ================= -->
        <div id="screen-game" class="absolute inset-0 flex flex-col z-0 hidden transition-opacity duration-500 bg-white/95">
            
            <!-- 上部ナビゲーション (高さ固定で安定化) -->
            <div class="flex items-center justify-between w-full h-[12%] min-h-[50px] px-4 md:px-8 mt-2 flex-shrink-0">
                <button onclick="backToStageSelect()" class="btn-3d w-10 h-10 md:w-12 md:h-12 flex items-center justify-center text-slate-500 bg-slate-200 hover:bg-slate-100 border-b-[3px] md:border-b-4 border-slate-400 rounded-xl sm:rounded-2xl text-lg sm:text-xl z-10">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                
                <div class="flex flex-col items-center justify-center bg-indigo-100 px-4 sm:px-6 md:px-8 py-1 rounded-xl sm:rounded-2xl border-[2px] border-indigo-200">
                    <span class="text-indigo-500 text-[9px] sm:text-[10px] md:text-xs font-bold leading-none mb-0.5">パズル</span>
                    <h2 id="game-title" class="text-base sm:text-lg md:text-2xl font-extrabold text-indigo-700 tracking-wider leading-none">ステージ 1</h2>
                </div>

                <button onclick="resetBoard()" class="btn-3d h-10 md:h-12 px-2 sm:px-3 md:px-4 flex items-center justify-center gap-1 sm:gap-2 text-rose-500 bg-rose-100 hover:bg-rose-50 border-b-[3px] md:border-b-4 border-rose-300 rounded-xl sm:rounded-2xl text-[9px] sm:text-[10px] md:text-sm font-bold shadow-sm z-10" title="最初に戻す">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span class="whitespace-nowrap hidden sm:inline">最初に戻す</span>
                </button>
            </div>
            
            <!-- エラーメッセージ領域 (盤面に被らないように専用のスペースを用意) -->
            <div class="w-full h-[6%] min-h-[30px] flex items-center justify-center flex-shrink-0">
                <div id="error-msg" class="bg-rose-500 text-white px-4 py-1.5 rounded-full font-bold text-[10px] md:text-sm opacity-0 transition-opacity shadow-md flex items-center gap-2 pointer-events-none">
                    <i class="fa-solid fa-triangle-exclamation"></i> 合計が15にならない列があるよ！
                </div>
            </div>
            
            <!-- メイン領域: CSSのmin()を使って、どんな画面サイズでも絶対に見切れないように計算 -->
            <div class="flex-grow flex flex-col md:flex-row items-center justify-center gap-2 md:gap-10 w-full px-2 pb-4 overflow-hidden">
                
                <!-- 左側：盤面エリア -->
                <div class="puzzle-board-size flex flex-col items-center justify-center relative">
                    <!-- 3x3 盤面 -->
                    <div id="board" class="grid grid-cols-3 gap-1.5 md:gap-2 aspect-square w-full bg-slate-300 p-2 md:p-3 rounded-[1.25rem] md:rounded-[2rem] shadow-inner border-[3px] md:border-4 border-slate-300 flex-shrink-0">
                        <!-- JSで動的に生成 -->
                    </div>

                    <!-- 高さ合わせのダミーブロック (右側の消すボタンと同じ比率で高さを確保) -->
                    <div class="w-full aspect-[6/1] mt-1.5 md:mt-2 hidden md:block opacity-0 pointer-events-none flex-shrink-0"></div>
                </div>

                <!-- 右側：数字入力パッド -->
                <div class="puzzle-board-size flex flex-col justify-center items-center">
                    <!-- テンキーパッド -->
                    <div id="number-pad" class="grid grid-cols-3 gap-1.5 md:gap-2 aspect-square w-full bg-indigo-50/50 p-2 md:p-3 rounded-[1.25rem] md:rounded-[2rem] border-[3px] md:border-4 border-indigo-100/50 flex-shrink-0">
                        <!-- JSで動的に生成 -->
                    </div>

                    <!-- 消すボタンのコンテナ (アスペクト比で高さを自動決定) -->
                    <div id="delete-pad" class="w-full aspect-[6/1] mt-1.5 md:mt-2 flex-shrink-0">
                        <!-- JSで生成 -->
                    </div>
                </div>

            </div>
        </div>

        <!-- ================= クリアモーダル ================= -->
        <div id="modal-clear" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center opacity-0 transition-opacity duration-500 overflow-hidden p-4">
            <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>

            <div class="bg-gradient-to-b from-yellow-50 to-white rounded-[1.5rem] md:rounded-[2rem] p-6 sm:p-8 w-full max-w-[350px] text-center shadow-[0_0_100px_rgba(250,204,21,0.5)] transform scale-90 transition-transform duration-500 relative border-[4px] md:border-[6px] border-yellow-300 mx-auto" id="modal-content">
                
                <div class="absolute -top-10 md:-top-12 left-1/2 transform -translate-x-1/2 text-5xl sm:text-6xl md:text-7xl text-yellow-400 drop-shadow-lg animate-bounce">
                    <i class="fa-solid fa-crown"></i>
                </div>
                
                <h3 class="text-2xl sm:text-3xl md:text-4xl font-extrabold text-yellow-600 mb-1 mt-4 sm:mt-6 tracking-wide">クリア！</h3>
                <p class="text-sm sm:text-base md:text-lg text-slate-500 mb-4 sm:mb-6 font-bold">すごい！大正解！</p>
                
                <div class="flex flex-col gap-2 sm:gap-3">
                    <button onclick="nextStage()" class="btn-3d w-full py-3 sm:py-4 bg-indigo-500 hover:bg-indigo-400 text-white font-extrabold rounded-xl sm:rounded-2xl text-base sm:text-lg shadow-lg border-b-[4px] border-indigo-700 flex items-center justify-center gap-2">
                        <span>次のステージへ</span> <i class="fa-solid fa-forward-step"></i>
                    </button>
                    <button onclick="backToStageSelect()" class="btn-3d w-full py-2 sm:py-3 bg-slate-200 hover:bg-slate-100 text-slate-600 font-extrabold rounded-xl sm:rounded-2xl text-sm sm:text-base shadow-md border-b-[4px] border-slate-400">
                        一覧に戻る
                    </button>
                </div>
            </div>
        </div>

    </div>

        function showTitle() {

        }

        function showStageSelect(difficulty) {
            currentDifficulty = difficulty;
            screenTitle.classList.add('hidden');
            screenGame.classList.add('hidden');
            screenStages.classList.remove('hidden');

            const titleMap = { 'easy': '初級', 'normal': '中級', 'hard': '上級' };
            const colorMap = { 'easy': 'text-emerald-500', 'normal': 'text-blue-500', 'hard': 'text-rose-500' };
            
            const titleEl = document.getElementById('stage-select-title');
            titleEl.innerText = `${titleMap[difficulty]} ステージ`;
            titleEl.className = `w-full text-center text-xl sm:text-2xl md:text-4xl font-extrabold tracking-wide ${colorMap[difficulty]}`;

            const stageButtons = document.getElementById('stage-buttons');
            stageButtons.innerHTML = '';
            
            STAGE_DATA[difficulty].forEach((_, idx) => {
                const isCleared = clearedStages[difficulty].includes(idx);
                const btn = document.createElement('button');
                
                if (isCleared) {
                    btn.className = 'btn-3d relative aspect-square flex flex-col items-center justify-center rounded-2xl md:rounded-[2rem] bg-amber-50 hover:bg-amber-100 border-b-[4px] md:border-b-[6px] border-amber-300 text-amber-600 transition shadow-sm';

        function startGame(stageIdx) {
            currentStageIdx = stageIdx;
            screenStages.classList.add('hidden');
            screenGame.classList.remove('hidden');
            
            document.getElementById('game-title').innerText = `ステージ ${stageIdx + 1}`;
            hideError();
            
            boardEl.classList.remove('shake');
            
            const stageData = STAGE_DATA[currentDifficulty][stageIdx];
            const solution = SOLUTIONS[stageData.solIdx];
            
            board = Array(9).fill(0);
            lockedCells = [...stageData.hints];
            
            lockedCells.forEach(idx => {
                board[idx] = solution[idx];
            });
            
            selectedCell = null;
            selectedNumber = null;

            renderBoard();
            renderNumpad();
        }

        function resetBoard() {
            startGame(currentStageIdx);
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                const val = board[i];
                const isLocked = lockedCells.includes(i);
                
                let classes = 'aspect-square w-full h-full flex items-center justify-center rounded-xl md:rounded-2xl lg:rounded-3xl transition-all duration-200 select-none border-[3px] md:border-4 ';

                    classes += 'bg-slate-100 text-slate-700 border-dashed border-slate-400 cursor-pointer hover:bg-white';
                    
                    if (selectedCell === i) {
                        classes = classes.replace('border-slate-400', 'border-yellow-400').replace('bg-slate-100', 'bg-yellow-100');
                        classes += ' ring-4 ring-yellow-400 ring-offset-4 ring-offset-slate-300';
                    }
                    
                    cell.onclick = () => {
                        if (isLocked) return;

                        if (selectedNumber !== null) {
                            hideError();
                            board[i] = selectedNumber;
                            
                            if (selectedNumber !== 0) {
                                setTimeout(() => {
                                    const animCell = document.getElementById(`cell-${i}`);
                                    if(animCell) {
                                        animCell.classList.remove('pop');
                                        void animCell.offsetWidth;
                                        animCell.classList.add('pop');
                                    }
                                }, 10);
                            }
                            
                            selectedNumber = null;
                            selectedCell = null;
                            
                            renderBoard();
                            renderNumpad();
                            
                            if (!board.includes(0)) {
                                checkWin();
                            }
                        } else {
                            if (selectedCell === i) {
                                selectedCell = null;
                            } else {
                                selectedCell = i;
                            }
                            renderBoard();
                        }
                    };
                }
                
                cell.className = classes;
                if (val !== 0) {
                    cell.innerHTML = getDigitSvg(val);
                } else {
                    cell.innerHTML = '';
                }
                
                cell.id = `cell-${i}`;
                boardEl.appendChild(cell);
            }
        }

                delBtn.innerHTML = '<i class="fa-solid fa-eraser"></i> 消す';
                delBtn.onclick = () => handleNumberInput(0);
                deletePad.appendChild(delBtn);
            }
        }

        function handleNumberInput(num) {
            if (selectedCell !== null) {
                if (lockedCells.includes(selectedCell)) return;

                hideError();
                board[selectedCell] = num;
                
                if (num !== 0) {
                    setTimeout(() => {
                        const cell = document.getElementById(`cell-${selectedCell}`);
                        if(cell) {
                            cell.classList.remove('pop');
                            void cell.offsetWidth;
                            cell.classList.add('pop');
                        }
                    }, 10);
                }

                selectedCell = null;
                selectedNumber = null;
                
                renderBoard();
                renderNumpad();
                
                if (!board.includes(0)) {
                    checkWin();
                }
            } else {
                if (selectedNumber === num) {
                    selectedNumber = null;
                } else {
                    selectedNumber = num;
                }
                renderNumpad();
            }
        }

        function checkWin() {
            const sums = [
                board[0] + board[1] + board[2],
                board[3] + board[4] + board[5],
                board[6] + board[7] + board[8],
                board[0] + board[3] + board[6],
                board[1] + board[4] + board[7],
                board[2] + board[5] + board[8],
                board[0] + board[4] + board[8],
                board[2] + board[4] + board[6]
            ];
            
            const isAll15 = sums.every(sum => sum === 15);
            const isUnique = new Set(board).size === 9; 

            if (isAll15 && isUnique) {
                saveClearStatus(currentDifficulty, currentStageIdx);

                createConfetti();
                setTimeout(() => {
                    modalClear.classList.remove('hidden');
                    setTimeout(() => {
                        modalClear.classList.add('opacity-100');
                        modalContent.classList.remove('scale-90');
                        modalContent.classList.add('scale-100');
                    }, 50);
                }, 300);
            } else {
                errorMsg.classList.remove('opacity-0');
                boardEl.classList.remove('shake');
                void boardEl.offsetWidth;
                boardEl.classList.add('shake');
            }
        }

        function hideError() {
            errorMsg.classList.add('opacity-0');
            boardEl.classList.remove('shake');
        }

        function nextStage() {
            modalClear.classList.add('hidden');
            modalClear.classList.remove('opacity-100');
            modalContent.classList.add('scale-90');
            modalContent.classList.remove('scale-100');
            confettiContainer.innerHTML = '';
            
            if (currentStageIdx < STAGE_DATA[currentDifficulty].length - 1) {
                startGame(currentStageIdx + 1);
            } else {
                alert("全ステージ完全クリア！魔方陣マスターだ！");
                showStageSelect(currentDifficulty);
            }
        }

        function createConfetti() {
            confettiContainer.innerHTML = '';
            const colors = ['#fcd34d', '#34d399', '#60a5fa', '#f472b6', '#a78bfa'];
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti rounded-sm md:rounded-md';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 0.5) + 's';
                confettiContainer.appendChild(conf);
            }
        }
    </script>
</body>
</html>
