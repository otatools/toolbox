    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import * as CANNON from 'https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js';

        // 衝突グループの定義
        const GROUP_DEFAULT = 1;
        const GROUP_INVISIBLE = 2;

        // --- 1. セットアップ (Three.js & Cannon-es) ---
        
        const container = document.getElementById('canvas-container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a202c);
        scene.fog = new THREE.Fog(0x1a202c, 30, 60);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        
        function updateCamera() {
            const aspect = window.innerWidth / window.innerHeight;
            
            let distance = 21.5; 

            if (aspect < 1.0) {
                distance = 21.5 / aspect;
                distance = Math.min(distance, 50.0);
            }

            const yRatio = 14.0 / Math.sqrt(14*14 + 16*16);
            const zRatio = 16.0 / Math.sqrt(14*14 + 16*16);

            camera.position.set(0, distance * yRatio, distance * zRatio);
            camera.lookAt(0, -1, 0);
        }

        updateCamera();

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.50); 
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.75);
        dirLight.position.set(10, 22, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        const d = 12;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        
        dirLight.shadow.bias = -0.0002; 
        dirLight.shadow.normalBias = 0.03; 
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
        fillLight.position.set(-12, 18, -12);
        scene.add(fillLight);

        const world = new CANNON.World({
            gravity: new CANNON.Vec3(0, -45, 0), 
        });
        world.broadphase = new CANNON.SAPBroadphase(world);
        world.solver.iterations = 35; 
        world.allowSleep = true;

        const diceMaterial = new CANNON.Material("dice");
        const trayMaterial = new CANNON.Material("tray");
        const wallMaterial = new CANNON.Material("wall"); 

        const diceTrayContact = new CANNON.ContactMaterial(diceMaterial, trayMaterial, {
            friction: 0.3,    
            restitution: 0.3 
        });
        world.addContactMaterial(diceTrayContact);

        const diceWallContact = new CANNON.ContactMaterial(diceMaterial, wallMaterial, {
            friction: 0.0,    
            restitution: 0.4 
        });
        world.addContactMaterial(diceWallContact);

        const diceDiceContact = new CANNON.ContactMaterial(diceMaterial, diceMaterial, {
            friction: 0.0,    
            restitution: 0.8 
        });
        world.addContactMaterial(diceDiceContact);


        // --- 2. リアルなプロシージャルテクスチャの生成 ---

        function generateFeltTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1b4d2a'; 
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalAlpha = 0.3;
            for(let i=0; i<60000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#246b3b' : '#0e2b17';
                ctx.fillRect(Math.random()*512, Math.random()*512, 2, 2);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(3, 3);
            return tex;
        }

        function generateFeltBumpMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(512, 512);
            for(let i=0; i<imgData.data.length; i+=4) {
                const val = 128 + (Math.random() - 0.5) * 80; 
                imgData.data[i] = val;
                imgData.data[i+1] = val;
                imgData.data[i+2] = val;
                imgData.data[i+3] = 255;
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(3, 3);
            return tex;
        }

        function generateLeatherTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3a2012'; 
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalAlpha = 0.2;
            for(let i=0; i<15000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#4f2c19' : '#231209';
                ctx.beginPath();
                ctx.ellipse(Math.random()*512, Math.random()*512, Math.random()*6+2, Math.random()*6+2, Math.random()*Math.PI, 0, Math.PI*2);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 2);
            return tex;
        }

        function generateLeatherBumpMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#808080';
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalAlpha = 0.15;
            for(let i=0; i<25000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#ffffff' : '#000000';
                ctx.beginPath();
                ctx.ellipse(Math.random()*512, Math.random()*512, Math.random()*8+2, Math.random()*8+2, Math.random()*Math.PI, 0, Math.PI*2);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 2);
            return tex;
        }

        function generateWoodTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#4a2f1d'; 
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.lineWidth = 3;
            ctx.globalAlpha = 0.25;
            for (let i = 0; i < 400; i++) {
                ctx.strokeStyle = Math.random() > 0.5 ? '#2b1a0f' : '#6b442a';
                ctx.beginPath();
                let x = Math.random() * 512;
                ctx.moveTo(x, 0);
                
                let cp1x = x + (Math.random() - 0.5) * 40;
                let cp1y = 170;
                let cp2x = x + (Math.random() - 0.5) * 40;
                let cp2y = 340;
                let endX = x + (Math.random() - 0.5) * 20;
                
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, 512);
                ctx.stroke();
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.MirroredRepeatWrapping;
            tex.wrapT = THREE.MirroredRepeatWrapping;
            tex.repeat.set(6, 6); 
            return tex;
        }

        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#faf9f5';
            ctx.fillRect(0, 0, 512, 512);

            const margin = 24;
            const radius = 64;
            ctx.beginPath();
            ctx.moveTo(margin + radius, margin);
            ctx.lineTo(512 - margin - radius, margin);
            ctx.quadraticCurveTo(512 - margin, margin, 512 - margin, margin + radius);
            ctx.lineTo(512 - margin, 512 - margin - radius);
            ctx.quadraticCurveTo(512 - margin, 512 - margin, 512 - margin - radius, 512 - margin);
            ctx.lineTo(margin + radius, 512 - margin);
            ctx.quadraticCurveTo(margin, 512 - margin, margin, 512 - margin - radius);
            ctx.lineTo(margin, margin + radius);
            ctx.quadraticCurveTo(margin, margin, margin + radius, margin);
            ctx.closePath();
            ctx.fillStyle = '#fefefe';
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#e2e8f0';
            ctx.stroke();

            ctx.fillStyle = number === 1 ? '#e11d48' : '#0f172a'; 
            const drawDot = (x, y, r = 45) => {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            };
            const center = 256;
            const offset = 120;
            if ([1, 3, 5].includes(number)) drawDot(center, center, number === 1 ? 80 : 45);
            if ([2, 3, 4, 5, 6].includes(number)) { drawDot(center - offset, center - offset); drawDot(center + offset, center + offset); }
            if ([4, 5, 6].includes(number)) { drawDot(center - offset, center + offset); drawDot(center + offset, center - offset); }
            if (number === 6) { drawDot(center - offset, center); drawDot(center + offset, center); }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); 
            return texture;
        }

        // 10面体用の数字テクスチャを生成
        function createDiceNumberTexture(number, isRed = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#faf9f5';
            ctx.fillRect(0, 0, 512, 512);

            const topY = 24;
            const bottomY = 488;
            const leftX = 24;
            const rightX = 488;
            const centerY = 512 * (1 - 0.20); 

            ctx.beginPath();
            ctx.moveTo(256, topY); 
            ctx.lineTo(rightX, centerY); 
            ctx.lineTo(256, bottomY); 
            ctx.lineTo(leftX, centerY); 
            ctx.closePath();
            
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 10;
            ctx.strokeStyle = '#cbd5e1'; 
            ctx.stroke();

            const posY = (topY + centerY) / 2 + 85; 

            // ★ PDFのSVGデータ(Path2D)を利用して、一切のズレなく完璧にUDデジタル教科書体を直接描画
            ctx.save();
            ctx.translate(256, posY);
            ctx.scale(300, -300);       // SVGのスケール調整とY軸反転 (350 -> 300 に縮小)
            ctx.translate(-0.35, -0.38); // 枠の中央に配置するための補正
            
            const path = new Path2D(perfectDigitPaths[number]);
            ctx.fillStyle = isRed ? '#e11d48' : '#0f172a';
            ctx.fill(path);
            ctx.restore();

            // 6と9のアンダーライン（文字に合わせた適切な幅で描画）
            if (number === 6 || number === 9) {
                ctx.lineWidth = 15; // 線の太さを少し細く
                ctx.lineCap = 'round';
                ctx.strokeStyle = isRed ? '#e11d48' : '#0f172a';
                ctx.beginPath();
                const lineY = posY + 135; // 線の位置を少し文字に近づける
                ctx.moveTo(256 - 45, lineY); // 幅を少し短く
                ctx.lineTo(256 + 45, lineY);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); 
            return texture;
        }

        function createRoundedBoxGeometry(width, height, depth, radius, segments) {
            const geometry = new THREE.BoxGeometry(width, height, depth, segments, segments, segments);
            const position = geometry.attributes.position;
            const normal = geometry.attributes.normal;
            const tempNormal = new THREE.Vector3();
            
            const minX = -width / 2 + radius, maxX = width / 2 - radius;
            const minY = -height / 2 + radius, maxY = height / 2 - radius;
            const minZ = -depth / 2 + radius, maxZ = depth / 2 - radius;

            for (let i = 0; i < position.count; i++) {
                let x = position.getX(i), y = position.getY(i), z = position.getZ(i);
                let newX = Math.min(maxX, Math.max(minX, x));
                let newY = Math.min(maxY, Math.max(minY, y));
                let newZ = Math.min(maxZ, Math.max(minZ, z));

                tempNormal.set(x - newX, y - newY, z - newZ);
                
                if (Math.abs(x) > maxX || Math.abs(y) > maxY || Math.abs(z) > maxZ) {
                    tempNormal.normalize();
                    x = newX + tempNormal.x * radius;
                    y = newY + tempNormal.y * radius;
                    z = newZ + tempNormal.z * radius;
                    position.setXYZ(i, x, y, z);
                    normal.setXYZ(i, tempNormal.x, tempNormal.y, tempNormal.z);
                }
            }
            geometry.computeVertexNormals();
            return geometry;
        }

        function createD10Geometry(radius) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const uvs = [];

            const phi = Math.PI / 5;
            const ratio = (1 - Math.cos(phi)) / (1 + Math.cos(phi)); 
            const h1 = 0.96, h2 = h1 * ratio, r_val = 1.0;
            
            const vTop = new THREE.Vector3(0, h1, 0);
            const vBottom = new THREE.Vector3(0, -h1, 0);
            const vP = [];
            const vQ = [];
            for(let i=0; i<5; i++) {
                const a = i * Math.PI * 2 / 5;
                vP.push(new THREE.Vector3(Math.cos(a)*r_val, h2, Math.sin(a)*r_val));
            }
            for(let i=0; i<5; i++) {
                const a = (i + 0.5) * Math.PI * 2 / 5;
                vQ.push(new THREE.Vector3(Math.cos(a)*r_val, -h2, Math.sin(a)*r_val));
            }

            const faceNormals = [];
            let d0 = 0;
            for(let i=0; i<5; i++) {
                const p1 = vP[i];
                const p2 = vP[(i+1)%5];
                const n = new THREE.Vector3().subVectors(p2, vTop).cross(new THREE.Vector3().subVectors(p1, vTop)).normalize();
                faceNormals.push(n);
                d0 = n.dot(vTop);
            }
            for(let i=0; i<5; i++) {
                const p2 = vP[(i+1)%5];
                const q1 = vQ[i];
                const q2 = vQ[(i+1)%5];
                const n = new THREE.Vector3().subVectors(q1, vBottom).cross(new THREE.Vector3().subVectors(q2, vBottom)).normalize();
                faceNormals.push(n);
            }

            function getRoundedPosition(v) {
                const dir = v.clone().normalize();
                const values = [];
                for(let n of faceNormals) {
                    const dot = n.dot(dir);
                    if(dot > 0.0001) {
                        values.push(d0 / dot);
                    }
                }
                if (values.length === 0) return dir.multiplyScalar(radius);
                
                const k = 16.0; 
                let minV = Math.min(...values);
                let sum = 0;
                for(let val of values) {
                    sum += Math.exp(-k * (val - minV));
                }
                const t_smooth = minV - Math.log(sum) / k;
                return dir.multiplyScalar(t_smooth * radius);
            }

            function subdivide(triangles, iterations) {
                let current = triangles;
                for (let it = 0; it < iterations; it++) {
                    let nextTri = [];
                    for (let tri of current) {
                        let [vA, vB, vC, uvA, uvB, uvC] = tri;
                        let vAB = vA.clone().lerp(vB, 0.5);
                        let vBC = vB.clone().lerp(vC, 0.5);
                        let vCA = vC.clone().lerp(vA, 0.5);
                        let uvAB = uvA.clone().lerp(uvB, 0.5);
                        let uvBC = uvB.clone().lerp(uvC, 0.5);
                        let uvCA = uvC.clone().lerp(uvA, 0.5);
                        nextTri.push([vA, vAB, vCA, uvA, uvAB, uvCA]);
                        nextTri.push([vAB, vB, vBC, uvAB, uvB, uvBC]);
                        nextTri.push([vCA, vBC, vC, uvCA, uvBC, uvC]);
                        nextTri.push([vAB, vBC, vCA, uvAB, uvBC, uvCA]);
                    }
                    current = nextTri;
                }
                return current;
            }

            const uvTop = new THREE.Vector2(0.5, 1.0);
            const uvBottom = new THREE.Vector2(0.5, 0.0);
            const uvLeft = new THREE.Vector2(0.0, 0.20);
            const uvRight = new THREE.Vector2(1.0, 0.20);
            const uvCenter = new THREE.Vector2(0.5, 0.20);
            const t = (h1 - h2) / (h1 + h2);

            let groupStart = 0;

            for(let i=0; i<10; i++) {
                let baseTriangles = [];
                
                if (i < 5) { 
                    const p1 = vP[i];        
                    const p2 = vP[(i+1)%5];  
                    const q1 = vQ[i];        
                    const center = vTop.clone().lerp(q1, t); 
                    baseTriangles.push([center, vTop, p2, uvCenter, uvTop, uvLeft]);
                    baseTriangles.push([center, p2, q1, uvCenter, uvLeft, uvBottom]);
                    baseTriangles.push([center, q1, p1, uvCenter, uvBottom, uvRight]);
                    baseTriangles.push([center, p1, vTop, uvCenter, uvRight, uvTop]);
                } else { 
                    const idx = i - 5;
                    const p2 = vP[(idx+1)%5];  
                    const q1 = vQ[idx];        
                    const q2 = vQ[(idx+1)%5];  
                    const center = vBottom.clone().lerp(p2, t);
                    baseTriangles.push([center, p2, q2, uvCenter, uvBottom, uvRight]);
                    baseTriangles.push([center, q2, vBottom, uvCenter, uvRight, uvTop]);
                    baseTriangles.push([center, vBottom, q1, uvCenter, uvTop, uvLeft]);
                    baseTriangles.push([center, q1, p2, uvCenter, uvLeft, uvBottom]);
                }

                const subTriangles = subdivide(baseTriangles, 3); 

                for (let tri of subTriangles) {
                    const [vA, vB, vC, uvA, uvB, uvC] = tri;
                    const rA = getRoundedPosition(vA);
                    const rB = getRoundedPosition(vB);
                    const rC = getRoundedPosition(vC);
                    
                    positions.push(rA.x, rA.y, rA.z, rB.x, rB.y, rB.z, rC.x, rC.y, rC.z);
                    uvs.push(uvA.x, uvA.y, uvB.x, uvB.y, uvC.x, uvC.y);
                }

                geometry.addGroup(groupStart, subTriangles.length * 3, i);
                groupStart += subTriangles.length * 3;
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            
            geometry.computeVertexNormals();
            
            return geometry;
        }

        function createD10Shape(radius) {
            const phi = Math.PI / 5;
            const ratio = (1 - Math.cos(phi)) / (1 + Math.cos(phi));
            const h1 = 0.96 * radius;
            const h2 = h1 * ratio;
            const r = 1.0 * radius;
            
            const vertices = [];
            vertices.push(new CANNON.Vec3(0, h1, 0)); 
            vertices.push(new CANNON.Vec3(0, -h1, 0)); 
            for(let i=0; i<5; i++) {
                const a = i * Math.PI * 2 / 5;
                vertices.push(new CANNON.Vec3(Math.cos(a)*r, h2, Math.sin(a)*r)); 
            }
            for(let i=0; i<5; i++) {
                const a = (i + 0.5) * Math.PI * 2 / 5;
                vertices.push(new CANNON.Vec3(Math.cos(a)*r, -h2, Math.sin(a)*r)); 
            }

            const faces = [];
            for(let i=0; i<5; i++) {
                const p1 = 2 + i;
                const p2 = 2 + (i + 1) % 5;
                const q1 = 7 + i;
                faces.push([0, p2, q1, p1]);
            }
            for(let i=0; i<5; i++) {
                const p2 = 2 + (i + 1) % 5;
                const q1 = 7 + i;
                const q2 = 7 + (i + 1) % 5;
                faces.push([1, q1, p2, q2]);
            }

            const poly = new CANNON.ConvexPolyhedron({ vertices, faces });
            poly.computeNormals();
            return poly;
        }

        const createDiceMaterial = (number) => new THREE.MeshPhysicalMaterial({
            map: createDiceTexture(number),
            roughness: 0.08,

            clearcoatRoughness: 0.03,

            ior: 1.52,                   
            thickness: 0.5,              
            envMapIntensity: 1.2
        });
        
        const diceThreeMaterials = [createDiceMaterial(3), createDiceMaterial(4), createDiceMaterial(1), createDiceMaterial(6), createDiceMaterial(2), createDiceMaterial(5)];

        const d10FaceNumbers = [0, 7, 5, 3, 9, 8, 2, 4, 1, 6]; 
        
        const d10MaterialsBlack = d10FaceNumbers.map(n => new THREE.MeshPhysicalMaterial({
            map: createDiceNumberTexture(n, false),

            transmission: 0.08,

        }));

        const d10MaterialsRed = d10FaceNumbers.map(n => new THREE.MeshPhysicalMaterial({

            metalness: 0.0,              
            clearcoat: 1.0,              
            clearcoatRoughness: 0.03,

            thickness: 0.5,

        }));

        // ★ 追加: 配列を毎フレーム作るとラグ(GCスパイク)の原因になるため、事前に全てのパターンの配列を作ってキャッシュ(保存)しておく
        const D10_MAT_BLACK = [...d10MaterialsBlack];
        const D10_MAT_RED_SETS = [];
        for (let i = 0; i < 10; i++) {
            const matSet = [...d10MaterialsBlack];
            matSet[i] = d10MaterialsRed[i];
            D10_MAT_RED_SETS.push(matSet);
        }

        const dices = [];
        const diceSize = 3.0;
        
        let invisibleWallActive = false; 
        let rollState = 'settled'; // ★ 追加: サイコロ全体の状態を管理 ('idle', 'rolling', 'settled')

        function createDice() {
            let geometry, shape, material;

            if (currentDiceType === 'd6') {
                const cornerRadius = 0.45; 
                geometry = createRoundedBoxGeometry(diceSize, diceSize, diceSize, cornerRadius, 16);
                material = diceThreeMaterials;
                shape = new CANNON.Box(new CANNON.Vec3(diceSize/2, diceSize/2, diceSize/2));
            } else {
                const radius = 2.2;
                geometry = createD10Geometry(radius); 
                material = [...d10MaterialsBlack]; 
                shape = createD10Shape(radius); 
            }

            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            const body = new CANNON.Body({
                mass: 40.0,            
                material: diceMaterial,
                shape: shape,
                linearDamping: 0.05 + Math.random() * 0.15,    
                angularDamping: 0.01 + Math.random() * 0.04,   
                allowSleep: true,
                sleepSpeedLimit: 0.01, 
                sleepTimeLimit: 1.5,
                collisionFilterGroup: GROUP_DEFAULT,
                collisionFilterMask: GROUP_DEFAULT 
            });

            body.isDice = true; 
            body.hasBoosted = false; 

            body.addEventListener("collide", (e) => {
                if (!e.body.isDice && !invisibleWallActive) {
                    invisibleWallActive = true;
                    dices.forEach(d => {
                        d.body.collisionFilterMask = GROUP_DEFAULT | GROUP_INVISIBLE;
                    });
                }
            });

            world.addBody(body);
            dices.push({ mesh, body, diceType: currentDiceType, stillTime: 0, currentRedIndex: -1 });
        }

        function initDices() {
            clearDices();
            for(let i=0; i<currentDiceCount; i++) {
                createDice();
            }
            setInitialPosition();
        }

        function setInitialPosition() {
            dices.forEach((dice, index) => {
                let displayX = 0;
                if (currentDiceCount === 2) displayX = index === 0 ? -3.5 : 3.5;
                if (currentDiceCount === 3) displayX = (index - 1) * 4.5; 
                
                let posY = 1.5;
                if (dice.diceType === 'd10') {
                    posY = 2.05; 
                }

                dice.body.position.set(displayX, posY, 0);
                
                if (dice.diceType === 'd10') {
                    const faceNormal = dice.body.shapes[0].faceNormals[0];
                    const targetNormal = new CANNON.Vec3(0, 1, 0);
                    dice.body.quaternion.setFromVectors(faceNormal, targetNormal);
                } else {
                    dice.body.quaternion.set(0, 0, 0, 1);
                }
                
                dice.body.velocity.set(0, 0, 0);
                dice.body.angularVelocity.set(0, 0, 0);
                dice.body.sleep(); 
                
                dice.mesh.position.copy(dice.body.position);
                dice.mesh.quaternion.copy(dice.body.quaternion);
                
                dice.stillTime = 1.0;
                dice.currentRedIndex = -1;
            });
        }

        const woodMaterial = new THREE.MeshStandardMaterial({
            map: generateWoodTexture(),
            roughness: 0.85,
            metalness: 0.05
        });
        const deskGeometry = new THREE.PlaneGeometry(150, 150);
        const deskMesh = new THREE.Mesh(deskGeometry, woodMaterial);
        deskMesh.rotation.x = -Math.PI / 2; 
        deskMesh.position.y = -0.5; 
        deskMesh.receiveShadow = true;
        scene.add(deskMesh);

        const trayRadius = 9;
        const trayThickness = 0.5;
        const wallHeight = 3.5;      
        
        const physWallHeight = 50.0; 
        const wallThickness = 0.25;  

        const feltMaterial = new THREE.MeshStandardMaterial({ 
            map: generateFeltTexture(),
            bumpMap: generateFeltBumpMap(),
            bumpScale: 0.05,     
            roughness: 1.0       
        });
        
        const leatherMaterial = new THREE.MeshStandardMaterial({ 
            map: generateLeatherTexture(),
            bumpMap: generateLeatherBumpMap(),
            bumpScale: 0.04,     
            roughness: 0.55,     
            metalness: 0.1       
        });

        const floorRadius = trayRadius / Math.cos(Math.PI / 8); 
        const floorGeometry = new THREE.CylinderGeometry(floorRadius, floorRadius, trayThickness, 8);
        const floorMesh = new THREE.Mesh(floorGeometry, feltMaterial);
        floorMesh.position.y = -trayThickness / 2;
        floorMesh.rotation.y = Math.PI / 8; 
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        const floorShape = new CANNON.Box(new CANNON.Vec3(20, trayThickness/2, 20)); 
        const floorBody = new CANNON.Body({ 
            mass: 0, 
            material: trayMaterial,
            collisionFilterGroup: GROUP_DEFAULT,
            collisionFilterMask: GROUP_DEFAULT
        }); 
        floorBody.addShape(floorShape);
        floorBody.position.y = -trayThickness / 2;
        world.addBody(floorBody);

        const wallWidth = 2 * trayRadius * Math.tan(Math.PI / 8); 

        for (let i = 0; i < 8; i++) {
            const theta = i * (Math.PI / 4);
            const x = trayRadius * Math.sin(theta);
            const z = trayRadius * Math.cos(theta);
            
            const meshY = wallHeight / 2 - trayThickness;

            const wMesh = new THREE.Mesh(new THREE.BoxGeometry(wallWidth, wallHeight, wallThickness), leatherMaterial);
            wMesh.position.set(x, meshY, z);
            wMesh.rotation.y = theta;
            wMesh.castShadow = true;
            wMesh.receiveShadow = true;
            scene.add(wMesh);

            const topGeo = new THREE.CylinderGeometry(wallThickness/2, wallThickness/2, wallWidth, 16);
            const topMesh = new THREE.Mesh(topGeo, leatherMaterial);
            topMesh.position.set(x, wallHeight - trayThickness, z);
            topMesh.rotation.y = theta;
            topMesh.rotation.z = Math.PI / 2;
            topMesh.castShadow = true;
            topMesh.receiveShadow = true;
            scene.add(topMesh);

            const wShape = new CANNON.Box(new CANNON.Vec3(wallWidth/2, wallHeight/2, wallThickness/2));
            const wBody = new CANNON.Body({ 
                mass: 0, 
                material: wallMaterial,
                collisionFilterGroup: GROUP_DEFAULT,
                collisionFilterMask: GROUP_DEFAULT | GROUP_INVISIBLE
            });
            wBody.addShape(wShape);
            wBody.position.set(x, meshY, z);
            wBody.quaternion.setFromEuler(0, theta, 0);
            world.addBody(wBody);

            const invShape = new CANNON.Box(new CANNON.Vec3(wallWidth/2, physWallHeight/2, wallThickness/2));
            const invBody = new CANNON.Body({ 
                mass: 0, 
                material: wallMaterial,
                collisionFilterGroup: GROUP_INVISIBLE, 
                collisionFilterMask: GROUP_DEFAULT     
            });
            invBody.addShape(invShape);
            invBody.position.set(x, wallHeight + physWallHeight/2 - trayThickness, z);
            invBody.quaternion.setFromEuler(0, theta, 0);
            world.addBody(invBody);

            const thetaCorner = theta + (Math.PI / 8);
            const rCorner = trayRadius / Math.cos(Math.PI / 8);
            const cX = rCorner * Math.sin(thetaCorner);
            const cZ = rCorner * Math.cos(thetaCorner);
            
            const pillarGeo = new THREE.CylinderGeometry(wallThickness/2, wallThickness/2, wallHeight, 16);
            const pillar = new THREE.Mesh(pillarGeo, leatherMaterial);
            pillar.position.set(cX, meshY, cZ);
            pillar.castShadow = true;
            pillar.receiveShadow = true;
            scene.add(pillar);

            const sphereGeo = new THREE.SphereGeometry(wallThickness/2, 16, 16);
            const sphere = new THREE.Mesh(sphereGeo, leatherMaterial);
            sphere.position.set(cX, wallHeight - trayThickness, cZ);
            sphere.castShadow = true;
            sphere.receiveShadow = true;
            scene.add(sphere);
        }

        // --- 4. アクションとアニメーション ---

        function rollDices() {
            invisibleWallActive = false; 
            rollState = 'rolling'; 

            const sharedTime = 0.75 + Math.random() * 0.15; 
            const sharedTargetX = (Math.random() - 0.5) * 0.4; 
            const sharedTargetZ = -2.5 + (Math.random() - 0.5) * 1.0; 
            const sharedStartY = 8.5 + Math.random() * 1.5; 
            const sharedVelY = 4.0 + Math.random() * 1.5;   

            dices.forEach((dice, index) => {
                dice.body.wakeUp(); 
                dice.body.hasBoosted = false; 
                
                dice.stillTime = 0;     
                dice.currentRedIndex = -1; 
                
                dice.body.collisionFilterMask = GROUP_DEFAULT; 

                if (dice.diceType === 'd10') {
                    // ★ 修正: 毎回配列を作り直すのではなく、キャッシュした配列を適用する
                    dice.mesh.material = D10_MAT_BLACK; 
                }

                let startX = 0;
                let startZ = trayRadius + 4.0; 

                if (currentDiceCount === 2) {
                    startX = index === 0 ? -6.0 : 6.0;
                } else if (currentDiceCount === 3) {
                    if (index === 0) { startX = -8.5; startZ = trayRadius + 2.0; } 
                    if (index === 1) { startX = 0;    startZ = trayRadius + 6.0; } 
                    if (index === 2) { startX = 8.5;  startZ = trayRadius + 2.0; } 
                }
                
                dice.body.position.set(
                    startX + (Math.random() - 0.5) * 0.2, 
                    sharedStartY, 
                    startZ 
                );
                dice.body.quaternion.setFromEuler(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2);
                
                const velX = (sharedTargetX - dice.body.position.x) / sharedTime;
                const velZ = (sharedTargetZ - dice.body.position.z) / sharedTime;
                
                const randVelX = velX + (Math.random() - 0.5) * 1.5;
                const randVelY = sharedVelY + (Math.random() - 0.5) * 1.0;
                const randVelZ = velZ + (Math.random() - 0.5) * 1.5;

                dice.body.velocity.set(randVelX, randVelY, randVelZ);
                
                const getRandomSpin = () => {
                    const sign = Math.random() > 0.5 ? 1 : -1;
                    return sign * (20 + Math.random() * 30); 
                };
                dice.body.angularVelocity.set(getRandomSpin(), getRandomSpin(), getRandomSpin());
            });
        }

        window.addEventListener('resize', () => {

        const countBtns = document.querySelectorAll('.dice-count-btn');

        document.getElementById('btn-ok').addEventListener('click', () => {
            currentDiceCount = tempDiceCount;
            currentDiceType = tempDiceType;
            
            try {
                localStorage.setItem('diceCount', currentDiceCount);

                console.warn('設定の保存に失敗しました。', e);

            rollState = 'settled';

        document.getElementById('roll-btn').addEventListener('click', rollDices);

        // ★ 追加: スペースキーを押したときにもサイコロを振る
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // スペースキーによる画面スクロールを防止
                
                // 設定画面が開いていない時だけサイコロを振る
                const modal = document.getElementById('settings-modal');
                if (modal.classList.contains('hidden')) {
                    rollDices();
                }
            }
        });

        initDices();

        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
            setTimeout(() => {
                loadingScreen.classList.add('opacity-0');
                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                }, 500);
            }, 100);
        }

        // ★ 追加: 毎フレーム "new CANNON.Vec3()" を実行すると重くなるため、計算用変数を外に出して再利用する
        const UP_VECTOR = new CANNON.Vec3(0, 1, 0);
        const D6_NORMALS = [
            new CANNON.Vec3(1, 0, 0), new CANNON.Vec3(-1, 0, 0),
            new CANNON.Vec3(0, 1, 0), new CANNON.Vec3(0, -1, 0),
            new CANNON.Vec3(0, 0, 1), new CANNON.Vec3(0, 0, -1)
        ];
        const tempWorldNormal = new CANNON.Vec3();
        const tempCrossNormal = new CANNON.Vec3();

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = Math.min(clock.getDelta(), 0.1);
            world.step(1 / 60, deltaTime, 3);

            dices.forEach(dice => {
                dice.mesh.position.copy(dice.body.position);
                dice.mesh.quaternion.copy(dice.body.quaternion);

                // ★ 修正: 「ぐぐぐっと動いている状態」も静止とみなすため、判定の閾値を少し緩くする
                const isAlmostStill = dice.body.velocity.lengthSquared() < 1.5 && dice.body.angularVelocity.lengthSquared() < 1.5;
                if (dice.body.sleepState === CANNON.Body.SLEEPING || isAlmostStill) {
                    dice.stillTime += deltaTime; 
                } else {
                    dice.stillTime = 0; 
                }
            });

            // ★ 修正: 転がっている最中のみ、すべてが確定したかを判定する
            if (rollState === 'rolling') {
                let canSettle = true;
                for (let dice of dices) {
                    if (dice.stillTime < 0.4) { // 全てが0.4秒以上ゆっくり(ぐぐぐ状態)なら確定
                        canSettle = false;
                        break;
                    }
                    // ※以前ここにあった「斜めの時は確定を2.5秒遅らせる」処理を削除しました。
                    // これにより、斜めで滑っている最中でも待たずに即座に赤く点灯します。
                }

                if (canSettle) {
                    rollState = 'settled'; 
                }
            }

            dices.forEach(dice => {
                let maxDot = -1;
                // ★ 修正: 重いベクトルオブジェクトのコピーを避け、数値だけを記録する
                let bestNormalX = 0, bestNormalY = 0, bestNormalZ = 0;
                let bestIndex = -1; 
                
                // ★ 修正: D6_NORMALS をキャッシュから読み込む
                const normals = dice.diceType === 'd6' ? D6_NORMALS : dice.body.shapes[0].faceNormals;
                
                for (let i = 0; i < normals.length; i++) {
                    // ★ 修正: 新しいベクトルを作らず、用意しておいた tempWorldNormal に計算結果を上書きして使い回す
                    dice.body.quaternion.vmult(normals[i], tempWorldNormal);
                    if (tempWorldNormal.y > maxDot) {
                        maxDot = tempWorldNormal.y;
                        bestNormalX = tempWorldNormal.x;
                        bestNormalY = tempWorldNormal.y;
                        bestNormalZ = tempWorldNormal.z;
                        bestIndex = i;
                    }
                }

                if (dice.diceType === 'd10') {
                    if (rollState === 'settled') {
                        if (dice.currentRedIndex === -1) {
                            // ★ 修正: ここでも配列を新しく作らず、キャッシュから一瞬で読み込む
                            dice.mesh.material = D10_MAT_RED_SETS[bestIndex];
                            dice.currentRedIndex = bestIndex; 
                        }
                    } else {
                        if (dice.currentRedIndex !== -1) {
                            dice.mesh.material = D10_MAT_BLACK;
                            dice.currentRedIndex = -1;
                        }
                    }
                }

                if (dice.stillTime > 0.1 && dice.stillTime <= 3.0) {
                    if (maxDot < 0.985 && maxDot > 0) {
                        dice.body.wakeUp(); 
                        
                        // ★ 修正: 用意した使い回し用の変数(tempWorldNormal, tempCrossNormal)で計算を行う
                        tempWorldNormal.set(bestNormalX, bestNormalY, bestNormalZ);
                        tempWorldNormal.cross(UP_VECTOR, tempCrossNormal); 
                        
                        const correctionStrength = 1.0; 
                        dice.body.angularVelocity.x += tempCrossNormal.x * correctionStrength;
                        dice.body.angularVelocity.y += tempCrossNormal.y * correctionStrength;
                        dice.body.angularVelocity.z += tempCrossNormal.z * correctionStrength;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        animate();

    </script>
