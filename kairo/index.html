<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回路パズル - Circuit Logic Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ========== ベース・盤面スタイル ========== */
    .grid-cell {
      transition: background-color 0.2s, transform 0.1s;
    }
    .grid-cell:active {
      transform: scale(0.95);
    }
    .svg-piece {
      transition: transform 0.2s ease-in-out;
    }
    .powered-glow {
      filter: drop-shadow(0 0 5px #fbbf24);
    }
    .modal-overlay {
      background-color: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
    }
    
    /* ========== おもちゃ風ボタン（汎用） ========== */
    .btn-toy {
      transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 6px 0 0 rgba(0,0,0,0.15);
    }
    .btn-toy:active {
      transform: translateY(6px);
      box-shadow: 0 0px 0 0 rgba(0,0,0,0.15);
    }
    .btn-toy-yellow { box-shadow: 0 6px 0 0 #b45309; }
    .btn-toy-yellow:active { box-shadow: 0 0px 0 0 #b45309; }
    .btn-toy-blue { box-shadow: 0 6px 0 0 #1e40af; }
    .btn-toy-blue:active { box-shadow: 0 0px 0 0 #1e40af; }
    .btn-toy-gray { box-shadow: 0 6px 0 0 #94a3b8; }
    .btn-toy-gray:active { box-shadow: 0 0px 0 0 #94a3b8; }

    /* ========== トップページ専用リッチスタイル ========== */
    .circuit-pattern {
      background-color: #38bdf8;
      background-image: 
        radial-gradient(circle at center, rgba(255,255,255,0.8) 10%, transparent 10%),
        linear-gradient(90deg, rgba(255,255,255,0.2) 2px, transparent 2px),
        linear-gradient(rgba(255,255,255,0.2) 2px, transparent 2px);
      background-size: 40px 40px, 40px 40px, 40px 40px;
      background-position: 0 0, 19px 19px, 19px 19px;
    }

    .text-outline-blue {
      text-shadow: 
        -3px -3px 0 #1e3a8a, 3px -3px 0 #1e3a8a,
        -3px  3px 0 #1e3a8a, 3px  3px 0 #1e3a8a,
        -4px  0   0 #1e3a8a, 4px  0   0 #1e3a8a,
         0   -4px 0 #1e3a8a, 0    4px 0 #1e3a8a;
    }

    /* アニメーション */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-float-delay { animation: float 4s ease-in-out infinite; animation-delay: 2s; }

    @keyframes shine-sweep {
      0% { transform: translateX(-150%) skewX(-15deg); }
      100% { transform: translateX(200%) skewX(-15deg); }
    }
    .hover-shine-sweep:hover .shine-effect {
      animation: shine-sweep 0.8s ease-in-out;
    }

    /* スクロールバー */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.2); border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 4px; }
  </style>
</head>

  <script>
    const ROUTING = {
      'straight': [[0, 2]],
      'corner': [[0, 1]],
      't_shape': [[0, 1, 3]],
      'cross': [[0, 1, 2, 3]],
      'bridge': [[0, 2], [1, 3]],
      'led': [[0, 2]],
      'led_corner': [[0, 1]],
      'battery': [[0], [2]]
    };

    function getExitPorts(type, rotation, enterPort) {
      if (!ROUTING[type]) return [];
      const rotSteps = (rotation / 90) % 4;
      const internalEnter = (enterPort - rotSteps + 4) % 4;
      
      let exits = [];
      for (let group of ROUTING[type]) {
        if (group.includes(internalEnter)) {
          for (let p of group) {
            if (p !== internalEnter) exits.push((p + rotSteps) % 4);
          }
          break;
        }
      }
      return exits;
    }

          break;
        case 'bridge':
          const vPowered = isPortPowered(0) || isPortPowered(2);
          const vColor = vPowered ? '#fbbf24' : '#64748b';
          const hPowered = isPortPowered(1) || isPortPowered(3);
          const hColor = hPowered ? '#fbbf24' : '#64748b';
          
          if (!vPowered && !hPowered) addClass = ''; 
          else addClass = 'powered-glow';

          svgContent = `
            <line x1="32" y1="0" x2="32" y2="64" stroke="${vColor}" stroke-width="${strokeW}" />
            <path d="M 0 32 L 20 32 A 12 12 0 0 1 44 32 L 64 32" stroke="#ffffff" stroke-width="${strokeW + 6}" fill="none" />
            <path d="M 0 32 L 20 32 A 12 12 0 0 1 44 32 L 64 32" stroke="${hColor}" stroke-width="${strokeW}" fill="none" />
          `;
          break;
        case 'battery':
          const plusWireColor = powered ? '#fbbf24' : '#64748b';
          const minusWireColor = state.circuitCompleted ? '#fbbf24' : '#64748b';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="12" stroke="${plusWireColor}" stroke-width="${strokeW}" />
            <line x1="32" y1="52" x2="32" y2="64" stroke="${minusWireColor}" stroke-width="${strokeW}" />
            <rect x="24" y="8" width="16" height="4" fill="#94a3b8" />
            <rect x="12" y="12" width="40" height="40" rx="6" fill="#3b82f6" />
            <path d="M 12 18 Q 12 12 18 12 L 46 12 Q 52 12 52 18 L 52 32 L 12 32 Z" fill="#ef4444" />
            <text x="32" y="27" fill="white" font-size="16" text-anchor="middle" font-weight="bold">+</text>
            <text x="32" y="49" fill="white" font-size="20" text-anchor="middle" font-weight="bold">-</text>
          `; 
          break;
        case 'led':
          const lwC = powered ? '#fbbf24' : '#64748b';
          const lLight = powered ? '#fef08a' : '#94a3b8';
          const lStroke = powered ? '#eab308' : '#cbd5e1';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="20" stroke="${lwC}" stroke-width="${strokeW}" />
            <line x1="32" y1="44" x2="32" y2="64" stroke="${lwC}" stroke-width="${strokeW}" />
            <circle cx="32" cy="32" r="16" fill="${lLight}" stroke="${lStroke}" stroke-width="4" />
          `; break;
        case 'led_corner':
          const lcwC = powered ? '#fbbf24' : '#64748b';
          const lcLight = powered ? '#fef08a' : '#94a3b8';
          const lcStroke = powered ? '#eab308' : '#cbd5e1';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="20" stroke="${lcwC}" stroke-width="${strokeW}" />
            <line x1="44" y1="32" x2="64" y2="32" stroke="${lcwC}" stroke-width="${strokeW}" />
            <circle cx="32" cy="32" r="16" fill="${lcLight}" stroke="${lcStroke}" stroke-width="4" />
          `; break;
      }
      return `<svg viewBox="0 0 64 64" class="w-full h-full svg-piece ${addClass}" style="transform: rotate(${rotation}deg);">${svgContent}</svg>`;
    }

    function renderPuzzle() {
      const boardContainer = document.getElementById('board-container');
      boardContainer.innerHTML = '';
      boardContainer.style.gridTemplateColumns = `repeat(${state.config.cols}, 1fr)`;
      boardContainer.style.gridTemplateRows = `repeat(${state.config.rows}, 1fr)`;

      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          const cellData = state.board[y][x];
          const cell = document.createElement('div');
          
          let bgClass = 'bg-white';
          if (cellData.fixed) bgClass = 'bg-slate-100'; 
          if (cellData.type === 'empty') bgClass = 'bg-slate-200 shadow-inner cursor-pointer hover:bg-slate-300';
          else if (!cellData.fixed) bgClass += ' cursor-pointer hover:bg-blue-50'; 

          cell.className = `grid-cell rounded-md md:rounded-xl relative flex items-center justify-center overflow-hidden border-2 border-slate-300/50 ${bgClass}`;
          cell.dataset.x = x; cell.dataset.y = y;
          cell.innerHTML = getSvgIcon(cellData.type, cellData.rotation, cellData.powered, cellData.poweredPorts);
          boardContainer.appendChild(cell);
        }
      }

      const inventoryContainer = document.getElementById('inventory-container');
      inventoryContainer.innerHTML = '';
      let totalInventory = 0;
      
      Object.keys(state.inventory).forEach(type => {
        const count = state.inventory[type];
        totalInventory += count;
        
        const isSelected = state.selectedTool === type;
        const btn = document.createElement('button');
        btn.className = `flex flex-col items-center gap-1 transition-opacity outline-none ${count === 0 && !isSelected ? 'opacity-50 cursor-not-allowed' : ''}`;
        btn.onclick = () => { state.selectedTool = type; renderPuzzle(); };
        
        const boxClass = isSelected ? 'border-blue-500 bg-blue-100 scale-105 shadow-sm ring-2 ring-blue-200' : 'border-slate-300 bg-white hover:bg-slate-50 shadow-sm';
        btn.innerHTML = `
          <div class="w-10 h-10 md:w-14 md:h-14 rounded-xl border-[3px] flex items-center justify-center transition-all ${boxClass}">
            <div class="pointer-events-none w-7 h-7 md:w-10 md:h-10">${getSvgIcon(type, 0, false, [])}</div>
          </div>
          <span class="text-[10px] md:text-xs font-extrabold ${isSelected ? 'text-blue-600' : 'text-slate-600'}">のこり ${count}</span>
        `;
        inventoryContainer.appendChild(btn);
      });

      const switchArea = document.getElementById('switch-area');
      if (totalInventory === 0) {
        switchArea.innerHTML = `
          <button id="btn-test" class="mt-2 md:mt-3 mb-2 md:mb-3 w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black py-2 md:py-3.5 rounded-xl md:rounded-2xl text-base md:text-lg btn-toy btn-toy-yellow flex items-center justify-center gap-1 md:gap-2">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            スイッチ オン！
          </button>
        `;
        document.getElementById('btn-test').addEventListener('click', () => { if (!state.isSimulating) runSimulation(); });
      } else {
        switchArea.innerHTML = '';
      }

      const eraserBtn = document.getElementById('tool-eraser');
      if (state.selectedTool === 'eraser') {
        eraserBtn.classList.replace('border-slate-300', 'border-red-500');
        eraserBtn.classList.add('bg-red-100', 'text-red-600');
        eraserBtn.classList.remove('text-slate-600');
      } else {
        eraserBtn.classList.replace('border-red-500', 'border-slate-300');
        eraserBtn.classList.remove('bg-red-100', 'text-red-600');
        eraserBtn.classList.add('text-slate-600');
      }
    }

    document.getElementById('btn-back-home').addEventListener('click', () => switchView('home'));
    document.getElementById('btn-back-stages').addEventListener('click', () => switchView('stages'));
    document.getElementById('btn-back-stages-from-clear').addEventListener('click', () => {
      document.getElementById('modal-clear').classList.add('hidden');
      switchView('stages');
    });

    document.getElementById('tool-eraser').addEventListener('click', () => { state.selectedTool = 'eraser'; renderPuzzle(); });
    document.getElementById('btn-reset-confirm').addEventListener('click', () => { document.getElementById('modal-confirm').classList.remove('hidden'); });
    document.getElementById('btn-confirm-cancel').addEventListener('click', () => { document.getElementById('modal-confirm').classList.add('hidden'); });
    document.getElementById('btn-confirm-ok').addEventListener('click', () => { document.getElementById('modal-confirm').classList.add('hidden'); initGame(); });

    document.getElementById('btn-fail-ok').addEventListener('click', () => {
      document.getElementById('modal-fail').classList.add('hidden');
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      renderPuzzle();
    });

    document.getElementById('board-wrapper').addEventListener('click', (e) => {
      if (state.isSimulating) return; 
      
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      
      const cellEl = e.target.closest('.grid-cell');
      if (!cellEl) return;
      const x = parseInt(cellEl.dataset.x), y = parseInt(cellEl.dataset.y);
      const cellData = state.board[y][x];

      if (cellData.fixed) return; 

      if (state.selectedTool === 'eraser') {
        if (cellData.type !== 'empty') {
          state.inventory[cellData.type]++;
          state.board[y][x] = { type: 'empty', rotation: 0, fixed: false, powered: false, poweredPorts: [] };
        }
      } else {
        if (cellData.type === 'empty') {
          const tool = state.selectedTool;
          if (tool && state.inventory[tool] > 0) {
            state.inventory[tool]--;
            state.board[y][x] = { type: tool, rotation: 0, fixed: false, powered: false, poweredPorts: [] };
          }
        } else {
          state.board[y][x].rotation = (state.board[y][x].rotation + 90) % 360;
        }
      }
      renderPuzzle();
    });

    function runSimulation() {
      state.isSimulating = true;
      state.circuitCompleted = false;
      
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      renderPuzzle();

      let batteryNode = null;
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          if (state.board[y][x].type === 'battery') { batteryNode = { x, y }; break; }
        }
      }
      if (!batteryNode) { state.isSimulating = false; return; }

      let visited = Array.from({ length: state.config.rows }, () => Array(state.config.cols).fill(null).map(() => []));
      let reachedMinus = false;
      let pathSteps = []; 
      
      let queue = [];
      const startCell = state.board[batteryNode.y][batteryNode.x];
      const plusDir = (0 + startCell.rotation / 90) % 4; 

      queue.push({
        x: batteryNode.x,
        y: batteryNode.y,
        fromDir: null,
        step: 0,
        isStart: true
      });

      while (queue.length > 0) {
        const current = queue.shift();
        const { x, y, fromDir, step, isStart } = current;
        const currentCell = state.board[y][x];

        if (!pathSteps[step]) {
          pathSteps[step] = [];
        }

        if (isStart) {
          pathSteps[step].push({ x, y, isStart: true });
          visited[y][x].push(plusDir);
          
          const nx = x + DX[plusDir];
          const ny = y + DY[plusDir];
          if (nx >= 0 && nx < state.config.cols && ny >= 0 && ny < state.config.rows) {
            if (state.board[ny][nx].type !== 'empty') {
              queue.push({ x: nx, y: ny, fromDir: plusDir, step: step + 1 });
            }
          }
          continue;
        }

        const enterPort = (fromDir + 2) % 4;

        if (currentCell.type === 'battery') {
          const targetMinusPort = (2 + currentCell.rotation / 90) % 4;
          if (enterPort === targetMinusPort) { 
            reachedMinus = true; 
            pathSteps[step].push({ x, y, isGoal: true }); 
          }
          continue;
        }

        if (visited[y][x].includes(enterPort)) continue;

        const exits = getExitPorts(currentCell.type, currentCell.rotation, enterPort);
        if (exits.length === 0) continue; 

        visited[y][x].push(enterPort);
        exits.forEach(e => visited[y][x].push(e));

        pathSteps[step].push({ x, y, type: currentCell.type, enterPort, exits });

        for (let exitPort of exits) {
          const nx = x + DX[exitPort];
          const ny = y + DY[exitPort];
          if (nx >= 0 && nx < state.config.cols && ny >= 0 && ny < state.config.rows) {
            if (state.board[ny][nx].type !== 'empty') {
              queue.push({ x: nx, y: ny, fromDir: exitPort, step: step + 1 });
            }
          }
        }
      }

      let stepIndex = 0;
      const interval = setInterval(() => {
        if (stepIndex < pathSteps.length) {
          const updates = pathSteps[stepIndex];
          updates.forEach(cell => {
            if (cell.isGoal) {
              state.circuitCompleted = true;
            } else if (cell.isStart) {
              state.board[cell.y][cell.x].powered = true;
            } else {
              if (!state.board[cell.y][cell.x].poweredPorts) state.board[cell.y][cell.x].poweredPorts = [];
              state.board[cell.y][cell.x].poweredPorts.push(cell.enterPort, ...cell.exits);
              state.board[cell.y][cell.x].powered = true; 
            }
          });
          renderPuzzle();
          stepIndex++;
        } else {
          clearInterval(interval);
          state.isSimulating = false;
          
          let allPowered = true;
          for (let y = 0; y < state.config.rows; y++) {
            for (let x = 0; x < state.config.cols; x++) {
              const c = state.board[y][x];
              if (c.type !== 'empty' && !c.powered) {
                allPowered = false;
                break;
              }
            }
          }
          
          if (reachedMinus && allPowered) {
            userProgress[`${state.currentLevel}-${state.currentStage}`] = true;
            
            // 全10ステージをクリアしているかチェックする
            let allCleared = true;
            for (let i = 1; i <= 10; i++) {
              if (!userProgress[`${state.currentLevel}-${i}`]) {
                allCleared = false;
                break;
              }
            }
            
            const btnNext = document.getElementById('btn-next-stage');
            if (allCleared) {
              btnNext.innerText = 'レベルクリア！もどる';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                switchView('home');
              };
            } else if (state.currentStage < 10) {
              btnNext.innerText = 'つぎのもんだいへ';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                loadPuzzle(state.currentLevel, state.currentStage + 1);
              };
            } else {
              // 10問目だけど全部クリアしていない場合はステージ選択に戻る
              btnNext.innerText = 'もんだいをえらぶ';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                switchView('stages');
              };
            }
            setTimeout(() => { document.getElementById('modal-clear').classList.remove('hidden'); }, 300);
          } else {
            setTimeout(() => { document.getElementById('modal-fail').classList.remove('hidden'); }, 300);
          }
        }
      }, 200); 
    }

    switchView('home');

  </script>
