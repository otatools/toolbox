  <script>
    const ROUTING = {
      'straight': [[0, 2]],
      'corner': [[0, 1]],
      'double_corner': [[0, 1], [2, 3]],
      't_shape': [[0, 1, 3]],
      'cross': [[0, 1, 2, 3]],
      'bridge': [[0, 2], [1, 3]],
      'led': [[0, 2]],
      'led_corner': [[0, 1]],
      'battery': [[0], [2]]
    };

    function getExitPorts(type, rotation, enterPort) {
      if (!ROUTING[type]) return [];
      const rotSteps = (rotation / 90) % 4;
      const internalEnter = (enterPort - rotSteps + 4) % 4;
      
      let exits = [];
      for (let group of ROUTING[type]) {
        if (group.includes(internalEnter)) {
          for (let p of group) {
            if (p !== internalEnter) exits.push((p + rotSteps) % 4);
          }
          break;
        }
      }
      return exits;
    }

    function renderStages() {

    function loadPuzzle(level, stageNum) {
      state.currentLevel = level;
      state.currentStage = stageNum;

      let stageData = STAGE_DATA[level].stages[stageNum];
      if (!stageData) stageData = STAGE_DATA[1].stages[1];

      state.config.cols = stageData.cols;
      state.config.rows = stageData.rows;

      const isAnswerMode = window.location.hash === '#answer';
      let titleText = `レベル ${level} - ${stageNum}`;

      if (isAnswerMode && stageData.answer) {
        state.board = JSON.parse(JSON.stringify(stageData.answer));
        state.inventory = {};
        titleText += ' 【解答】';
      } else {
        state.board = JSON.parse(JSON.stringify(stageData.board));
        state.inventory = { ...stageData.inventory };
      }
      
      document.getElementById('puzzle-title').innerText = titleText;

      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].rotation = state.board[y][x].rotation || 0;
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      
      state.isSimulating = false;
      state.circuitCompleted = false;
      
      state.isViewingCircuit = false;
      const overlay = document.getElementById('overlay-return-clear');
      if (overlay) overlay.classList.add('hidden');

      state.selectedTool = Object.keys(state.inventory)[0] || 'eraser';
      
      switchView('puzzle');
      renderPuzzle();

      if (isAnswerMode && stageData.answer) {
        setTimeout(() => {
          if (!state.isSimulating) runSimulation();
        }, 500);
      }
    }

    function initGame() { loadPuzzle(state.currentLevel, state.currentStage); }

    function resizeBoard() {
      const wrapper = document.getElementById('board-wrapper');
      const container = document.getElementById('board-container');
      if (!wrapper || !container || document.getElementById('view-puzzle').classList.contains('hidden')) return;
      const w = wrapper.clientWidth - 32, h = wrapper.clientHeight - 32;
      const size = Math.floor(Math.min(w, h));
      container.style.width = `${size}px`;
      container.style.height = `${size}px`;
    }
    window.addEventListener('resize', resizeBoard);

    function getSvgIcon(type, rotation, powered, poweredPorts = []) {
      if (type === 'empty') return '';
      
      const isPortPowered = (internalPort) => {
        if (poweredPorts.length === 0) return powered; 
        const absolutePort = (internalPort + (rotation / 90)) % 4;
        return poweredPorts.includes(absolutePort);
      };

      const strokeW = 10;
      let svgContent = '';
      let addClass = powered ? 'powered-glow' : '';

      switch (type) {
        case 'straight':
          const swC = powered ? '#fbbf24' : '#64748b';
          svgContent = `<line x1="32" y1="0" x2="32" y2="64" stroke="${swC}" stroke-width="${strokeW}" />`; 
          break;
        case 'corner':
          const cwC = powered ? '#fbbf24' : '#64748b';
          svgContent = `<path d="M 32 0 Q 32 32 64 32" stroke="${cwC}" stroke-width="${strokeW}" fill="none" stroke-linecap="square"/>`; 
          break;
        case 'double_corner':
          const dcPw1 = isPortPowered(0) || isPortPowered(1);
          const dcColor1 = dcPw1 ? '#fbbf24' : '#64748b';
          const dcPw2 = isPortPowered(2) || isPortPowered(3);
          const dcColor2 = dcPw2 ? '#fbbf24' : '#64748b';
          
          if (!dcPw1 && !dcPw2) addClass = ''; 
          else addClass = 'powered-glow';

          svgContent = `
            <path d="M 32 0 Q 32 32 64 32" stroke="${dcColor1}" stroke-width="${strokeW}" fill="none" stroke-linecap="square"/>
            <path d="M 0 32 Q 32 32 32 64" stroke="${dcColor2}" stroke-width="${strokeW}" fill="none" stroke-linecap="square"/>
          `;
          break;
        case 't_shape':
          const twC = powered ? '#fbbf24' : '#64748b';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="32" stroke="${twC}" stroke-width="${strokeW}" />
            <line x1="0" y1="32" x2="64" y2="32" stroke="${twC}" stroke-width="${strokeW}" />
            <circle cx="32" cy="32" r="${strokeW/2}" fill="${twC}" />
          `;
          break;
        case 'cross':
          const crwC = powered ? '#fbbf24' : '#64748b';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="64" stroke="${crwC}" stroke-width="${strokeW}" />
            <line x1="0" y1="32" x2="64" y2="32" stroke="${crwC}" stroke-width="${strokeW}" />
          `;
          break;
        case 'bridge':
          const vPowered = isPortPowered(0) || isPortPowered(2);
          const vColor = vPowered ? '#fbbf24' : '#64748b';
          const hPowered = isPortPowered(1) || isPortPowered(3);
          const hColor = hPowered ? '#fbbf24' : '#64748b';
          
          if (!vPowered && !hPowered) addClass = ''; 
          else addClass = 'powered-glow';

          svgContent = `
            <line x1="32" y1="0" x2="32" y2="64" stroke="${vColor}" stroke-width="${strokeW}" />
            <path d="M 0 32 L 20 32 A 12 12 0 0 1 44 32 L 64 32" stroke="#ffffff" stroke-width="${strokeW + 6}" fill="none" />
            <path d="M 0 32 L 20 32 A 12 12 0 0 1 44 32 L 64 32" stroke="${hColor}" stroke-width="${strokeW}" fill="none" />
          `;
          break;
        case 'battery':
          const bPlusPw = isPortPowered(0);
          const bMinusPw = isPortPowered(2);
          const plusWireColor = bPlusPw ? '#fbbf24' : '#64748b';
          const minusWireColor = bMinusPw ? '#fbbf24' : '#64748b';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="12" stroke="${plusWireColor}" stroke-width="${strokeW}" />
            <line x1="32" y1="52" x2="32" y2="64" stroke="${minusWireColor}" stroke-width="${strokeW}" />
            <rect x="24" y="8" width="16" height="4" fill="#94a3b8" />
            <rect x="12" y="12" width="40" height="40" rx="6" fill="#3b82f6" />
            <path d="M 12 18 Q 12 12 18 12 L 46 12 Q 52 12 52 18 L 52 32 L 12 32 Z" fill="#ef4444" />
            <text x="32" y="27" fill="white" font-size="16" text-anchor="middle" font-weight="bold">+</text>
            <text x="32" y="49" fill="white" font-size="20" text-anchor="middle" font-weight="bold">-</text>
          `; 
          break;
        case 'led':
          const lwC = powered ? '#fbbf24' : '#64748b';
          const lLight = powered ? '#fef08a' : '#94a3b8';
          const lStroke = powered ? '#eab308' : '#cbd5e1';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="20" stroke="${lwC}" stroke-width="${strokeW}" />
            <line x1="32" y1="44" x2="32" y2="64" stroke="${lwC}" stroke-width="${strokeW}" />
            <circle cx="32" cy="32" r="16" fill="${lLight}" stroke="${lStroke}" stroke-width="4" />
          `; break;
        case 'led_corner':
          const lcwC = powered ? '#fbbf24' : '#64748b';
          const lcLight = powered ? '#fef08a' : '#94a3b8';
          const lcStroke = powered ? '#eab308' : '#cbd5e1';
          svgContent = `
            <line x1="32" y1="0" x2="32" y2="20" stroke="${lcwC}" stroke-width="${strokeW}" />
            <line x1="44" y1="32" x2="64" y2="32" stroke="${lcwC}" stroke-width="${strokeW}" />
            <circle cx="32" cy="32" r="16" fill="${lcLight}" stroke="${lcStroke}" stroke-width="4" />
          `; break;
      }
      return `<svg viewBox="0 0 64 64" class="w-full h-full svg-piece ${addClass}" style="transform: rotate(${rotation}deg);">${svgContent}</svg>`;
    }

    function renderPuzzle() {
      const boardContainer = document.getElementById('board-container');
      boardContainer.innerHTML = '';
      boardContainer.style.gridTemplateColumns = `repeat(${state.config.cols}, 1fr)`;
      boardContainer.style.gridTemplateRows = `repeat(${state.config.rows}, 1fr)`;

      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          const cellData = state.board[y][x];
          const cell = document.createElement('div');
          
          let bgClass = 'bg-white';
          if (cellData.fixed) bgClass = 'bg-slate-100'; 
          if (cellData.type === 'empty') bgClass = 'bg-slate-200 shadow-inner cursor-pointer hover:bg-slate-300';
          else if (!cellData.fixed) bgClass += ' cursor-pointer hover:bg-blue-50'; 

          cell.className = `grid-cell rounded-md md:rounded-xl relative flex items-center justify-center overflow-hidden border-2 border-slate-300/50 ${bgClass}`;
          cell.dataset.x = x; cell.dataset.y = y;
          cell.innerHTML = getSvgIcon(cellData.type, cellData.rotation, cellData.powered, cellData.poweredPorts);
          boardContainer.appendChild(cell);
        }
      }

      const inventoryContainer = document.getElementById('inventory-container');
      inventoryContainer.innerHTML = '';
      let totalInventory = 0;
      
      Object.keys(state.inventory).forEach(type => {
        const count = state.inventory[type];
        totalInventory += count;
        
        const isSelected = state.selectedTool === type;
        const btn = document.createElement('button');
        btn.className = `flex flex-col items-center gap-1 transition-opacity outline-none ${count === 0 && !isSelected ? 'opacity-50 cursor-not-allowed' : ''}`;
        btn.onclick = () => { state.selectedTool = type; renderPuzzle(); };
        
        const boxClass = isSelected ? 'border-blue-500 bg-blue-100 scale-105 shadow-sm ring-2 ring-blue-200' : 'border-slate-300 bg-white hover:bg-slate-50 shadow-sm';

      const switchArea = document.getElementById('switch-area');
      switchArea.innerHTML = '';
      
      if (totalInventory === 0) {
        switchArea.innerHTML += `
          <button id="btn-test" class="mb-2 md:mb-3 md:mt-3 w-full bg-yellow-400 hover:bg-yellow-500 text-yellow-900 font-black py-2 md:py-3.5 rounded-xl md:rounded-2xl text-base md:text-lg btn-toy btn-toy-yellow flex items-center justify-center gap-1 md:gap-2">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            スイッチ オン！
          </button>
        `;
      }

      // ★追加：保存された回答がある場合のみボタンを表示
      if (userAnswers[`${state.currentLevel}-${state.currentStage}`]) {
        switchArea.innerHTML += `
          <button id="btn-load-answer" class="mb-2 md:mb-3 w-full bg-green-500 hover:bg-green-600 text-white font-black py-2 md:py-3.5 rounded-xl md:rounded-2xl text-sm md:text-base btn-toy flex items-center justify-center gap-1 md:gap-2" style="box-shadow: 0 6px 0 0 #15803d;">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            せいかいした 回路をみる
          </button>
        `;
      }

      if (document.getElementById('btn-test')) {
        document.getElementById('btn-test').addEventListener('click', () => { if (!state.isSimulating) runSimulation(); });
      }

      // ★追加：ボタンを押したときに保存された回路を読み込む処理
      if (document.getElementById('btn-load-answer')) {
        document.getElementById('btn-load-answer').addEventListener('click', () => {
          const saved = userAnswers[`${state.currentLevel}-${state.currentStage}`];
          if (saved && !state.isSimulating) {
            state.board = JSON.parse(JSON.stringify(saved));
            
            // インベントリの残り数を再計算
            let stageData = STAGE_DATA[state.currentLevel].stages[state.currentStage];
            if (!stageData) stageData = STAGE_DATA[1].stages[1];
            state.inventory = { ...stageData.inventory };
            
            for (let y = 0; y < state.config.rows; y++) {
              for (let x = 0; x < state.config.cols; x++) {
                const c = state.board[y][x];
                if (!c.fixed && c.type !== 'empty') {
                  state.inventory[c.type]--;
                }
                // 通電状態はリセットしておく
                c.powered = false;
                c.poweredPorts = [];
              }
            }
            renderPuzzle();
          }
        });
      }

      const eraserBtn = document.getElementById('tool-eraser');
      if (state.selectedTool === 'eraser') {
        eraserBtn.classList.replace('border-slate-300', 'border-red-500');
        eraserBtn.classList.add('bg-red-100', 'text-red-600');
        eraserBtn.classList.remove('text-slate-600');
      } else {
        eraserBtn.classList.replace('border-red-500', 'border-slate-300');
        eraserBtn.classList.remove('bg-red-100', 'text-red-600');
        eraserBtn.classList.add('text-slate-600');
      }
    }

    document.getElementById('btn-back-home').addEventListener('click', () => switchView('home'));
    document.getElementById('btn-back-stages').addEventListener('click', () => switchView('stages'));
    
    document.getElementById('btn-back-stages-from-clear').addEventListener('click', () => {
      document.getElementById('modal-clear').classList.add('hidden');
      switchView('stages');
    });

    document.getElementById('btn-view-circuit').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('modal-clear').classList.add('hidden');
      document.getElementById('overlay-return-clear').classList.remove('hidden');
      setTimeout(() => {
        state.isViewingCircuit = true;
      }, 50);
    });

    document.getElementById('view-puzzle').addEventListener('click', (e) => {
      if (state.isViewingCircuit) {
        e.stopPropagation();
        e.preventDefault();
        state.isViewingCircuit = false;
        document.getElementById('overlay-return-clear').classList.add('hidden');
        document.getElementById('modal-clear').classList.remove('hidden');
      }
    }, true);

    document.getElementById('tool-eraser').addEventListener('click', () => { state.selectedTool = 'eraser'; renderPuzzle(); });
    document.getElementById('btn-reset-confirm').addEventListener('click', () => { document.getElementById('modal-confirm').classList.remove('hidden'); });
    document.getElementById('btn-confirm-cancel').addEventListener('click', () => { document.getElementById('modal-confirm').classList.add('hidden'); });
    document.getElementById('btn-confirm-ok').addEventListener('click', () => { document.getElementById('modal-confirm').classList.add('hidden'); initGame(); });

    document.getElementById('btn-fail-ok').addEventListener('click', () => {
      document.getElementById('modal-fail').classList.add('hidden');
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      renderPuzzle();
    });

    document.getElementById('board-wrapper').addEventListener('click', (e) => {
      if (state.isSimulating) return; 
      
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      
      const cellEl = e.target.closest('.grid-cell');
      if (!cellEl) return;
      const x = parseInt(cellEl.dataset.x), y = parseInt(cellEl.dataset.y);
      const cellData = state.board[y][x];

      if (cellData.fixed) return; 

      if (state.selectedTool === 'eraser') {
        if (cellData.type !== 'empty') {
          state.inventory[cellData.type]++;
          state.board[y][x] = { type: 'empty', rotation: 0, fixed: false, powered: false, poweredPorts: [] };
        }
      } else {
        const tool = state.selectedTool;
        if (cellData.type === 'empty') {
          if (tool && state.inventory[tool] > 0) {
            state.inventory[tool]--;
            state.board[y][x] = { type: tool, rotation: 0, fixed: false, powered: false, poweredPorts: [] };
          }
        } else {
          if (cellData.type === tool) {
            state.board[y][x].rotation = (state.board[y][x].rotation + 90) % 360;
          } else {
            if (tool && state.inventory[tool] > 0) {
              state.inventory[cellData.type]++;
              state.inventory[tool]--;
              state.board[y][x] = { type: tool, rotation: 0, fixed: false, powered: false, poweredPorts: [] };
            }
          }
        }
      }
      renderPuzzle();
    });

    function runSimulation() {
      state.isSimulating = true;
      state.circuitCompleted = false;
      
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          state.board[y][x].powered = false;
          state.board[y][x].poweredPorts = [];
        }
      }
      renderPuzzle();

      let batteryNodes = [];
      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          if (state.board[y][x].type === 'battery') { batteryNodes.push({ x, y }); }
        }
      }
      if (batteryNodes.length === 0) { state.isSimulating = false; return; }

      let nodes = [];
      let adj = {};
      let isPlus = new Set();
      let isMinus = new Set();
      let portToNode = {}; 
      let vIdToAbsPorts = {}; 

      function getGroups(type, rotation) {
        if (!ROUTING[type]) return [];
        const rotSteps = (rotation / 90) % 4;
        return ROUTING[type].map(group => group.map(p => (p + rotSteps) % 4));
      }

      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          const cell = state.board[y][x];
          if (cell.type === 'empty') continue;
          
          const groups = getGroups(cell.type, cell.rotation);
          groups.forEach((group, gIdx) => {
            let vId = `${x},${y},${gIdx}`;
            nodes.push(vId);
            adj[vId] = new Set();
            vIdToAbsPorts[vId] = group;
            
            group.forEach(p => {
              portToNode[`${x},${y},${p}`] = vId;
            });

            if (cell.type === 'battery') {
              if (gIdx === 0) isPlus.add(vId);
              if (gIdx === 1) isMinus.add(vId);
            }
          });
        }
      }

      for (let y = 0; y < state.config.rows; y++) {
        for (let x = 0; x < state.config.cols; x++) {
          for (let p = 0; p < 4; p++) {
            let v1 = portToNode[`${x},${y},${p}`];
            if (!v1) continue;
            
            let nx = x + DX[p];
            let ny = y + DY[p];
            let np = (p + 2) % 4;
            let v2 = portToNode[`${nx},${ny},${np}`];
            
            if (v2) {
              adj[v1].add(v2);
              adj[v2].add(v1);
            }
          }
        }
      }

      let V = {};
      nodes.forEach(v => V[v] = 0);
      isPlus.forEach(v => V[v] = 100);
      isMinus.forEach(v => V[v] = 0);

      for (let iter = 0; iter < 500; iter++) {
        let nextV = {};
        nodes.forEach(v => {
          if (isPlus.has(v)) { nextV[v] = 100; return; }
          if (isMinus.has(v)) { nextV[v] = 0; return; }
          
          let sum = 0;
          let count = 0;
          adj[v].forEach(neighbor => {
            sum += V[neighbor];
            count++;
          });
          nextV[v] = count > 0 ? sum / count : 0;
        });
        V = nextV;
      }

      let validDirectedEdges = {};
      nodes.forEach(v => validDirectedEdges[v] = []);
      nodes.forEach(u => {
        adj[u].forEach(v => {
          if (V[u] > V[v] + 0.1) {
            validDirectedEdges[u].push(v);
          }
        });
      });

      let queue = [];
      isPlus.forEach(v => {
        queue.push({ vId: v, step: 0 });
      });
      
      let pathSteps = []; 
      let visitedBfs = new Set();
      let reachedMinusSet = new Set();

      while(queue.length > 0) {
        let current = queue.shift();
        let vId = current.vId;
        let step = current.step;

        if (visitedBfs.has(vId)) continue;
        visitedBfs.add(vId);

        if (!pathSteps[step]) pathSteps[step] = [];
        pathSteps[step].push(vId);

        if (isMinus.has(vId)) {
          reachedMinusSet.add(vId);
          continue; 
        }

        validDirectedEdges[vId].forEach(neighbor => {
          if (!visitedBfs.has(neighbor)) {
            queue.push({ vId: neighbor, step: step + 1 });
          }
        });
      }

      let stepIndex = 0;
      const interval = setInterval(() => {
        if (stepIndex < pathSteps.length) {
          const updates = pathSteps[stepIndex];
          updates.forEach(vId => {
            const parts = vId.split(',');
            const x = parseInt(parts[0]);
            const y = parseInt(parts[1]);
            
            const cell = state.board[y][x];
            cell.powered = true;
            
            const absPorts = vIdToAbsPorts[vId];
            if (!cell.poweredPorts) cell.poweredPorts = [];
            absPorts.forEach(p => {
              if (!cell.poweredPorts.includes(p)) cell.poweredPorts.push(p);
            });
          });
          renderPuzzle();
          stepIndex++;
        } else {
          clearInterval(interval);
          state.isSimulating = false;
          
          let allPowered = true;
          let isValidCircuit = true; 
          
          for (let y = 0; y < state.config.rows; y++) {
            for (let x = 0; x < state.config.cols; x++) {
              const c = state.board[y][x];
              if (c.type !== 'empty') {
                if (!c.poweredPorts || c.poweredPorts.length === 0) {
                  allPowered = false;
                }

                const rotSteps = (c.rotation / 90) % 4;
                let absPorts = [];
                if (ROUTING[c.type]) {
                  ROUTING[c.type].forEach(group => {
                    group.forEach(p => {
                      absPorts.push((p + rotSteps) % 4);
                    });
                  });
                }

                for (let p of absPorts) {
                  const nx = x + DX[p];
                  const ny = y + DY[p];
                  const np = (p + 2) % 4;

                  if (nx < 0 || nx >= state.config.cols || ny < 0 || ny >= state.config.rows) {
                    isValidCircuit = false;
                    break;
                  }
                  
                  const neighbor = state.board[ny][nx];
                  if (neighbor.type === 'empty') {
                    isValidCircuit = false;
                    break;
                  }

                  let neighborHasPort = false;
                  const nRotSteps = (neighbor.rotation / 90) % 4;
                  if (ROUTING[neighbor.type]) {
                    ROUTING[neighbor.type].forEach(group => {
                      group.forEach(np_internal => {
                        if ((np_internal + nRotSteps) % 4 === np) {
                          neighborHasPort = true;
                        }
                      });
                    });
                  }

                  if (!neighborHasPort) {
                    isValidCircuit = false;
                    break;
                  }
                }
              }
              if (!isValidCircuit) break;
            }
            if (!isValidCircuit) break;
          }
          
          if (reachedMinusSet.size === isMinus.size && allPowered && isValidCircuit && isMinus.size > 0) {
            
            if (window.location.hash === '#answer') {
              return;
            }

            userProgress[`${state.currentLevel}-${state.currentStage}`] = true;
            localStorage.setItem('circuitPuzzleProgress', JSON.stringify(userProgress));

            // ★追加：正解した回路図をセーブデータに記録する
            userAnswers[`${state.currentLevel}-${state.currentStage}`] = state.board.map(row => 
              row.map(cell => ({ type: cell.type, rotation: cell.rotation, fixed: cell.fixed }))
            );
            localStorage.setItem('circuitPuzzleAnswers', JSON.stringify(userAnswers));

            let allCleared = true;
            for (let i = 1; i <= 10; i++) {
              if (!userProgress[`${state.currentLevel}-${i}`]) {
                allCleared = false;
                break;
              }
            }
            
            const btnNext = document.getElementById('btn-next-stage');
            if (allCleared) {
              btnNext.innerText = 'レベルクリア！もどる';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                switchView('home');
              };
            } else if (state.currentStage < 10) {
              btnNext.innerText = 'つぎのもんだいへ';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                loadPuzzle(state.currentLevel, state.currentStage + 1);
              };
            } else {
              btnNext.innerText = 'もんだいをえらぶ';
              btnNext.onclick = () => {
                document.getElementById('modal-clear').classList.add('hidden');
                switchView('stages');
              };
            }
            setTimeout(() => { document.getElementById('modal-clear').classList.remove('hidden'); }, 300);
          } else {
            setTimeout(() => { document.getElementById('modal-fail').classList.remove('hidden'); }, 300);
          }
        }
      }, 200); 
    }

    switchView('home');

  </script>
