<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教育アプリ｜夏の夜空 クイズマスター</title>
    <meta name="description" content="小学校４年理科の夏の夜空の単元への興味関心に役立つ大阪市の現役小学校教員が制作した、クイズアプリです。ota toolsのアプリの１つです。">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ota tools",
      "operatingSystem": "Web",
      "applicationCategory": "EducationalApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      },
      "author": {
        "@type": "Person",
        "name": "太田圭一"
      },
      "description": "大阪市の現役小学校教員が制作した、授業や家庭で使える無料の教育・学習用アプリです。",
      "audience": {
        "@type": "Audience",
        "audienceType": "小学校教員, 児童, 保護者"
      }
    }
    </script>  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        twinkle: 'twinkle 3s ease-in-out infinite',
                        pop: 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        shake: 'shake 0.4s ease-in-out',
                        floatUp: 'floatUp 4s ease-in forwards',
                        pulseFast: 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        jiggle: 'jiggle 0.5s ease-in-out infinite alternate',
                        float: 'float 4s ease-in-out infinite',
                        spinSlow: 'spin 12s linear infinite',
                    },
                    keyframes: {
                        twinkle: {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)' },
                            '50%': { opacity: 0.2, transform: 'scale(0.8)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.5)', opacity: 0 },
                            '100%': { transform: 'scale(1)', opacity: 1 },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-10px)' },
                            '40%, 80%': { transform: 'translateX(10px)' },
                        },
                        floatUp: {
                            '0%': { transform: 'translateY(100vh) rotate(0deg)', opacity: 1 },
                            '100%': { transform: 'translateY(-20vh) rotate(360deg)', opacity: 0 },
                        },
                        jiggle: {
                            '0%': { transform: 'rotate(-3deg) scale(1)' },
                            '100%': { transform: 'rotate(3deg) scale(1.05)' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-10px) rotate(3deg)' }
                        }
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-white/10 backdrop-blur-md border border-white/20 shadow-2xl rounded-3xl;
            }
            ruby {
                @apply leading-relaxed;
            }
            rt {
                @apply text-[11px] text-blue-200 font-normal;
            }
            .modal-content rt {
                @apply text-gray-500;
            }
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* スクロールバーのカスタマイズ（ノート画面用） */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.5); 
        }
        
        /* 称号リスト用スクロールバー */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5); 
            border-radius: 10px;
        }

        /* ================= 高さ（縦幅）が低い画面向けのアダプティブ調整 ================= */
        @media (max-height: 740px) {
            /* 全体の余白・パディング調整 */
            .glass-panel {
                padding: 1rem 1.25rem !important;
                border-radius: 1.5rem !important;
            }

            /* タイトル画面 */
            #start-screen h1 {
                font-size: 1.5rem !important;
                line-height: 1.25 !important;
            }
            #start-screen h1 .text-xl, #start-screen h1 .text-2xl {
                font-size: 1.15rem !important;
            }
            #start-screen .text-4xl, #start-screen .text-5xl, #start-screen .text-6xl {
                font-size: 2.5rem !important;
            }
            #start-screen .py-4 {
                padding-top: 0.25rem !important;
                padding-bottom: 0.25rem !important;
                margin-bottom: 0.5rem !important;
            }
            #start-screen .p-4 {
                padding: 0.75rem !important;
                margin-bottom: 0.75rem !important;
            }
            #start-screen .space-y-4 {
                margin-top: 0.25rem !important;
            }
            #start-screen .space-y-4 > button {
                padding-top: 0.75rem !important;
                padding-bottom: 0.75rem !important;
                font-size: 1rem !important;
            }

            /* クイズ画面 */
            #quiz-screen {
                padding: 1rem !important;
            }
            #question-text {
                font-size: 1.25rem !important;
                margin-bottom: 1rem !important;
            }
            #choices-container {
                @apply space-y-2.5 !important;
            }
            #choices-container button {
                padding-top: 0.75rem !important;
                padding-bottom: 0.75rem !important;
            }
            #choices-container button span.text-lg, #choices-container button span.text-xl {
                font-size: 1rem !important;
            }
            #quiz-bottle-container {
                padding-top: 0.25rem !important;
                padding-bottom: 0.25rem !important;
            }

            /* リザルト（結果画面） */
            #result-screen {
                padding: 1rem !important;
            }
            #result-screen h2 {
                font-size: 1.5rem !important;
                margin-bottom: 0.25rem !important;
            }
            #result-screen .text-5xl {
                font-size: 2.25rem !important;
                margin-bottom: 0.25rem !important;
            }
            #result-bottle-container {
                width: 6.5rem !important;
                height: 7.5rem !important;
                padding: 0.4rem !important;
                border-radius: 1rem !important;
            }
            #result-bottle-container .w-20 {
                width: 4rem !important;
                height: 4.8rem !important;
            }
            #xp-gain-display {
                font-size: 1rem !important;
                margin-bottom: 0.25rem !important;
                height: auto !important;
            }
            #result-screen .bg-black\/30 {
                padding: 0.75rem !important;
                margin-top: 0.25rem;
            }
            #result-screen .text-5xl {
                font-size: 2.25rem;
            }
            
            /* モーダル類のパディング調整 */
            #explanation-modal #modal-content {
                padding: 1.25rem !important;
            }
            #note-modal-content {
                padding: 1.25rem !important;
            }
        }

        /* 画面が非常に短い（スマホの横持ちなど）の時の極端な高密度表示 */
        @media (max-height: 600px) {
            #start-screen h1 {
                font-size: 1.25rem !important;
            }
            #start-screen .text-3xl, #start-screen .text-4xl {
                font-size: 1.5rem !important;
            }
            #start-screen .text-4xl, #start-screen .text-5xl, #start-screen .text-6xl {
                font-size: 1.8rem !important;
            }
            #question-text {
                font-size: 1.1rem !important;
                margin-bottom: 0.5rem !important;
            }
            #choices-container button {
                padding-top: 0.5rem !important;
                padding-bottom: 0.5rem !important;
            }
            #choices-container button span.text-lg, #choices-container button span.text-xl {
                font-size: 0.9rem !important;
            }
            #choices-container button .w-8 {
                width: 1.5rem !important;
                height: 1.5rem !important;
                margin-right: 0.5rem !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-gray-900 via-indigo-950 to-blue-900 text-white min-h-[100dvh] h-[100dvh] overflow-hidden font-sans select-none flex items-center justify-center">

    <!-- 背景の星々 -->
    <div id="stars-container" class="absolute inset-0 pointer-events-none overflow-hidden z-0"></div>

    <!-- メインコンテナ：縦幅制限を加え、スクロールさせず一画面に完全にフィット -->
    <div class="relative z-10 w-full max-w-lg md:max-w-2xl mx-auto p-3 sm:p-4 flex flex-col h-full max-h-[100dvh] sm:h-auto sm:max-h-[95dvh] transition-all duration-300">
        
        <!-- ================= START SCREEN ================= -->
        <div id="start-screen" class="glass-panel p-6 sm:p-8 text-center flex-grow flex flex-col justify-center transform transition-all duration-500 max-h-full overflow-y-auto">
            
            <div class="relative py-4 mb-2 select-none">
                <!-- 星雲をイメージしたバックグロー効果 -->
                <div class="absolute inset-0 bg-gradient-to-r from-blue-500/10 via-purple-500/15 to-pink-500/10 blur-3xl rounded-full scale-75 -z-10"></div>
                
                <!-- イラストをタイトルの左右に配置する横並びコンテナ -->
                <div class="flex items-center justify-center gap-3 sm:gap-6 max-w-full">
                    
                    <!-- 左側のイラスト：ゆらゆら浮かぶ望遠鏡ときらめく星 -->
                    <div class="flex-shrink-0 relative animate-float select-none">
                        <div class="text-4xl sm:text-5xl md:text-6xl">🔭</div>
                        <span class="absolute -left-2 -top-2 text-lg sm:text-xl animate-pulseFast">✨</span>
                    </div>

                    <!-- 中央のタイトル部分 -->
                    <div class="text-center">
                        <h1 class="text-2xl sm:text-3xl md:text-4xl font-black tracking-wider leading-tight drop-shadow-[0_0_15px_rgba(253,224,71,0.4)] transition-transform duration-300 hover:scale-105">
                            <span class="inline-block text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 via-amber-300 to-yellow-400">
                                <ruby>夏<rt class="tracking-normal">なつ</rt></ruby>の<ruby>夜空<rt class="tracking-normal">よぞら</rt></ruby>
                            </span>
                            <br>
                            <span class="inline-block text-xl sm:text-2xl md:text-3xl mt-1 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 via-teal-200 to-yellow-200 drop-shadow-[0_0_8px_rgba(34,211,238,0.3)]">
                                クイズマスター
                            </span>
                        </h1>
                    </div>

                    <!-- 右側のイラスト：宇宙をただよう土星ときらめく星 -->
                    <div class="flex-shrink-0 relative animate-float select-none" style="animation-delay: 0.5s;">
                        <div class="text-4xl sm:text-5xl md:text-6xl">🪐</div>
                        <span class="absolute -right-2 -top-2 text-lg sm:text-xl animate-pulse">✨</span>
                        <span class="absolute -right-3 bottom-1 text-md sm:text-lg animate-twinkle">🌟</span>
                    </div>

                </div>
            </div>
            
            <!-- プレイヤー情報パネル -->
            <div onclick="showRankModal()" class="bg-black/40 hover:bg-black/60 cursor-pointer rounded-2xl p-4 mb-4 border border-white/10 backdrop-blur-sm max-w-md mx-auto w-full transition-all duration-300 group relative shadow-lg hover:shadow-blue-500/20 transform hover:-translate-y-1">
                <div class="text-sm text-blue-200 mb-1 flex justify-between items-center">
                    <span>いまの<ruby>称号<rt>しょうごう</rt></ruby></span>
                    <span class="text-xs bg-blue-900/50 text-blue-300 px-2 py-1 rounded-full flex items-center gap-1 group-hover:bg-blue-600 group-hover:text-white transition-colors shadow-inner"><span>🏆</span> ずかんを見る</span>
                </div>
                <div class="flex items-center justify-center gap-2 mb-2">
                    <span id="start-rank-icon" class="text-3xl transition-transform group-hover:scale-110"></span>
                    <span id="start-rank-title" class="text-xl font-bold text-yellow-300"></span>
                </div>
                <div class="w-full bg-gray-700 rounded-full h-2.5 mb-1 overflow-hidden">
                    <div id="start-xp-bar" class="bg-gradient-to-r from-blue-400 to-purple-500 h-2.5 rounded-full transition-all duration-500 relative" style="width: 0%">
                        <div class="absolute right-0 top-0 bottom-0 w-4 bg-white/30 blur-[2px]"></div>
                    </div>
                </div>
                <div class="text-xs flex justify-between text-gray-300">
                    <span id="start-next-rank-hint" class="text-blue-300 font-mono"></span>
                    <span><span id="start-xp-text" class="font-mono font-bold">0</span> pt</span>
                </div>
            </div>

            <div class="space-y-3 sm:space-y-4 max-w-md mx-auto w-full">
                <button onclick="startQuiz()" class="bg-gradient-to-r from-yellow-400 to-orange-500 hover:from-yellow-300 hover:to-orange-400 text-yellow-900 font-black text-xl py-3.5 px-8 rounded-full shadow-[0_0_15px_rgba(250,204,21,0.5)] transform transition hover:scale-105 active:scale-95 w-full">
                    クイズに<ruby>挑戦<rt>ちょうせん</rt></ruby>！ ✨
                </button>
                
                <button onclick="showNoteScreen()" class="bg-blue-600/80 hover:bg-blue-500/80 border border-blue-400 text-white font-bold text-lg py-2.5 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 w-full flex items-center justify-center gap-2">
                    <span>📖</span> 星空ノートをみる
                </button>
            </div>
        </div>

        <!-- ================= QUIZ SCREEN ================= -->
        <div id="quiz-screen" class="hidden glass-panel p-6 sm:p-8 flex-grow flex flex-col justify-between transform transition-all duration-500 max-h-full overflow-y-auto">
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <span class="text-yellow-300 font-bold tracking-wider text-lg" id="question-counter">だい 1 もん</span>
                
                <!-- クイズ中の砂の小瓶 -->
                <div id="quiz-bottle-container" class="relative flex items-center gap-2 bg-black/40 px-3 py-1 rounded-2xl border border-white/10 backdrop-blur-sm transform transition duration-300">
                    <span class="text-[10px] text-blue-200 font-bold tracking-widest">星のすな</span>
                    <div class="relative w-8 h-10 flex items-center justify-center">
                        <!-- ガラス瓶＆砂 一体型SVG -->
                        <svg viewBox="0 0 100 120" class="absolute inset-0 w-full h-full z-10 pointer-events-none drop-shadow-[0_0_4px_rgba(253,186,116,0.3)]">
                            <defs>
                                <clipPath id="quiz-bottle-clip">
                                    <path d="M35 15 H65 V25 L80 40 V100 A15 15 0 0 1 65 115 H35 A15 15 0 0 1 20 100 V40 L35 25 Z" />
                                </clipPath>
                                <linearGradient id="quiz-sand-grad" x1="0" y1="1" x2="0" y2="0">
                                    <stop offset="0%" stop-color="#f97316" />
                                    <stop offset="50%" stop-color="#facc15" />
                                    <stop offset="100%" stop-color="#fef08a" />
                                </linearGradient>
                            </defs>
                            <!-- 砂の矩形 -->
                            <rect id="quiz-bottle-sand" x="20" y="115" width="60" height="0" fill="url(#quiz-sand-grad)" clip-path="url(#quiz-bottle-clip)" class="transition-all duration-1000 ease-out" />
                            <!-- 外枠ストローク -->
                            <path d="M35 15 H65 V25 L80 40 V100 A15 15 0 0 1 65 115 H35 A15 15 0 0 1 20 100 V40 L35 25 Z" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="6" />
                            <rect x="38" y="5" width="24" height="10" rx="3" fill="#854d0e" />
                        </svg>
                    </div>
                    <span id="quiz-sand-count" class="text-sm font-black text-yellow-300">0</span>
                </div>
            </div>
            
            <div class="w-full bg-gray-700/50 rounded-full h-2.5 mb-6 overflow-hidden flex-shrink-0">
                <div class="bg-gradient-to-r from-yellow-400 to-yellow-300 h-2.5 rounded-full transition-all duration-500 ease-out w-0" id="progress-bar"></div>
            </div>

            <div class="flex-grow flex flex-col justify-center min-h-0">
                <h2 id="question-text" class="text-2xl sm:text-3xl font-bold mb-6 leading-tight drop-shadow-md text-center overflow-y-auto max-h-[30dvh] custom-scrollbar px-1">
                    <!-- 問題文 -->
                </h2>

                <div id="choices-container" class="space-y-4 flex-shrink-0">
                    <!-- 選択肢 -->
                </div>
            </div>
        </div>

        <!-- ================= RESULT SCREEN ================= -->
        <div id="result-screen" class="hidden glass-panel p-6 sm:p-8 text-center flex-grow flex flex-col justify-center relative overflow-hidden transform transition-all duration-500 max-h-full overflow-y-auto">
            <div id="celebration-container" class="absolute inset-0 pointer-events-none z-0"></div>
            <div class="relative z-10 w-full flex flex-col justify-between h-full">
                <div>
                    <h2 class="text-3xl font-black mb-1 text-yellow-300 drop-shadow-lg"><ruby>結果発表<rt>けっかはっぴょう</rt></ruby>！</h2>
                    <div class="text-5xl font-black mb-3">
                        <span id="final-score" class="text-white"></span> <span class="text-2xl text-blue-200">/ 5 <ruby>問正解<rt>もんせいかい</rt></ruby></span>
                    </div>
                </div>

                <!-- 左右2カラム構造 of コンテンツエリア -->
                <div class="flex flex-col md:flex-row items-center justify-center gap-4 sm:gap-6 my-2 w-full flex-grow min-h-0">
                    
                    <!-- 左カラム: 集めた星の砂ボトル -->
                    <div class="flex flex-col items-center justify-center w-full md:w-1/3 flex-shrink-0">
                        <div id="result-bottle-container" class="relative bg-black/40 p-5 rounded-3xl border border-white/10 backdrop-blur-sm flex flex-col items-center gap-1 transform transition duration-500 w-36 h-40 flex-shrink-0 justify-center">
                            <div class="relative w-20 h-24">
                                <!-- 大きなボトル＆砂 一体型SVG -->
                                <svg viewBox="0 0 100 120" class="absolute inset-0 w-full h-full z-10 pointer-events-none drop-shadow-[0_0_10px_rgba(253,186,116,0.6)]">
                                    <defs>
                                        <clipPath id="result-bottle-clip">
                                            <path d="M35 15 H65 V25 L80 40 V100 A15 15 0 0 1 65 115 H35 A15 15 0 0 1 20 100 V40 L35 25 Z" />
                                        </clipPath>
                                        <linearGradient id="result-sand-grad" x1="0" y1="1" x2="0" y2="0">
                                            <stop offset="0%" stop-color="#f97316" />
                                            <stop offset="50%" stop-color="#facc15" />
                                            <stop offset="100%" stop-color="#fef08a" />
                                        </linearGradient>
                                    </defs>
                                    <rect id="result-bottle-sand" x="20" y="115" width="60" height="0" fill="url(#result-sand-grad)" clip-path="url(#result-bottle-clip)" class="transition-all duration-1000 ease-out" />
                                    <path d="M35 15 H65 V25 L80 40 V100 A15 15 0 0 1 65 115 H35 A15 15 0 0 1 20 100 V40 L35 25 Z" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="5" />
                                    <rect id="result-cork" x="38" y="5" width="24" height="10" rx="3" fill="#854d0e" class="transition-all duration-700 origin-bottom" />
                                </svg>
                            </div>
                            <div class="text-[10px] text-yellow-300 font-bold tracking-widest mt-1">集めた星のすな</div>
                        </div>
                    </div>

                    <!-- 右カラム: 獲得XPと称号カード -->
                    <div class="flex-grow w-full md:w-2/3 flex flex-col justify-center min-h-0">
                        <div class="text-lg sm:text-xl text-green-300 font-bold mb-1.5 animate-pulseFast h-8 flex items-center justify-center md:justify-start" id="xp-gain-display">
                            すなをXPに変えるよ！
                        </div>
                        
                        <div class="bg-black/30 rounded-2xl p-4 sm:p-5 border border-white/10 backdrop-blur-sm relative text-left">
                            <div id="rank-up-badge" class="hidden absolute -top-4 -right-4 bg-red-500 text-white font-bold text-sm px-4 py-1.5 rounded-full animate-bounce shadow-lg rotate-12 border-2 border-white z-20">ランクアップ!</div>
                            
                            <div class="text-xs text-blue-200 mb-1 text-center md:text-left">きみの<ruby>称号<rt>しょうごう</rt></ruby>は...</div>
                            
                            <div class="flex flex-col sm:flex-row items-center gap-3 justify-center sm:justify-start">
                                <div id="rank-icon" class="text-5xl transition-transform duration-300"></div>
                                <div id="rank-title" class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-400 text-center sm:text-left"></div>
                            </div>
                            
                            <!-- 経験値バー -->
                            <div class="mt-3 w-full bg-gray-700 rounded-full h-3 mb-1 overflow-visible relative">
                                <div id="result-xp-bar" class="bg-gradient-to-r from-blue-400 to-purple-500 h-3 rounded-full relative transition-[width] duration-75 ease-linear" style="width: 0%">
                                    <div class="absolute right-0 top-1/2 -translate-y-1/2 flex h-3 w-3 items-center justify-center translate-x-1/2 z-10">
                                        <div class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></div>
                                        <div class="relative inline-flex rounded-full h-2 w-2 bg-white shadow-[0_0_8px_#fff]"></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-center text-[10px] text-gray-400 px-1 mt-1 font-mono">
                                <span id="next-rank-text"></span>
                                <span id="numerical-xp-display">0 pt</span>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ボタンエリア -->
                <div class="flex flex-col sm:flex-row gap-3 mt-3 max-w-lg mx-auto w-full flex-shrink-0">
                    <button id="next-attempt-btn" onclick="startQuiz()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 text-white font-bold text-lg py-2.5 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 flex-grow opacity-50 cursor-not-allowed" disabled>
                        チャージ中... ⏳
                    </button>
                    <button onclick="returnToStart()" class="bg-gray-600 hover:bg-gray-500 text-white font-bold text-sm py-2.5 px-8 rounded-full transform transition hover:scale-105 active:scale-95 flex-grow">
                        スタート画面にもどる
                    </button>
                </div>

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // --- 重み付けを用いたスマート問題選択システム ---
        function selectQuestionsWeighted(questions, count) {
            const candidates = [...questions];
            const selected = [];
            
            for (let step = 0; step < count; step++) {
                if (candidates.length === 0) break;
                
                // 各問題の重みを計算
                const weights = candidates.map(q => {
                    const status = userData.history[q.id] || "unseen";
                    if (status === "seen") {
                        return 10; // 間違えた問題を最優先（重み10）
                    } else if (status === "unseen") {
                        return 5;  // 見たことがない問題を優先（重み5）
                    } else {
                        return 1;  // すでに正解した問題は低めに出現（重み1）
                    }
                });
                
                // 総重量を計算
                const totalWeight = weights.reduce((sum, w) => sum + w, 0);
                let randomValue = Math.random() * totalWeight;
                
                let selectedIndex = 0;
                for (let i = 0; i < candidates.length; i++) {
                    randomValue -= weights[i];
                    if (randomValue <= 0) {
                        selectedIndex = i;
                        break;
                    }
                }
                
                // 選択された問題を決定
                selected.push(candidates[selectedIndex]);
                // 重複して出題されないように、今回のクイズの候補リストから除外
                candidates.splice(selectedIndex, 1);
            }
            
            return selected;
        }

        function shootSandParticles(fromX, fromY, toX, toY, onImpact) {
            const count = 12;
            let finished = 0;
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.innerHTML = ['⭐','✨','🌟','·'][Math.floor(Math.random() * 4)];
                    particle.className = 'fixed text-xl z-50 pointer-events-none select-none text-yellow-300 drop-shadow-[0_0_5px_rgba(253,186,116,0.8)]';
                    particle.style.left = '0px';
                    particle.style.top = '0px';
                    particle.style.transform = `translate3d(${fromX}px, ${fromY}px, 0)`;
                    document.body.appendChild(particle);

                    const startTime = performance.now();
                    const duration = 600 + Math.random() * 300; 

                    const cpX = (fromX + toX) / 2 + (Math.random() - 0.5) * 160;
                    const cpY = Math.min(fromY, toY) - 100 - Math.random() * 80;

                    function update(time) {
                        const elapsed = time - startTime;
                        const t = Math.min(elapsed / duration, 1);

                        const x = (1 - t) * (1 - t) * fromX + 2 * (1 - t) * t * cpX + t * t * toX;
                        const y = (1 - t) * (1 - t) * fromY + 2 * (1 - t) * t * cpY + t * t * toY;

                        particle.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${1.2 * (1 - t) + 0.3}) rotate(${t * 360}deg)`;
                        particle.style.opacity = 1 - t * 0.4;

                        if (t < 1) {
                            requestAnimationFrame(update);
                        } else {
                            particle.remove();
                            finished++;
                            if (finished === 1) {
                                if (onImpact) onImpact();
                            }
                        }
                    }
                    requestAnimationFrame(update);
                }, i * 50);
            }
        }

                icon.innerText = '⭕️';
                title.innerText = 'せいかい！';
                title.className = 'text-2xl font-black mb-2 text-green-500';
            } else {
                icon.innerText = '❌';
                title.innerText = 'ざんねん...';
                title.className = 'text-2xl font-black mb-2 text-red-500';
            }
            
            document.getElementById('explanation-text').innerHTML = q.e;
            
            const imgContainer = document.getElementById('explanation-image-container');
            const imgElement = document.getElementById('explanation-img');
            
            imgElement.classList.remove('opacity-100');
            imgElement.classList.add('opacity-0');
            
            const filename = getImageFilename(q.id);
            imgElement.src = filename;
            
            imgContainer.classList.remove('hidden');
            imgContainer.classList.add('block');
            
            imgElement.onload = function() {
                imgElement.classList.remove('opacity-0');
                imgElement.classList.add('opacity-100');
            };
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                content.classList.add('animate-pop');
            });
        }

        function nextQuestion() {
            const modal = document.getElementById('explanation-modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            content.classList.remove('animate-pop');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                currentQuestionIndex++;
                if (currentQuestionIndex < TOTAL_QUESTIONS) {
                    loadQuestion();
                } else {
                    processResult();
                }
            }, 300);
        }

        // --- 結果処理と称号判定 ---
        function processResult() {
            document.getElementById('progress-bar').style.width = '100%';
            
            const earnedXp = score * 100;
            const oldXp = userData.xp;
            const targetXp = oldXp + earnedXp;

            const nextBtn = document.getElementById('next-attempt-btn');
            nextBtn.disabled = true;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            nextBtn.innerText = "チャージ中... ⏳";
            
            showScreen('result-screen');
            document.getElementById('final-score').innerText = score;
            
            const resBottleSand = document.getElementById('result-bottle-sand');
            const initialHeight = 100 * (score * 20 / 100);
            resBottleSand.setAttribute('height', initialHeight);
            resBottleSand.setAttribute('y', 115 - initialHeight);
            
            const cork = document.getElementById('result-cork');
            cork.style.transform = 'translateY(0px) rotate(0deg)';
            cork.style.opacity = '1';

            updateXPBarAndRankRealtime(oldXp);

            setTimeout(() => {
                pourSandAndChargeXP(earnedXp, oldXp, targetXp);
            }, 1500);
        }

        function pourSandAndChargeXP(earnedXp, oldXp, targetXp) {
            const bottleContainer = document.getElementById('result-bottle-container');
            const resBottleSand = document.getElementById('result-bottle-sand');
            const cork = document.getElementById('result-cork');
            const xpGainDisplay = document.getElementById('xp-gain-display');
            
            if (earnedXp === 0) {
                xpGainDisplay.innerHTML = "<ruby>今回<rt>こんかい</rt></ruby>は<ruby>星<rt>ほし</rt></ruby>のすながたまりませんでした 🪐";
                xpGainDisplay.className = "text-base sm:text-xl text-orange-300 font-bold mb-2 h-8 flex items-center justify-center md:justify-start";
                
                userData.xp = targetXp;
                saveData();
                updateStartScreenInfo();

                const nextBtn = document.getElementById('next-attempt-btn');
                nextBtn.disabled = false;
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                nextBtn.innerText = "つぎの挑戦へ 🚀";
                return;
            }

            cork.style.transform = 'translateY(-40px) rotate(30deg) scale(0.8)';
            cork.style.opacity = '0';
            bottleContainer.classList.add('animate-jiggle');
            
            const bRect = bottleContainer.getBoundingClientRect();
            const xpBar = document.getElementById('result-xp-bar');
            const xRect = xpBar.getBoundingClientRect();
            
            const fromX = bRect.left + bRect.width / 2;
            const fromY = bRect.top + 30;
            const toX = xRect.left + xRect.width / 2;
            const toY = xRect.top + xRect.height / 2;

            const particleCount = 10 + score * 3;
            let activeCount = particleCount;
            let isAnimating = false;
            let animationStartTime = null;
            const animationDuration = particleCount * 150 + 300;

            function animateXp(timestamp) {
                if (!isAnimating) return;
                if (!animationStartTime) animationStartTime = timestamp;
                
                const elapsed = timestamp - animationStartTime;
                let progress = Math.min(elapsed / animationDuration, 1);
                progress = 1 - Math.pow(1 - progress, 3); // easeOutCubic
                
                const currentDisplayXp = oldXp + (targetXp - oldXp) * progress;
                updateXPBarAndRankRealtime(Math.floor(currentDisplayXp));
                
                if (progress < 1) {
                    requestAnimationFrame(animateXp);
                } else {
                    isAnimating = false;
                    updateXPBarAndRankRealtime(targetXp);
                }
            }

            xpGainDisplay.innerHTML = "<ruby>星<rt>ほし</rt></ruby>のすなをチャージ<ruby>中<rt>ちゅう</rt></ruby>！ ✨";
            xpGainDisplay.className = "text-base sm:text-xl text-yellow-300 font-bold mb-2 animate-pulseFast h-8 flex items-center justify-center md:justify-start";

            for (let i = 0; i < particleCount; i++) {
                setTimeout(() => {
                    const percentLeft = Math.max(0, (score * 20) * (1 - (i + 1) / particleCount));
                    const currentHeight = 100 * (percentLeft / 100);
                    resBottleSand.setAttribute('height', currentHeight);
                    resBottleSand.setAttribute('y', 115 - currentHeight);

                    shootSandParticles(fromX, fromY, toX, toY, () => {
                        if (!isAnimating && activeCount === particleCount) {
                            isAnimating = true;
                            requestAnimationFrame(animateXp);
                        }

                        activeCount--;
                        if (activeCount === 0) {
                            isAnimating = false;
                            updateXPBarAndRankRealtime(targetXp);
                            
                            bottleContainer.classList.remove('animate-jiggle');
                            
                            userData.xp = targetXp;
                            saveData();
                            updateStartScreenInfo();

                            xpGainDisplay.innerHTML = `+ ${earnedXp} pt チャージ<ruby>完了<rt>かんりょう</rt></ruby>！ 🌟`;
                            xpGainDisplay.className = "text-base sm:text-xl text-green-300 font-bold mb-2 h-8 flex items-center justify-center md:justify-start";

                            const nextBtn = document.getElementById('next-attempt-btn');
                            nextBtn.disabled = false;
                            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            nextBtn.innerText = "つぎの挑戦へ 🚀";
                        }
                    });
                }, i * 150);
            }
        }

        function updateXPBarAndRankRealtime(currentXp) {
            const rank = getRankObj(currentXp);
            const nextRank = ranks.find(r => r.min > currentXp) || null;
            
            const rankIcon = document.getElementById('rank-icon');
            const rankTitle = document.getElementById('rank-title');
            const nextText = document.getElementById('next-rank-text');
            const bar = document.getElementById('result-xp-bar');
            const numericalXp = document.getElementById('numerical-xp-display');
            
            const previouslyShownTitle = rankTitle.innerHTML;
            
            rankIcon.innerText = rank.icon;
            rankTitle.innerHTML = rank.title;
            
            if (previouslyShownTitle && previouslyShownTitle !== rank.title) {
                triggerRankUpCelebration();
            }
            
            if (nextRank) {
                const range = nextRank.min - rank.min;
                const current = currentXp - rank.min;
                const percent = Math.min(100, Math.max(0, (current / range) * 100));
                
                bar.style.width = `${percent}%`;
                nextText.innerHTML = `つぎの<ruby>称号<rt>しょうごう</rt></ruby>まで あと ${nextRank.min - currentXp} pt`;
                numericalXp.innerText = `${currentXp} / ${nextRank.min} pt`;
            } else {
                bar.style.width = '100%';
                nextText.innerHTML = "MAXレベル<ruby>到達<rt>とうたつ</rt></ruby>！すごい！";
                numericalXp.innerText = `${currentXp} pt`;
            }
        }

        function triggerRankUpCelebration() {
            const badge = document.getElementById('rank-up-badge');
            badge.classList.remove('hidden');
            shootStars();
            
            const rankIcon = document.getElementById('rank-icon');
            rankIcon.classList.add('animate-ping');
            setTimeout(() => rankIcon.classList.remove('animate-ping'), 1000);
        }

        function shootStars() {
            const container = document.getElementById('celebration-container');
            container.innerHTML = '';
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.innerHTML = ['⭐','✨','🌟','🪐','🚀'][Math.floor(Math.random()*5)];
                star.className = 'absolute text-3xl opacity-0 animate-floatUp';
                star.style.left = `${Math.random() * 100}%`;
                star.style.bottom = `-10%`;
                star.style.animationDelay = `${Math.random() * 1.5}s`;
                star.style.animationDuration = `${Math.random() * 2 + 3}s`;
                container.appendChild(star);
            }
        }

        // --- 星空ノート（図鑑）ロジック ---
        function showNoteScreen() {
            showScreen('note-screen');
            renderNoteList();
        }

        function renderNoteList() {
            const container = document.getElementById('note-container');
            container.innerHTML = '';
            
            let clearCount = 0;
            document.getElementById('note-total-count').innerText = allQuestions.length;

            allQuestions.forEach((q, index) => {
                const status = userData.history[q.id] || "unseen";
                const item = document.createElement('div');
                item.className = 'w-full rounded-2xl p-3.5 flex items-center transition-all shadow-md flex-shrink-0 ';
                
                let iconStr = '';
                let contentHTML = '';
                
                if (status === "cleared") {
                    clearCount++;
                    item.className += 'bg-gradient-to-r from-blue-800 to-indigo-800 border border-blue-400 cursor-pointer hover:bg-blue-700 transform hover:scale-[1.01] active:scale-[0.99]';
                    iconStr = '<div class="w-11 h-11 flex-shrink-0 bg-yellow-400 rounded-full flex items-center justify-center text-xl shadow-[0_0_10px_rgba(250,204,21,0.5)]">⭐</div>';
                    
                    const plainQ = q.q.replace(/<rt[^>]*>.*?<\/rt>/g, '').replace(/<[^>]*>?/gm, '');
                    const shortQ = plainQ.length > 20 ? plainQ.substring(0, 20) + '...' : plainQ;
                    
                    contentHTML = `
                        <div class="ml-3 flex-grow text-left">
                            <div class="text-[11px] text-yellow-300 font-bold mb-0.5">クリア済み！</div>
                            <div class="text-sm font-medium text-white">${shortQ}</div>
                        </div>
                    `;
                    item.onclick = () => openNoteModal(q);
                    
                } else if (status === "seen") {
                    item.className += 'bg-gray-800/80 border border-gray-500 cursor-pointer opacity-80 hover:bg-gray-700/80';
                    iconStr = '<div class="w-11 h-11 flex-shrink-0 bg-gray-600 rounded-full flex items-center justify-center text-xl">👀</div>';
                    
                    const plainQ = q.q.replace(/<rt[^>]*>.*?<\/rt>/g, '').replace(/<[^>]*>?/gm, '');
                    const shortQ = plainQ.length > 20 ? plainQ.substring(0, 20) + '...' : plainQ;

                    contentHTML = `
                        <div class="ml-3 flex-grow text-left">
                            <div class="text-[11px] text-gray-400 mb-0.5">みつけたけど、まだ正解していない</div>
                            <div class="text-sm text-gray-300">${shortQ}</div>
                        </div>
                    `;
                    item.onclick = () => showToast("この問題はまだ正解していないよ。クイズで正解して解説をアンロックしよう！");
                } else {
                    item.className += 'bg-black/50 border border-dashed border-gray-600 opacity-50';
                    iconStr = '<div class="w-11 h-11 flex-shrink-0 bg-gray-800 rounded-full flex items-center justify-center text-xl text-gray-500">🔒</div>';
                    contentHTML = `
                        <div class="ml-3 flex-grow text-left">
                            <div class="text-sm text-gray-500 font-bold tracking-widest">？？？？？？</div>
                        </div>
                    `;
                    item.onclick = () => showToast("この問題はまだ見つけていないよ。クイズを何度も遊んで探してみよう！");
                }
                
                item.innerHTML = iconStr + contentHTML;
                container.appendChild(item);
            });
            
            document.getElementById('note-clear-count').innerText = clearCount;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function openNoteModal(q) {
            document.getElementById('note-modal-q').innerHTML = q.q;
            document.getElementById('note-modal-a').innerHTML = q.c[q.a];
            document.getElementById('note-modal-e').innerHTML = q.e;
            
            const imgContainer = document.getElementById('note-image-container');
            const imgElement = document.getElementById('note-img');
            
            imgElement.classList.remove('opacity-100');
            imgElement.classList.add('opacity-0');
            
            const filename = getImageFilename(q.id);
            imgElement.src = filename;
            
            imgContainer.classList.remove('hidden');
            imgContainer.classList.add('block');
            
            imgElement.onload = function() {
                imgElement.classList.remove('opacity-0');
                imgElement.classList.add('opacity-100');
            };
            
            const modal = document.getElementById('note-modal');
            const content = document.getElementById('note-modal-content');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-90');
            });
        }

        function closeNoteModal() {
            const modal = document.getElementById('note-modal');
            const content = document.getElementById('note-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // --- 称号ずかんモーダルロジック ---
        function showRankModal() {
            const modal = document.getElementById('rank-modal');
            const content = document.getElementById('rank-modal-content');
            const container = document.getElementById('rank-list-container');
            
            const currentXp = userData.xp;
            const currentRankObj = getRankObj(currentXp);
            const currentRankIndex = ranks.findIndex(r => r.min === currentRankObj.min);
            const nextRank = ranks.find(r => r.min > currentXp) || null;
            const remainingCount = ranks.length - 1 - currentRankIndex;
            
            const summaryEl = document.getElementById('rank-modal-summary');
            if (remainingCount > 0) {
                summaryEl.innerHTML = `まだ見ぬ称号は あと <span class="text-xl text-yellow-300 mx-1">${remainingCount}</span> 個！`;
            } else {
                summaryEl.innerHTML = `<span class="text-yellow-300">すべての称号をあつめた！きみは真のマスターだ！</span>`;
            }
            
            const hintEl = document.getElementById('rank-modal-next-hint');
            if (nextRank) {
                hintEl.innerHTML = `つぎの称号まで あと <span class="font-bold text-white text-sm">${nextRank.min - currentXp}</span> pt`;
            } else {
                hintEl.innerHTML = "";
            }

            container.innerHTML = '';
            
            ranks.forEach((r, idx) => {
                const isUnlocked = currentXp >= r.min;
                const isCurrent = idx === currentRankIndex;
                
                const item = document.createElement('div');
                item.className = `relative flex items-center gap-4 ${isCurrent ? 'my-1' : ''}`;
                
                const iconBox = document.createElement('div');
                iconBox.className = `w-14 h-14 rounded-full flex items-center justify-center text-2xl flex-shrink-0 border-4 relative z-10 transition-transform ${
                    isCurrent ? 'bg-purple-900 border-purple-400 shadow-[0_0_15px_rgba(168,85,247,0.8)] scale-110' :
                    isUnlocked ? 'bg-gray-800 border-gray-500' : 'bg-gray-900 border-gray-700 opacity-60'
                }`;
                iconBox.innerText = isUnlocked ? r.icon : '🔒';
                
                const card = document.createElement('div');
                card.className = `flex-grow p-3 rounded-xl border transition-all relative ${
                    isCurrent ? 'bg-gradient-to-r from-blue-900 to-purple-900 border-purple-400 shadow-[0_0_15px_rgba(168,85,247,0.4)] scale-[1.02]' : 
                    isUnlocked ? 'bg-gray-800/80 border-gray-600' : 'bg-black/50 border-gray-800 opacity-60'
                }`;
                
                const connector = document.createElement('div');
                connector.className = `absolute -left-4 top-1/2 -translate-y-1/2 w-4 h-1 ${
                    isUnlocked ? (isCurrent ? 'bg-purple-400' : 'bg-gray-500') : 'bg-gray-700'
                }`;
                card.appendChild(connector);
                
                const textBox = document.createElement('div');
                
                if (isUnlocked) {
                    textBox.innerHTML = `
                        <div class="text-[10px] text-gray-400 mb-0.5 font-mono">${r.min} pt 〜</div>
                        <div class="text-sm sm:text-base font-bold ${isCurrent ? 'text-yellow-300' : 'text-gray-200'}">${r.title}</div>
                    `;
                } else {
                    textBox.innerHTML = `
                        <div class="text-[10px] text-gray-500 mb-0.5 font-mono tracking-widest">？？？ pt 〜</div>
                        <div class="text-sm sm:text-base font-bold text-gray-500 tracking-widest">？？？？？？</div>
                    `;
                }
                card.appendChild(textBox);
                
                if (isCurrent) {
                    const badge = document.createElement('div');
                    badge.className = 'absolute -top-3 -right-2 text-[10px] bg-yellow-400 text-yellow-900 font-bold px-3 py-1 rounded-full whitespace-nowrap shadow-md transform rotate-12 z-20 animate-pulseFast';
                    badge.innerText = 'いまここ！';
                    card.appendChild(badge);
                }
                
                item.appendChild(iconBox);
                item.appendChild(card);
                container.appendChild(item);
            });

            const progressLine = document.getElementById('rank-progress-line');
            
            modal.classList.remove('hidden');
            requestAnimationFrame(() => {
                const currentItem = container.children[currentRankIndex];
                if (currentItem) {
                    const lineStartTop = 36;
                    const itemCenterY = currentItem.offsetTop + (currentItem.offsetHeight / 2);
                    progressLine.style.height = Math.max(0, itemCenterY - lineStartTop) + 'px';
                }
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-90');
                
                setTimeout(() => {
                    const currentItem = container.children[currentRankIndex];
                    if (currentItem) {
                        currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 300);
            });
        }

        function closeRankModal() {
            const modal = document.getElementById('rank-modal');
            const content = document.getElementById('rank-modal-content');
            
            modal.classList.add('opacity-0');
            content.classList.add('scale-90');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        window.onload = initApp;

    </script>
