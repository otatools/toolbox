<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まるかき名人 - 最高の一筆を！</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: none;
            user-select: none;
            background-color: #f1f5f9;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .ui-container {
            pointer-events: none;
        }
        .ui-element {
            pointer-events: auto;
        }
        .score-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* 隠すモード時の表示制御 */
        .view-hidden {
            opacity: 0 !important;
            transform: scale(0.95);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        /* ボタン自体のスタイル */
        #hide-btn {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        #hide-btn:active {
            transform: scale(0.9);
            background-color: #e2e8f0;
        }
        /* デバッグバッジ */
        #debug-badge {
            display: none;
        }
        body.is-debug #debug-badge {
            display: block;
        }
    </style>
</head>
<body class="relative">

    <!-- Main Canvas -->
    <canvas id="game-canvas" class="absolute inset-0"></canvas>

    <!-- Top UI Area -->
    <div id="top-ui" class="ui-container absolute top-0 left-0 w-full p-4 flex flex-col items-center pointer-events-none z-10 transition-opacity duration-200">
        <div class="w-full max-w-4xl flex items-start justify-between">
            <div class="flex flex-col">
                <div class="flex items-center gap-2">
                    <h1 class="text-3xl md:text-4xl font-black text-indigo-600/80 drop-shadow-sm leading-tight">まるかき名人</h1>
                    <span id="debug-badge" class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">DEBUG</span>
                </div>
                <p class="text-slate-500 font-bold text-xs md:text-sm">最高の一筆を！</p>
            </div>
            
            <div class="flex gap-2 md:gap-4 ui-element">
                <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl shadow-md border border-slate-100 text-center min-w-[100px]">
                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">ハイスコア</div>
                    <div id="high-score" class="text-xl md:text-2xl font-black text-indigo-500">0</div>
                </div>
                <div class="bg-white/90 backdrop-blur-sm px-4 py-2 rounded-2xl shadow-md border border-slate-100 text-center min-w-[100px]">
                    <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">今回のスコア</div>
                    <div id="current-score" class="text-xl md:text-2xl font-black text-pink-500">--</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Guide Message -->
    <div id="instruction" class="absolute bottom-10 left-0 w-full text-center pointer-events-none transition-opacity duration-500">
        <p class="text-slate-400/60 text-lg md:text-xl font-bold animate-pulse">好きな場所に円を描いてね</p>
    </div>

    <!-- Result Overlay -->
    <div id="result-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/10 backdrop-blur-[2px] hidden z-50">
        
        <!-- Score Card -->
        <div id="score-card" class="score-pop text-center p-8 bg-white/95 rounded-[3rem] shadow-2xl border-4 border-white max-w-[90vw] transition-all duration-200">
            <div id="score-display" class="text-7xl md:text-9xl font-black text-indigo-600 mb-2 leading-none">0%</div>
            <div id="rank-display" class="text-lg md:text-2xl font-bold text-slate-500 mb-8 px-4">ランク</div>
            
            <div class="flex flex-col gap-3 items-center">
                <button id="retry-btn" class="ui-element px-12 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full font-bold shadow-xl transition-all hover:-translate-y-1 active:translate-y-0 text-xl w-full">
                    もういちど
                </button>
                
                <!-- スコアを隠すボタン -->
                <button id="hide-btn" class="ui-element mt-2 flex items-center gap-2 px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full font-bold transition-all text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    押している間スコアを隠す
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const highScoreEl = document.getElementById('high-score');
        const currentScoreEl = document.getElementById('current-score');
        const instruction = document.getElementById('instruction');
        const resultOverlay = document.getElementById('result-overlay');
        const scoreDisplay = document.getElementById('score-display');
        const rankDisplay = document.getElementById('rank-display');
        const retryBtn = document.getElementById('retry-btn');
        const hideBtn = document.getElementById('hide-btn');
        const scoreCard = document.getElementById('score-card');
        const topUi = document.getElementById('top-ui');

        let isDrawing = false;
        let points = [];
        let highScore = localStorage.getItem('circleGameHighScore') || 0;
        let isResultMode = false;
        
        // デバッグモードの判定
        const isDebug = window.location.search.includes('debug=true') || window.location.hash === '#debug';
        if (isDebug) document.body.classList.add('is-debug');

        highScoreEl.innerText = highScore;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            clearCanvas();
        }

        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // デバッグモードなら下書きを描画
            if (isDebug && !isResultMode) {
                drawDebugGuide();
            }
        }

        // デバッグ用の下書き円を描画
        function drawDebugGuide() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.3;

            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(79, 70, 229, 0.08)'; // 非常に薄い青
            ctx.lineWidth = 4;
            ctx.stroke();

            // 中心十字も薄く表示
            const crossSize = 8;
            ctx.strokeStyle = 'rgba(79, 70, 229, 0.15)';
            ctx.beginPath();
            ctx.moveTo(centerX - crossSize, centerY);
            ctx.lineTo(centerX + crossSize, centerY);
            ctx.moveTo(centerX, centerY - crossSize);
            ctx.lineTo(centerX, centerY + crossSize);
            ctx.stroke();
            ctx.restore();
        }

        function startDrawing(e) {
            if (e.target.closest('.ui-element')) return;
            if (isResultMode) return;
            if (isDrawing) return;
            
            isDrawing = true;
            points = [];
            instruction.style.opacity = '0';
            resultOverlay.classList.add('hidden');
            
            // 描画開始時に一度キャンバスをクリア（下書きを残すため）
            clearCanvas();
            
            const pos = getPos(e);
            points.push(pos);
            
            ctx.beginPath();
            ctx.strokeStyle = '#4f46e5'; 
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            const lastPoint = points[points.length - 1];
            const dist = Math.sqrt(Math.pow(pos.x - lastPoint.x, 2) + Math.pow(pos.y - lastPoint.y, 2));
            if (dist < 3) return;
            points.push(pos);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function endDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            if (points.length < 30) {
                clearCanvas();
                instruction.style.opacity = '1';
                return;
            }
            calculateScoreOptimized();
        }

        function toggleView(hideUI) {
            if (hideUI) {
                scoreCard.classList.add('view-hidden');
                topUi.classList.add('view-hidden');
                resultOverlay.style.backgroundColor = 'transparent';
                resultOverlay.style.backdropFilter = 'none';
            } else {
                scoreCard.classList.remove('view-hidden');
                topUi.classList.remove('view-hidden');
                resultOverlay.style.backgroundColor = 'rgba(15, 23, 42, 0.1)';
                resultOverlay.style.backdropFilter = 'blur(2px)';
            }
        }

        function getPos(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        function calculateScoreOptimized() {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            points.forEach(p => {
                minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
                minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
            });
            let centerX = (minX + maxX) / 2;
            let centerY = (minY + maxY) / 2;

            for (let i = 0; i < 10; i++) {
                let totalR = 0;
                let distances = points.map(p => {
                    const dx = p.x - centerX;
                    const dy = p.y - centerY;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    totalR += d;
                    return d;
                });
                const currentAvgR = totalR / points.length;
                let offsetX = 0, offsetY = 0;
                points.forEach((p, idx) => {
                    const d = distances[idx];
                    if (d > 0) {
                        const ratio = (d - currentAvgR) / d;
                        offsetX += (p.x - centerX) * ratio;
                        offsetY += (p.y - centerY) * ratio;
                    }
                });
                centerX += (offsetX / points.length) * 0.8;
                centerY += (offsetY / points.length) * 0.8;
            }

            let totalDist = 0;
            const finalDistances = points.map(p => {
                const dx = p.x - centerX;
                const dy = p.y - centerY;
                return Math.sqrt(dx * dx + dy * dy);
            });
            finalDistances.forEach(d => totalDist += d);
            const avgRadius = totalDist / points.length;

            let variance = 0;
            finalDistances.forEach(d => variance += Math.pow(d - avgRadius, 2));
            const stdDev = Math.sqrt(variance / points.length);
            const devRate = stdDev / avgRadius;
            let shapeScore = Math.max(0, 100 - (devRate * 550));

            let roughness = 0;
            for (let i = 4; i < points.length; i += 2) {
                const p1 = points[i-4], p2 = points[i-2], p3 = points[i];
                const v1 = { x: p2.x - p1.x, y: p2.y - p1.y }, v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
                const mag1 = Math.sqrt(v1.x * v1.x + v1.y * v1.y), mag2 = Math.sqrt(v2.x * v2.x + v2.y * v2.y);
                if (mag1 > 0 && mag2 > 0) {
                    const dot = (v1.x * v2.x + v1.y * v2.y) / (mag1 * mag2);
                    const angle = Math.acos(Math.min(1, Math.max(-1, dot)));
                    if (angle > 0.4) roughness += (angle - 0.4);
                }
            }
            const roughnessPenalty = (roughness / points.length) * 100;
            const start = points[0], end = points[points.length - 1];
            const gap = Math.sqrt(Math.pow(start.x - end.x, 2) + Math.pow(start.y - end.y, 2));
            const closurePenalty = Math.min(20, (gap / avgRadius) * 40);

            let finalScore = shapeScore - roughnessPenalty - closurePenalty;
            if (finalScore > 50) finalScore += (100 - finalScore) * 0.1;
            finalScore = Math.max(0, Math.min(100, finalScore));

            drawPerfectCircle(centerX, centerY, avgRadius);
            setTimeout(() => displayResult(finalScore.toFixed(1)), 600);
        }

        function drawPerfectCircle(x, y, r) {
            // 背景の塗りつぶし
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 赤いガイド円
            ctx.setLineDash([10, 8]);
            ctx.strokeStyle = '#f43f5e'; 
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]); 

            // 中心を「＋」
            const crossSize = 10;
            ctx.strokeStyle = '#f43f5e';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(x - crossSize, y);
            ctx.lineTo(x + crossSize, y);
            ctx.moveTo(x, y - crossSize);
            ctx.lineTo(x, y + crossSize);
            ctx.stroke();
            
            // 外側のぼんやりした円
            ctx.globalAlpha = 0.1; 
            ctx.lineWidth = 20;
            ctx.beginPath(); 
            ctx.arc(x, y, r, 0, Math.PI * 2); 
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        }

        function displayResult(score) {
            currentScoreEl.innerText = score;
            scoreDisplay.innerText = score + '%';
            let rank = "";
            const s = parseFloat(score);
            if (s > 95) rank = "【伝説】円の化身！完璧です！";
            else if (s > 90) rank = "【神業】コンパス並みの滑らかさ！";
            else if (s > 80) rank = "【達人】素晴らしい円です！";
            else if (s > 70) rank = "【上手】かなり綺麗な形ですね！";
            else if (s > 50) rank = "悪くないです！あと少し！";
            else if (s > 30) rank = "もっと大きく滑らかに！";
            else rank = "ゆっくり丁寧に描いてみよう！";
            rankDisplay.innerText = rank;
            resultOverlay.classList.remove('hidden');
            isResultMode = true;
            toggleView(false);
            if (parseFloat(score) > parseFloat(highScore)) {
                highScore = score;
                localStorage.setItem('circleGameHighScore', highScore);
                highScoreEl.innerText = highScore;
            }
        }

        canvas.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', endDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        window.addEventListener('touchmove', draw, {passive: false});
        window.addEventListener('touchend', endDrawing);

        const hideActionStart = (e) => {
            e.preventDefault();
            toggleView(true);
        };
        const hideActionEnd = (e) => {
            toggleView(false);
        };

        hideBtn.addEventListener('mousedown', hideActionStart);
        hideBtn.addEventListener('mouseup', hideActionEnd);
        hideBtn.addEventListener('mouseleave', hideActionEnd);
        hideBtn.addEventListener('touchstart', hideActionStart, {passive: false});
        hideBtn.addEventListener('touchend', hideActionEnd);

        retryBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resultOverlay.classList.add('hidden');
            instruction.style.opacity = '1';
            isResultMode = false;
            clearCanvas();
            currentScoreEl.innerText = "--";
        });
    </script>
</body>
</html>
