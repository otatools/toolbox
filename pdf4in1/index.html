<!DOCTYPE html><html lang="ja"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>PDF 4-in-1 再配置ツール</title>    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>    <style>        body { margin: 0; font-family: sans-serif; background-color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 3rem 1rem; color: #1e293b; }        .container { max-width: 42rem; width: 100%; background: white; border-radius: 1rem; shadow: 0 20px 25px -5px rgba(0,0,0,0.1); padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }        header { text-align: center; margin-bottom: 2rem; }        h1 { font-size: 1.5rem; font-weight: bold; margin: 0; }        p { color: #64748b; margin-top: 0.5rem; font-size: 0.875rem; }        .drop-zone { border: 2px dashed #cbd5e1; border-radius: 0.75rem; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 1.5rem; position: relative; }        .drop-zone:hover, .drop-zone.drag-over { border-color: #3b82f6; background-color: #eff6ff; }        .hidden { display: none !important; }        #file-info { text-align: left; background: #eff6ff; padding: 1rem; border-radius: 0.5rem; border: 1px solid #dbeafe; }        .controls { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-top: 1.5rem; }        @media (min-width: 768px) { .controls { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }        select, input[type="range"] { width: 100%; border: 1px solid #e2e3e0; border-radius: 0.5rem; padding: 0.5rem; font-size: 0.875rem; box-sizing: border-box; }        .checkbox-group { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; }        #process-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 0.75rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; margin-top: 1.5rem; transition: 0.2s; display: flex; justify-content: center; align-items: center; }        #process-btn:hover { background: #1d4ed8; }        #status-msg { margin-top: 1rem; padding: 0.75rem; border-radius: 0.25rem; font-size: 0.875rem; }        .success { background: #f0fdf4; color: #166534; }        .error { background: #fef2f2; color: #991b1b; }        svg { display: block; margin: 0 auto; }        .animate-spin { animation: spin 1s linear infinite; }        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }    </style></head><body>    <div class="container">        <header>            <h1>PDF 4-in-1 レイアウト</h1>            <p>1枚のA4用紙に4ページ分を並べて出力します</p>        </header>        <div id="app">            <div id="drop-zone" class="drop-zone">                <div id="upload-prompt">                    <svg style="width: 3rem; height: 3rem; color: #94a3b8; margin-bottom: 1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>                    <div style="font-weight: 500; font-size: 1.125rem;">PDFファイルをドラッグ＆ドロップ</div>                    <p>またはクリックしてファイルを選択</p>                </div>                <div id="file-info" class="hidden">                    <p id="filename-display" style="font-weight: 500; color: #1d4ed8; margin: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></p>                    <p id="filesize-display" style="font-size: 0.75rem; color: #3b82f6; margin: 0;"></p>                </div>                <input type="file" id="file-input" class="hidden" accept="application/pdf">            </div>            <div id="controls" class="hidden">                <div class="controls">                    <div>                        <label>用紙の向き</label>                        <select id="page-orientation"><option value="portrait">縦向き</option><option value="landscape" selected>横向き</option></select>                    </div>                    <div>                        <label>レイアウト</label>                        <select id="layout-mode"><option value="grid">2x2 グリッド</option><option value="parallel">並行4分割</option></select>                    </div>                    <div>                        <label>ページ順序 (2x2のみ)</label>                        <select id="order-mode"><option value="z-order">Z順 (左上→右上→左下→右下)</option><option value="n-order">N順 (左上→左下→右上→右下)</option></select>                    </div>                    <div>                        <label>隙間: <span id="gap-value">15</span>px</label>                        <input type="range" id="gap-size" min="10" max="100" value="15">                    </div>                    <div>                        <label>枠線の太さ: <span id="border-weight-value">3.0</span>pt</label>                        <input type="range" id="border-weight" min="0" max="10" step="0.5" value="3.0">                    </div>                    <div>                        <label>枠線の色</label>                        <input type="color" id="border-color" value="#000000" style="height: 2.5rem; padding: 2px;">                    </div>                    <div class="full-width checkbox-group">                        <div class="checkbox-item"><input type="checkbox" id="show-border" checked><label for="show-border">枠線を表示</label></div>                        <div class="checkbox-item"><input type="checkbox" id="show-item-number" checked><label for="show-item-number">スライド番号</label></div>                        <div class="checkbox-item"><input type="checkbox" id="show-page-number" checked><label for="show-page-number">全体ページ番号</label></div>                    </div>                </div>                <div style="font-size: 0.75rem; color: #64748b; margin-top: 1rem; border-top: 1px solid #f1f5f9; padding-top: 1rem; font-style: italic;" id="layout-description"></div>                <button id="process-btn">                    <span id="btn-text">PDFを変換してダウンロード</span>                    <svg id="loading-spinner" class="hidden animate-spin" style="width: 1.25rem; height: 1.25rem; margin-left: 0.75rem;" viewBox="0 0 24 24"><circle style="opacity: 0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path style="opacity: 0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>                </button>            </div>            <div id="status-msg" class="hidden"></div>        </div>        <footer style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid #f1f5f9; text-align: center; font-size: 0.75rem; color: #94a3b8; line-height: 1.6;">            ※ 各スライド番号は左上の余白に配置されます。<br>※ A4サイズを基準にブラウザ内で生成されます。        </footer>    </div>    <script>        const { PDFDocument, rgb, degrees, StandardFonts } = PDFLib;        const dropZone = document.getElementById('drop-zone');        const fileInput = document.getElementById('file-input');        const uploadPrompt = document.getElementById('upload-prompt');        const fileInfo = document.getElementById('file-info');        const filenameDisplay = document.getElementById('filename-display');        const filesizeDisplay = document.getElementById('filesize-display');        const controls = document.getElementById('controls');        const processBtn = document.getElementById('process-btn');        const btnText = document.getElementById('btn-text');        const loadingSpinner = document.getElementById('loading-spinner');        const statusMsg = document.getElementById('status-msg');        const orientationMode = document.getElementById('page-orientation');        const layoutMode = document.getElementById('layout-mode');        const orderMode = document.getElementById('order-mode');        const gapSize = document.getElementById('gap-size');        const gapValue = document.getElementById('gap-value');        const borderWeight = document.getElementById('border-weight');        const borderWeightValue = document.getElementById('border-weight-value');        const borderColorInput = document.getElementById('border-color');        const showBorder = document.getElementById('show-border');        const showItemNumber = document.getElementById('show-item-number');        const showPageNumber = document.getElementById('show-page-number');        const layoutDescription = document.getElementById('layout-description');
        let selectedFile = null;
        function hexToRgb(hex) {            const r = parseInt(hex.slice(1, 3), 16) / 255;            const g = parseInt(hex.slice(3, 5), 16) / 255;            const b = parseInt(hex.slice(5, 7), 16) / 255;            return rgb(r, g, b);        }
        gapSize.oninput = () => gapValue.textContent = gapSize.value;        borderWeight.oninput = () => borderWeightValue.textContent = borderWeight.value;
        const updateDescription = () => {            const isLandscape = orientationMode.value === 'landscape';            const isGrid = layoutMode.value === 'grid';            const isNOrder = orderMode.value === 'n-order';            if (isGrid) {                layoutDescription.textContent = isNOrder ? 'ページ順序: 左上 → 左下 → 右上 → 右下' : 'ページ順序: 左上 → 右上 → 左下 → 右下';            } else {                layoutDescription.textContent = isLandscape ? 'ページ順序: 左から右へ' : 'ページ順序: 上から下へ';            }        };
        orientationMode.onchange = updateDescription;        layoutMode.onchange = updateDescription;        orderMode.onchange = updateDescription;
        dropZone.onclick = () => fileInput.click();        fileInput.onchange = (e) => { if (e.target.files.length > 0) handleFileSelect(e.target.files[0]); };        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };        dropZone.ondragleave = () => dropZone.classList.remove('drag-over');        dropZone.ondrop = (e) => {            e.preventDefault();            dropZone.classList.remove('drag-over');            if (e.dataTransfer.files.length > 0) handleFileSelect(e.dataTransfer.files[0]);        };
        function handleFileSelect(file) {            if (file.type !== 'application/pdf') { showStatus('PDFファイルを選択してください', 'error'); return; }            selectedFile = file;            filenameDisplay.textContent = file.name;            filesizeDisplay.textContent = `${(file.size / 1024 / 1024).toFixed(2)} MB`;            uploadPrompt.classList.add('hidden');            fileInfo.classList.remove('hidden');            controls.classList.remove('hidden');            statusMsg.classList.add('hidden');            updateDescription();        }
        function showStatus(msg, type) {            statusMsg.textContent = msg;            statusMsg.className = `success ${type === 'error' ? 'error' : 'success'}`;            statusMsg.classList.remove('hidden');        }
        processBtn.onclick = async () => {            if (!selectedFile) return;            setLoading(true);            try {                const arrayBuffer = await selectedFile.arrayBuffer();                const srcDoc = await PDFDocument.load(arrayBuffer);                const outDoc = await PDFDocument.create();                const helveticaFont = await outDoc.embedFont(StandardFonts.Helvetica);                const pageCount = srcDoc.getPageCount();                const isLandscape = orientationMode.value === 'landscape';                const a4Width = isLandscape ? 841.89 : 595.28;                const a4Height = isLandscape ? 595.28 : 841.89;                const gap = parseInt(gapSize.value);                const mode = layoutMode.value;                const order = orderMode.value;                const drawBorder = showBorder.checked;                const drawItemNum = showItemNumber.checked;                const drawPageNum = showPageNumber.checked;                const weight = parseFloat(borderWeight.value);                const borderColor = hexToRgb(borderColorInput.value);
                let outputPageIdx = 0;                for (let i = 0; i < pageCount; i += 4) {                    outputPageIdx++;                    const newPage = outDoc.addPage([a4Width, a4Height]);                    for (let j = 0; j < 4; j++) {                        const srcIdx = i + j;                        if (srcIdx >= pageCount) break;                        const [embeddedPage] = await outDoc.embedPages([srcDoc.getPages()[srcIdx]]);                        let targetWidth, targetHeight, x, y;
                        if (mode === 'grid') {                            targetWidth = (a4Width - gap * 3) / 2;                            targetHeight = (a4Height - gap * 3) / 2;                            let col, row;                            if (order === 'n-order') {                                col = Math.floor(j / 2); row = j % 2;                            } else {                                col = j % 2; row = Math.floor(j / 2);                            }                            x = gap + col * (targetWidth + gap);                            y = (row === 0) ? (a4Height / 2 + gap / 2) : gap;                        } else {                            if (isLandscape) {                                targetWidth = (a4Width - gap * 5) / 4;                                targetHeight = a4Height - gap * 2;                                x = gap + j * (targetWidth + gap);                                y = gap;                            } else {                                targetWidth = a4Width - gap * 2;                                targetHeight = (a4Height - gap * 5) / 4;                                x = gap;                                y = a4Height - ((j + 1) * (targetHeight + gap));                            }                        }
                        const scale = Math.min(targetWidth / embeddedPage.width, targetHeight / embeddedPage.height);                        const drawWidth = embeddedPage.width * scale;                        const drawHeight = embeddedPage.height * scale;                        const offsetX = (targetWidth - drawWidth) / 2;                        const offsetY = (targetHeight - drawHeight) / 2;                        const finalX = x + offsetX;                        const finalY = y + offsetY;
                        if (drawBorder && weight > 0) {                            newPage.drawRectangle({ x: finalX, y: finalY, width: drawWidth, height: drawHeight, borderColor: borderColor, borderWidth: weight });                        }                        newPage.drawPage(embeddedPage, { x: finalX, y: finalY, width: drawWidth, height: drawHeight });                        if (drawItemNum) {                            const text = `${srcIdx + 1}`;                            const fontSize = 10;                            newPage.drawText(text, { x: x, y: y + targetHeight - fontSize, size: fontSize, font: helveticaFont, color: rgb(0, 0, 0) });                        }                    }                    if (drawPageNum) {                        const totalOutputPages = Math.ceil(pageCount / 4);                        const text = `- ${outputPageIdx} -`;                        const fontSize = 11;                        const textWidth = helveticaFont.widthOfTextAtSize(text, fontSize);                        newPage.drawText(text, { x: (a4Width - textWidth) / 2, y: 15, size: fontSize, font: helveticaFont, color: rgb(0.1, 0.1, 0.1) });                    }                }                const pdfBytes = await outDoc.save();                download(pdfBytes, `4in1_${selectedFile.name}`);                showStatus('完了しました！', 'success');            } catch (err) {                console.error(err);                showStatus('エラーが発生しました。', 'error');            } finally {                setLoading(false);            }        };
        function setLoading(isLoading) {            processBtn.disabled = isLoading;            btnText.textContent = isLoading ? '処理中...' : 'PDFを変換してダウンロード';            loadingSpinner.classList.toggle('hidden', !isLoading);        }
        function download(bytes, filename) {            const blob = new Blob([bytes], { type: 'application/pdf' });            const link = document.createElement('a');            link.href = URL.createObjectURL(blob);            link.download = filename;            link.click();            setTimeout(() => URL.revokeObjectURL(link.href), 100);        }    </script>

</script>
