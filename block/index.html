  <style>
    @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background-color: #f0fdfa; /* 薄いミントグリーン */
      touch-action: manipulation;
    }

    /* 画面全体のテキスト選択を無効化してカーソルが出ないようにする */
    * {
      user-select: none;
      -webkit-user-select: none;
    }

    /* 画面の切り替え用クラス */
    .screen {
      display: none;
    }
    .screen.active {
      display: flex;
    }

    /* アニメーション */
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop {
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px) rotate(-5deg); }
      40% { transform: translateX(10px) rotate(5deg); }
      60% { transform: translateX(-10px) rotate(-5deg); }
      80% { transform: translateX(10px) rotate(5deg); }
    }
    .animate-shake {
      animation: shake 0.4s ease-in-out;
    }

    /* キーボードボタンの共通スタイル */
    .key-btn {
      @apply bg-white border-2 border-gray-200 text-gray-700 text-2xl font-bold py-3 md:py-4 rounded-xl shadow-sm active:bg-gray-100 active:scale-95 transition-transform flex items-center justify-center;
    }

    /* 3Dキャンバスのコンテナ */
    #canvas-container {
      touch-action: none; /* スワイプ時の画面スクロール防止 */
    }

    /* スクロールバー非表示（図鑑用） */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

<body class="text-gray-800 h-screen w-screen overflow-hidden opacity-0 transition-opacity duration-500">

      <h1 class="text-4xl md:text-7xl font-black text-center text-teal-600 mb-2 md:mb-6 leading-tight z-10 drop-shadow-sm">

          { id: 'i1_10', blocks: [{x:0,y:0,z:0},{x:1,y:0,z:0},{x:2,y:0,z:0},{x:3,y:0,z:0},{x:4,y:0,z:0},{x:0,y:1,z:0},{x:0,y:2,z:0},{x:0,y:3,z:0},{x:0,y:4,z:0},{x:4,y:1,z:0},{x:4,y:2,z:0},{x:4,y:3,z:0},{x:4,y:4,z:0},{x:0,y:0,z:1},{x:0,y:0,z:2},{x:0,y:0,z:3},{x:0,y:0,z:4},{x:4,y:0,z:1},{x:4,y:0,z:2},{x:4,y:0,z:3},{x:4,y:0,z:4},{x:0,y:1,z:4},{x:0,y:2,z:4},{x:0,y:3,z:4},{x:0,y:4,z:4},{x:0,y:4,z:1},{x:0,y:4,z:2},{x:0,y:4,z:3},{x:1,y:4,z:0},{x:2,y:4,z:0},{x:3,y:4,z:0},{x:1,y:0,z:4},{x:2,y:0,z:4},{x:3,y:0,z:4}] },
        ]
      }
    };

    // ==========================================
    // 状態管理
    // ==========================================
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let currentLevel = '';
    let startTime = 0;
    let timerInterval = null;
    let elapsedTime = 0; // ミリ秒
    let answerString = '';
    
    // ハイスコアデータ
    let highScores = {
      easy: 0,
      hard: 0,
      insane: 0
    };

    // 図鑑のデータ保存
    // プレイ中に取得したブロックIDを true にする
    let unlockedBlocks = {};

    const STORAGE_KEY = '23block_save_data';

    // データの保存
    function saveData() {
      const data = {
        highScores: highScores,
        unlockedBlocks: unlockedBlocks
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // データの読み込み
    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.highScores) {
            highScores = Object.assign(highScores, data.highScores);
          }
          if (data.unlockedBlocks) {
            unlockedBlocks = Object.assign(unlockedBlocks, data.unlockedBlocks);
          }
          
          // タイトル画面のハイスコア表示を更新
          document.getElementById('highscore-easy').innerText = highScores.easy;
          document.getElementById('highscore-hard').innerText = highScores.hard;
          document.getElementById('highscore-insane').innerText = highScores.insane;
        } catch (e) {
          console.error('データの読み込みに失敗しました', e);
        }
      }
    }

    // 初期化時にデータを読み込む
    window.addEventListener('DOMContentLoaded', loadData);

    // ==========================================
    // Three.js の設定
    // ==========================================
    let scene, camera, renderer, controls;
    
    function initThreeJS() {
      const container = document.getElementById('canvas-container');
      
      scene = new THREE.Scene();
      
      // カメラ設定
      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
      
      // レンダラー設定
      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);
      
      // ライト設定（カメラから見て一定方向からの光にする）
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
      directionalLight.position.set(-10, 10, 10); // 左(マイナス)、上、手前から照らす
      scene.add(camera);
      camera.add(directionalLight);

      // コントロール設定（マウス・タッチで回転）
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableZoom = false; // ズーム禁止
      controls.enablePan = false;  // パン禁止
      controls.enableDamping = true; // 滑らかな回転
      controls.dampingFactor = 0.1;
      // 縦方向の回転を制限（一定の見下ろし角度に固定）
      controls.minPolarAngle = Math.PI / 3; 
      controls.maxPolarAngle = Math.PI / 3;

      // ブロックを描画するためのグループ（ライトを消さないため）
      scene.userData.blocksGroup = new THREE.Group();
      scene.add(scene.userData.blocksGroup);

      // アニメーションループ
      function animate() {
        requestAnimationFrame(animate);
        if(controls) controls.update();
        if(renderer && scene && camera) renderer.render(scene, camera);
      }
      animate();

      // ウィンドウリサイズ対応
      window.addEventListener('resize', () => {
        if(container.offsetParent !== null) { // 表示されている時のみ
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
        }
      });
    }

    // 図鑑のサムネイル生成用レンダラー
    let thumbRenderer, thumbScene, thumbCamera;
    function initThumbRenderer() {
      // preserveDrawingBuffer を true にすることで toDataURL() で画像化できるようにする
      thumbRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, preserveDrawingBuffer: true });
      thumbRenderer.setSize(300, 300); // サムネイルとして十分な解像度
      thumbRenderer.setPixelRatio(window.devicePixelRatio);
      
      thumbScene = new THREE.Scene();
      thumbCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
      
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      thumbScene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
      directionalLight.position.set(-10, 10, 10);
      thumbScene.add(thumbCamera);
      thumbCamera.add(directionalLight);

      thumbScene.userData.blocksGroup = new THREE.Group();
      thumbScene.add(thumbScene.userData.blocksGroup);
    }

    // ブロックを描画する関数
    function renderBlocks(blocksData, targetScene, targetCamera, targetControls, colorHex = 0xcccccc) {
      const blocksGroup = targetScene.userData.blocksGroup;

      // 古いブロックだけを削除（ライトはそのまま）
      while(blocksGroup.children.length > 0){ 
        blocksGroup.remove(blocksGroup.children[0]); 
      }

      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshStandardMaterial({
        color: colorHex,
        roughness: 0.6,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1
      });
      // 輪郭線用のマテリアル
      const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 });

      let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity, minZ=Infinity, maxZ=-Infinity;
      const group = new THREE.Group();

      blocksData.forEach(pos => {
        // 本体
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(pos.x, pos.y, pos.z);
        group.add(mesh);

        // 輪郭線
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, edgeMaterial);
        line.position.copy(mesh.position);
        group.add(line);

        // 境界を計算
        if(pos.x < minX) minX = pos.x; if(pos.x > maxX) maxX = pos.x;
        if(pos.y < minY) minY = pos.y; if(pos.y > maxY) maxY = pos.y;
        if(pos.z < minZ) minZ = pos.z; if(pos.z > maxZ) maxZ = pos.z;
      });

      // グループの重心を計算して原点にずらす（中心で回転させるため）
      const centerX = (minX + maxX) / 2;
      const centerY = (minY + maxY) / 2;
      const centerZ = (minZ + maxZ) / 2;
      group.position.set(-centerX, -centerY, -centerZ);
      
      blocksGroup.add(group);

      // カメラの位置を調整（固定された角度に合わせて距離を取る）
      const maxDim = Math.max(maxX - minX, maxY - minY, maxZ - minZ) + 1;
      const distance = maxDim * 2.2;
      
      // カメラ初期位置をセット
      targetCamera.position.set(distance, distance, distance);
      targetCamera.lookAt(0, 0, 0);
      
      // Controlsがある場合はターゲットを更新
      if(targetControls) {
        targetControls.target.set(0, 0, 0);
        targetControls.update();
      }
    }


    // ==========================================
    // ゲームロジック
    // ==========================================
    
    // 画面切り替え
    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');

      if(screenId === 'screen-game') {
        // キャンバスのサイズを再計算
        setTimeout(() => {
          window.dispatchEvent(new Event('resize'));
        }, 10);
      }
      if(screenId === 'screen-zukan') {
        renderZukan();
      }
    }

    // 配列からランダムに指定数取得
    function getRandomItems(array, count) {
      const weightedArray = array.map(item => {
        // 図鑑に載っていない(未クリア)ものはウェイトを高くして出やすくする（絶対ではない）
        const weight = unlockedBlocks[item.id] ? Math.random() : Math.random() + 0.5;
        return { item, weight };
      });
      // 重みが大きい順にソート
      weightedArray.sort((a, b) => b.weight - a.weight);
      return weightedArray.slice(0, count).map(obj => obj.item);
    }

    // ゲーム開始 (通常5問モード)
    function startGame(level) {
      currentLevel = level;
      // 問題の選定 (sub1から2問、sub2から3問)
      const data = PROBLEM_DATA[level];
      const easyQs = getRandomItems(data.sub1, 2);
      const hardQs = getRandomItems(data.sub2, 3);
      
      currentQuestions = [...easyQs, ...hardQs];
      currentQuestionIndex = 0;
      elapsedTime = 0;
      answerString = '';
      
      if(!scene) initThreeJS();

      showScreen('screen-game');
      loadQuestion();

      // タイマースタート
      startTime = Date.now();
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 10); // 10msごとに更新
    }

    // 図鑑からの1問モード開始
    function startSingleGame(questionData) {
      currentLevel = 'practice'; // ハイスコア更新を防ぐための特別なレベル名
      currentQuestions = [questionData];
      currentQuestionIndex = 0;
      elapsedTime = 0;
      answerString = '';
      
      if(!scene) initThreeJS();

      showScreen('screen-game');
      loadQuestion();

      // タイマースタート
      startTime = Date.now();
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 10);
    }

    // プレイ中にタイトルへ戻る処理
    function returnToTitle() {
      clearInterval(timerInterval);
      showScreen('screen-title');
    }

    // タイマー更新
    function updateTimer() {
      elapsedTime = Date.now() - startTime;
      const seconds = Math.floor(elapsedTime / 1000);
      const milliseconds = Math.floor((elapsedTime % 1000) / 10);
      document.getElementById('timer-display').innerText = 
        `${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
    }

    // フォーマット化された時間を返す
    function formatTime(ms) {
      const seconds = Math.floor(ms / 1000);
      const milliseconds = Math.floor((ms % 1000) / 10);
      return `${seconds.toString().padStart(2, '0')}.${milliseconds.toString().padStart(2, '0')}`;
    }

    // 問題の読み込み
    function loadQuestion() {
      const q = currentQuestions[currentQuestionIndex];
      // 問題数の表示を更新 (1問モードにも対応)
      document.getElementById('question-number').innerText = currentQuestionIndex + 1;
      document.getElementById('question-total').innerText = currentQuestions.length;
      
      answerString = '';
      updateAnswerDisplay();

      // ブロックを描画
      let color = 0xdbeafe; // 薄い青
      if(currentLevel === 'practice') {
        color = 0xfffbeb; // 練習モードは少し色を変える(薄い黄色)
      }
      renderBlocks(q.blocks, scene, camera, controls, color);
    }

    // キーボード入力
    function inputNum(num) {
      if(answerString.length < 3) { // 3桁まで
        answerString += num.toString();
        updateAnswerDisplay();
      }
    }

    function deleteNum() {
      if(answerString.length > 0) {
        answerString = answerString.slice(0, -1);
        updateAnswerDisplay();
      }
    }

    function updateAnswerDisplay() {
      document.getElementById('answer-input').innerText = answerString;
    }

    // 答え合わせ
    function checkAnswer() {
      if(answerString === '') return;

      const answer = parseInt(answerString, 10);
      const q = currentQuestions[currentQuestionIndex];
      const correctAnswer = q.blocks.length;

      if(answer === correctAnswer) {
        // 正解
        showEffect(true);
        // 図鑑に登録
        if (!unlockedBlocks[q.id]) {
          unlockedBlocks[q.id] = true;
          saveData(); // 新しいブロックを集めたら保存
        }

        setTimeout(() => {
          currentQuestionIndex++;
          if(currentQuestionIndex >= currentQuestions.length) {
            endGame();
          } else {
            loadQuestion();
          }
        }, 800); // エフェクトを見せるためのディレイ
      } else {
        // 不正解 (タイマーは止まらない)
        showEffect(false);
        answerString = '';
        setTimeout(updateAnswerDisplay, 400); // 揺れた後に消す
      }
    }

    // 正解・不正解エフェクト
    function showEffect(isCorrect) {
      const overlay = document.getElementById('effect-overlay');
      const icon = document.getElementById('effect-icon');
      
      overlay.classList.remove('hidden');
      icon.className = 'text-9xl md:text-[15rem] drop-shadow-lg'; // リセット

      if(isCorrect) {
        icon.innerHTML = '<i class="fa-regular fa-circle text-red-500"></i>';
        icon.classList.add('animate-pop');
      } else {
        icon.innerHTML = '<i class="fa-solid fa-xmark text-blue-500"></i>';
        icon.classList.add('animate-shake');
        // 不正解時は入力欄も揺らす
        const inputArea = document.getElementById('answer-input');
        inputArea.classList.remove('animate-shake');
        void inputArea.offsetWidth; // reflow
        inputArea.classList.add('animate-shake');
      }

      setTimeout(() => {
        overlay.classList.add('hidden');
      }, 700);
    }

    // ゲーム終了
    function endGame() {
      clearInterval(timerInterval);
      
      // 練習モード（1問だけ）の場合は、そのまま図鑑に戻る
      if (currentLevel === 'practice') {
        showScreen('screen-zukan');
        return;
      }

      const finalTime = elapsedTime;
      document.getElementById('result-time').innerText = formatTime(finalTime);

      // スコア計算: 基本10000点から、0.1秒ごとに10点マイナス (最低0点)
      let score = Math.max(0, 10000 - Math.floor(finalTime / 10));
      document.getElementById('result-score').innerText = score;

      // ハイスコアの更新判定
      const recordMsg = document.getElementById('new-record-msg');
      if (score > highScores[currentLevel]) {
        highScores[currentLevel] = score;
        document.getElementById(`highscore-${currentLevel}`).innerText = score;
        recordMsg.classList.remove('hidden');
        saveData(); // ハイスコアが更新されたら保存
      } else {
        recordMsg.classList.add('hidden');
      }

      showScreen('screen-result');
      createConfetti();
    }

    // クリア時の紙吹雪エフェクト
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-400', 'bg-pink-500'];
      
      for(let i=0; i<50; i++) {
        const conf = document.createElement('div');
        const color = colors[Math.floor(Math.random() * colors.length)];
        conf.className = `absolute w-3 h-3 ${color} rounded-sm opacity-80`;
        conf.style.left = Math.random() * 100 + '%';
        conf.style.top = '-10px';
        
        // アニメーション設定
        const duration = Math.random() * 2 + 2;
        const delay = Math.random() * 1;
        conf.style.transition = `transform ${duration}s linear, opacity ${duration}s ease-in`;
        
        container.appendChild(conf);

        setTimeout(() => {
          conf.style.transform = `translateY(100vh) rotate(${Math.random()*360}deg)`;
          conf.style.opacity = 0;
        }, delay * 1000 + 50);
      }
    }


    // ==========================================
    // 図鑑ロジック
    // ==========================================
    function renderZukan() {
      const listDiv = document.getElementById('zukan-list');
      listDiv.innerHTML = '';
      
      let totalCount = 0;
      let unlockedCount = 0;

      // 全問題データをフラットな配列にする
      const allBlocks = [];
      ['easy', 'hard', 'insane'].forEach(level => {
        ['sub1', 'sub2'].forEach(sub => {
          PROBLEM_DATA[level][sub].forEach(q => {
            allBlocks.push({ ...q, level: level }); // レベル情報を追加
          });
        });
      });

      totalCount = allBlocks.length;

      // サムネイル生成用のレンダラーを準備
      if(!thumbRenderer) initThumbRenderer();

      allBlocks.forEach(q => {
        const isUnlocked = unlockedBlocks[q.id];
        if(isUnlocked) unlockedCount++;

        // 難易度に応じた色の設定
        let blockColor = 0xfacc15; // 黄色 (デフォルト・やさしい)
        let borderColorClass = 'border-yellow-300';
        let hoverBgClass = 'hover:bg-yellow-50';

        if (q.level === 'hard') {
          blockColor = 0x38bdf8; // 水色
          borderColorClass = 'border-sky-300';
          hoverBgClass = 'hover:bg-sky-50';
        } else if (q.level === 'insane') {
          blockColor = 0xf472b6; // ピンク
          borderColorClass = 'border-pink-300';
          hoverBgClass = 'hover:bg-pink-50';
        }

        const card = document.createElement('div');
        // 高さを固定せず、幅に合わせた正方形(aspect-square)にする
        card.className = `bg-white rounded-2xl shadow-sm border-2 overflow-hidden flex flex-col items-center justify-center aspect-square relative ${isUnlocked ? `${borderColorClass} cursor-pointer ${hoverBgClass} transition-colors` : 'border-gray-200'}`;
        
        if(isUnlocked) {
          // クリックすると1問モードでゲーム開始
          card.onclick = () => startSingleGame(q);
          
          // ブロックを配置してレンダリング
          renderBlocks(q.blocks, thumbScene, thumbCamera, null, blockColor); 
          thumbRenderer.render(thumbScene, thumbCamera);
          
          // 描画結果を画像として取得
          const imgData = thumbRenderer.domElement.toDataURL('image/png');

          card.innerHTML = `
            <img src="${imgData}" class="w-full h-full object-contain p-2 hover:scale-110 transition-transform duration-300">
          `;
        } else {
          card.innerHTML = `
            <div class="text-gray-300 text-4xl md:text-6xl"><i class="fa-solid fa-question"></i></div>
          `;
        }
        listDiv.appendChild(card);
      });

      document.getElementById('zukan-count').innerText = `${unlockedCount} / ${totalCount}`;
    }

    // フォントの準備ができてから画面を表示する
    document.fonts.ready.then(() => {
      document.body.classList.remove('opacity-0');
    });

    }).catch((error) => {
        console.error("Firebase認証エラー:", error);
    });
</script>
