<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お絵かき伝言ゲーム - 演出完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --wb-bg: #ffffff; }
        html { opacity: 0; }
        html.fonts-loaded { opacity: 1; transition: opacity 0.3s ease-in; }
        body {
            font-family: 'Noto Sans JP', 'Kosugi Maru', sans-serif;
            background-color: #353b48;
            color: #2f3640;
            overflow: hidden; 
            height: 100dvh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            margin: 0;
        }
        .whiteboard-frame {
            background: #dcdde1;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #7f8c8d;
            height: 96dvh;
            width: 96vw;
            max-width: 1600px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .whiteboard-surface {
            background-color: var(--wb-bg);
            border-radius: 6px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .game-layout { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .content-area {
            display: flex;
            flex-grow: 1;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
            min-height: 0;
        }
        .side-panel-left { width: 320px; flex-shrink: 0; }
        .side-panel-right { width: 80px; flex-shrink: 0; }
        
        .canvas-container-outer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-width: 0;
            min-height: 0;
            background: #f1f2f6;
            border-radius: 12px;
            padding: 15px;
        }
        #canvas-wrapper-inner {
            background: white;
            border: 4px solid #7f8c8d;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }
        canvas { touch-action: none; cursor: crosshair; display: block; }
        .tool-btn { transition: all 0.2s; border: 2px solid transparent; }
        .tool-btn.active { border-color: #2563eb; background-color: #eff6ff; transform: scale(1.05); }
        .color-btn { transition: all 0.2s; border-width: 2px; border-color: white; }
        .color-btn.active { transform: scale(1.2); outline: 3px solid #2563eb; outline-offset: 2px; }

        .marker-text { font-family: 'Kosugi Maru', cursive; }

        @media (max-width: 768px) {
            .content-area { flex-direction: column; }
            .side-panel-left { width: 100%; height: auto; }
            .side-panel-right { width: 100%; height: auto; flex-direction: row; justify-content: center; padding: 4px; gap: 8px; }
            .side-panel-right hr { display: none; }
        }

        #reveal-stage {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        .reveal-card {
            position: absolute;
            width: 340px;
            background: white;
            border: 4px solid #d1d5db;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }
        .reveal-card img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #eee; }

        .pos-center-origin { opacity: 1; transform: translate(0, 0) scale(1.0); z-index: 50; border-color: #3b82f6; box-shadow: 0 20px 40px rgba(59,130,246,0.3); }
        .pos-center { opacity: 1; transform: translate(-180px, 0) scale(1.0); z-index: 50; border-color: #3b82f6; box-shadow: 0 20px 40px rgba(59,130,246,0.2); }
        .pos-right { opacity: 1; transform: translate(180px, 0) scale(0.95); z-index: 40; border-color: #d1d5db; }
        .pos-left { opacity: 0; transform: translate(-500px, 0) scale(0.8); z-index: 10; }
        .pos-hidden-left { opacity: 0; transform: translate(-500px, 0) scale(0.8); z-index: 10; }
        .pos-hidden-right { opacity: 0; transform: translate(500px, 0) scale(0.8); z-index: 10; }

        #curtain {
            position: absolute;
            inset: 0;
            z-index: 999;
            display: flex;
            pointer-events: none;
        }
        .curtain-half {
            flex: 1;
            background: #c0392b;
            transition: transform 0.8s ease-in-out;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }
        .curtain-left { transform: translateX(-100%); }
        .curtain-right { transform: translateX(100%); }
        .curtain-closed .curtain-left { transform: translateX(0); }
        .curtain-closed .curtain-right { transform: translateX(0); }
        
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        
        .icon-svg { width: 100%; height: 100%; display: block; }
        .icon-st0 { fill:none; stroke:currentColor; stroke-width:8; stroke-linecap:round; stroke-linejoin:round; stroke-miterlimit:10; }
        .icon-st1 { fill:currentColor; }
    </style>
</head>
<body>

    <div id="app" class="w-full h-full flex items-center justify-center">
        <div class="whiteboard-frame">
            <div class="whiteboard-surface">
                
                <div id="curtain">
                    <div class="curtain-half curtain-left"></div>
                    <div class="curtain-half curtain-right"></div>
                </div>

                <div id="setup-screen" class="absolute inset-0 flex flex-col items-center justify-center p-6 bg-white z-50 overflow-y-auto">
                    <h1 class="text-4xl font-black marker-text border-b-4 border-blue-500 mb-8 text-gray-800 text-center">お絵かき伝言ゲーム</h1>
                    <div class="w-full max-w-md space-y-6">
                        <div class="grid grid-cols-3 gap-2">
                            <div class="bg-gray-50 p-3 rounded-xl border text-center">
                                <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest">にんずう</label>
                                <select id="player-count-select" onchange="updateNameInputs()" class="w-full bg-white border border-blue-500 rounded-lg px-1 py-1.5 font-black outline-none text-base">
                                    <option value="3">3人</option>
                                    <option value="4" selected>4人</option>
                                    <option value="5">5人</option>
                                    <option value="6">6人</option>
                                </select>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl border text-center">
                                <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest">むずかしさ</label>
                                <select id="difficulty-select" class="w-full bg-white border border-gray-300 rounded-lg px-1 py-1.5 font-bold outline-none text-base">
                                    <option value="easy">かんたん</option>
                                    <option value="normal" selected>ふつう</option>
                                    <option value="hard">むずかしい</option>
                                </select>
                            </div>
                            <div class="bg-gray-50 p-3 rounded-xl border text-center">
                                <label class="block text-[10px] font-black text-gray-400 mb-1 tracking-widest">じゅんばん</label>
                                <select id="shuffle-select" class="w-full bg-white border border-gray-300 rounded-lg px-1 py-1.5 font-bold outline-none text-base">
                                    <option value="shuffle" selected>ランダム</option>
                                    <option value="fixed">そのまま</option>
                                </select>
                            </div>
                        </div>
                        <div id="name-inputs" class="grid grid-cols-2 gap-2 max-h-[30vh] overflow-y-auto p-1"></div>
                        <button onclick="startGame()" class="w-full bg-blue-600 text-white py-5 rounded-xl font-black text-2xl shadow-lg active:scale-95 transition-all">はじめる！</button>
                    </div>
                    
                    <div class="mt-8 text-xs text-gray-400 opacity-60 tracking-wider">
                        お絵かき伝言ゲーム　|　ver4.3　|　ota tools
                    </div>
                </div>

                <div id="pass-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-blue-50 z-40 p-4 text-center">
                    <p class="text-sm font-black text-blue-500 mb-2 tracking-widest uppercase">つぎのひと</p>
                    <h2 id="next-player-name" class="text-5xl md:text-7xl font-black marker-text text-gray-800 mb-12"></h2>
                    <button onclick="startTurn()" class="bg-gray-800 text-white px-16 py-6 rounded-2xl font-black text-3xl shadow-xl active:scale-95 transition-all">じゅんびOK</button>
                </div>

                <div id="game-screen" class="hidden game-layout">
                    <div class="flex justify-between items-center px-4 py-2 bg-gray-50 border-b shrink-0 h-16">
                        <div class="flex flex-col">
                            <span id="player-indicator" class="text-lg font-black marker-text text-gray-700 leading-none"></span>
                            <span id="step-counter-label" class="text-[10px] font-bold text-gray-400"></span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="text-center">
                                <p class="text-[10px] font-black text-gray-400 leading-none">のこり</p>
                                <span id="timer" class="text-2xl font-mono font-black text-gray-800">60</span>
                            </div>
                            <button onclick="submitStep()" class="bg-emerald-600 text-white px-6 py-2 rounded-full font-black text-lg shadow-md hover:bg-emerald-700 active:scale-95">おわった！</button>
                        </div>
                    </div>

                    <div class="content-area">
                        <div class="side-panel-left bg-slate-50 rounded-xl flex flex-col p-4 border shadow-inner overflow-hidden">

                            <div class="bg-white p-4 rounded-xl border shadow-sm flex-grow flex items-center justify-center overflow-hidden">
                                <div id="info-word-display" class="hidden text-3xl font-black marker-text text-blue-600 text-center"></div>
                                <img id="info-image-display" class="hidden max-w-full max-h-full object-contain" alt="おだい画像">
                            </div>
                            <div id="info-footer-msg" class="mt-4 p-3 rounded-lg border text-center">
                                <p class="text-xs font-black"></p>
                            </div>
                        </div>

                            <div id="canvas-wrapper-inner">
                                <canvas id="drawing-canvas"></canvas>
                            </div>
                        </div>

                                        <polygon fill="#333333" points="99.71,225.59 99.28,209.05 114.43,218.04"/>
                                        <polygon class="icon-st0" points="98.26,228.03 97.2,187.67 134.19,209.6" stroke="#333333"/>
                                        <line class="icon-st0" x1="175.3" y1="98.12" x2="125.26" y2="182.5" stroke="#333333"/>
                                    </g>
                                </svg>
                            </button>
                            <button id="tool-eraser" onclick="setTool('eraser')" class="tool-btn w-14 h-14 p-1 bg-white rounded-xl shadow-sm">
                                <svg version="1.1" viewBox="0 0 300 300" class="icon-svg">
                                    <g>
                                        <rect x="95.97" y="105.2" transform="matrix(0.6897 -0.7241 0.7241 0.6897 -58.6329 156.1242)" class="icon-st0" width="113.75" height="82.54" stroke="#333333"/>
                                        <path class="icon-st0" d="M139.81,212.6c-13.3,13.96-35.81,14.11-50.27,0.33l0,0c-14.47-13.78-15.41-36.27-2.11-50.23" stroke="#333333"/>
                                    </g>
                                </svg>
                            </button>

                            <hr class="w-8 border-slate-200">
                            <button id="color-#2f3640" onclick="setStrokeColor('#2f3640')" class="color-btn w-8 h-8 rounded-full bg-[#2f3640] shadow-md active" title="黒"></button>
                            <button id="color-#e84118" onclick="setStrokeColor('#e84118')" class="color-btn w-8 h-8 rounded-full bg-[#e84118] shadow-md" title="赤"></button>
                            <button id="color-#0097e6" onclick="setStrokeColor('#0097e6')" class="color-btn w-8 h-8 rounded-full bg-[#0097e6] shadow-md" title="青"></button>

                                    </g>
                                </svg>
                            </button>

                </div>

                    </div>

                </div>

                        <span id="reveal-counter" class="text-sm font-bold text-gray-400"></span>
                    </div>
                    <div class="flex-grow relative">
                        <div id="reveal-stage"></div>
                    </div>
                    <div class="h-24 border-t bg-white flex items-center justify-center px-6 shrink-0 z-50">
                        <button id="next-reveal-btn" onclick="handleRevealNext()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black text-xl shadow-lg active:scale-95">さかのぼる ←</button>
                    </div>
                </div>

                <div id="summary-screen" class="hidden absolute inset-0 flex flex-col bg-slate-100 z-[200]">
                    <div class="flex justify-between items-center p-4 bg-white border-b shadow-sm shrink-0">
                        <h2 class="text-xl font-black marker-text">すべての記録</h2>
                        <button onclick="document.getElementById('summary-screen').classList.add('hidden')" class="text-2xl font-bold p-2 text-gray-500 hover:text-gray-800">✕</button>
                    </div>
                    <div id="summary-list" class="flex-grow overflow-y-auto p-4 flex flex-col items-center space-y-2 pb-24"></div>
                </div>

                <div id="result-comparison-screen" class="hidden absolute inset-0 flex flex-col items-center justify-center p-8 bg-white z-[150] text-center">
                    <h2 class="text-3xl font-black marker-text text-gray-800 mb-12">結果発表！</h2>
                    <div class="flex flex-col md:flex-row items-center justify-center gap-8 w-full max-w-4xl">
                        <div class="flex-1 space-y-4">
                            <p class="text-sm font-black text-blue-500 tracking-widest">最初のお題</p>
                            <div id="first-word-result" class="text-4xl md:text-5xl font-black marker-text p-8 bg-blue-50 rounded-3xl border-4 border-blue-200 text-blue-600"></div>
                        </div>
                        <div class="text-4xl font-black text-gray-300">➜</div>
                        <div class="flex-1 space-y-4">
                            <p class="text-sm font-black text-emerald-500 tracking-widest">最後の回答</p>
                            <div id="last-word-result" class="p-4 bg-emerald-50 rounded-3xl border-4 border-emerald-200 flex items-center justify-center min-h-[160px]">
                                <img id="last-image-result" class="max-h-48 object-contain rounded-xl" src="" alt="last">
                            </div>
                        </div>
                    </div>
                    <div class="mt-16 flex flex-col md:flex-row gap-4">
                        <button onclick="resetGame()" class="bg-gray-200 text-gray-800 px-10 py-4 rounded-full font-black text-xl shadow-md hover:bg-gray-300 active:scale-95 transition-all">もういちど遊ぶ</button>
                        <button onclick="showSummary()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black text-xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all">全記録を見る</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

"うなぎ","どじょう","うみねこ","たい","まぐろ","ドラゴン","ユニコーン","サンタクロース","にんじゃ","ふじさん","とうきょうタワー","スカイツリー",
"くじゃく","アメンボ","たつまき","さばく","スフィンクス","ピラミッド","とうだい","たいふう","じしん","サーフィン","モップ",
"ゴミしゅうしゅうしゃ","ショベルカー","サングラス","うでどけい","ゆびわ","ブラックホール","かき","きょうりゅう",
"うちゅうひこうし","エイリアン","ＵＦＯ","かいじゅう","まほうつかい","かんらんしゃ","サンドイッチ","ホットドッグ","フライドポテト",
"ジェットコースター","メリーゴーランド","バイキング","おみこし","ももたろう","シンデレラ","からあげ","カメレオン","フラミンゴ",
"こいのぼり","かぶと","だるま","まねきねこ","せんす","ちょうちん","スケートボード","ダイヤモンド","プレゼント","おりづる",
"ローラースケート","スキー","スノーボード","ゴーグル","ヘルメット","じょうろ","むしめがね","えにっき","タツノオトシゴ",
"おさら","おわん","コップ","すずめ","つばめ","ふくろう","はと","からす","かいぞく","おうさま","おひめさま",
"アルパカ","ナマケモノ","ツル","シロクマ","アザラシ","ラッコ","ハリネズミ","みずたまり","スタンプ","ビーチサンダル",
"なべ","やかん","トースター","れいぞうこ","せんたくき","そうじき","アイロン","バドミントン","リボン","クロール","ひらおよぎ",
"まくら","カーテン","ほんだな","かがみ","ドア","まど","クレパス","いろえんぴつ","えのぐ","ラーメン","うどん","そば",
"はしご","エレベーター","エスカレーター","ごみばこ","ポスト","じどうはんばいき","ガチャガチャ","ボウリング","ピンポン",
"ビリヤード","ダーツ","オセロ","トランプ","ジグソーパズル","すごろく","しんかんせん","モノレール","えんそく","うんどうかい",
"ロープウェイ","かいてんずし","えいがかん","ゲームセンター","ポップコーン","プラネタリウム","すいぞくかん","どうぶつえん",
"ゆうえんち","キャンプ","バーベキュー","やたい","まつり","パレード","サーカス","コンサート"
]
        };
        
        let USED_WORDS = []; 
        let players = [], book = { steps: [] }, currentPlayerIdx = 0;
        let isDrawing = false, canvas, ctx, timerInterval;
        let currentTool = 'pen', currentColor = '#2f3640', lastX = 0, lastY = 0;
        
        let reviewSteps = [];
        let currentRevealIdx = 0;

        function updateNameInputs() {
            const count = parseInt(document.getElementById('player-count-select').value);
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<input type="text" class="player-name p-3 border-2 rounded-xl text-sm font-bold outline-none focus:border-blue-500" value="プレイヤー ${i+1}">`;
            }
        }
        updateNameInputs();

        function startGame() {
            const names = Array.from(document.querySelectorAll('.player-name')).map(i => i.value.trim() || "プレイヤー");
            const shuffleType = document.getElementById('shuffle-select').value;
            players = (shuffleType === 'shuffle') ? [...names].sort(() => Math.random() - 0.5) : [...names];
            const diff = document.getElementById('difficulty-select').value;
            
            let availableWords = WORD_LISTS[diff].filter(w => !USED_WORDS.includes(w));
            
            if (availableWords.length === 0) {
                USED_WORDS = [];
                availableWords = WORD_LISTS[diff];
            }

            const word = availableWords[Math.floor(Math.random() * availableWords.length)];
            USED_WORDS.push(word); 
            
            book = { steps: [{ type: 'word', value: word, author: "さいしょのおだい", originalIdx: 0 }] };
            currentPlayerIdx = 0;
            showPassScreen();
        }

        function showPassScreen() {
            document.querySelectorAll('.whiteboard-surface > div:not(#curtain)').forEach(d => d.classList.add('hidden'));
            document.getElementById('pass-screen').classList.remove('hidden');
            document.getElementById('next-player-name').innerText = players[currentPlayerIdx];
        }

        function startTurn() {
            document.getElementById('pass-screen').classList.add('hidden');
            const gameScreen = document.getElementById('game-screen');
            gameScreen.classList.remove('hidden');
            
            const lastStep = book.steps[book.steps.length - 1];
            document.getElementById('player-indicator').innerText = players[currentPlayerIdx];
            document.getElementById('step-counter-label').innerText = `${currentPlayerIdx + 1}人目 / 全${players.length}人`;
            
            const infoHeader = document.getElementById('info-header');
            const infoWord = document.getElementById('info-word-display');
            const infoImage = document.getElementById('info-image-display');
            const infoFooter = document.getElementById('info-footer-msg');
            const modeLabel = document.getElementById('mode-label');

            // 修正：色のリセット
            setStrokeColor('#2f3640');

            if (lastStep.type === 'sketch') {
                infoWord.classList.add('hidden');
                infoImage.classList.remove('hidden');
                infoImage.src = lastStep.value;
                infoHeader.innerText = "まえの人の絵";
                infoFooter.className = "mt-4 p-3 rounded-lg border border-orange-100 bg-orange-50 text-center text-orange-600";
                infoFooter.querySelector('p').innerText = "なにが描いてあるか、キャンバスに「文字」で書いてね！";
                modeLabel.innerText = "回答欄（文字を大きく書いてね）";
                modeLabel.className = "mb-3 text-xs font-black text-orange-600 bg-white px-4 py-1.5 rounded-full shadow-sm border-2 border-orange-200";
            } else {
                if (lastStep.type === 'word') {
                    infoImage.classList.add('hidden');
                    infoWord.classList.remove('hidden');
                    infoWord.innerText = lastStep.value;
                } else {
                    infoWord.classList.add('hidden');
                    infoImage.classList.remove('hidden');
                    infoImage.src = lastStep.value;
                }
                
                infoHeader.innerText = lastStep.author === "さいしょのおだい" ? "最初のおだい" : "まえの人の回答";
                infoFooter.className = "mt-4 p-3 rounded-lg border border-blue-100 bg-blue-50 text-center text-blue-600";
                infoFooter.querySelector('p').innerText = "この言葉を絵にしてね！";
                modeLabel.innerText = "キャンバス（絵を描いてね）";
                modeLabel.className = "mb-3 text-xs font-black text-blue-600 bg-white px-4 py-1.5 rounded-full shadow-sm border-2 border-blue-200";
            }

            requestAnimationFrame(() => {
                adjustCanvasSize();
                startTimer();
            });
        }

        window.addEventListener('resize', () => {
            if (!document.getElementById('game-screen').classList.contains('hidden')) {
                adjustCanvasSize();
            }
        });

        function adjustCanvasSize() {
            const container = document.getElementById('canvas-container');
            const wrapper = document.getElementById('canvas-wrapper-inner');
            const modeLabel = document.getElementById('mode-label');
            
            const padding = 40;
            const labelHeight = modeLabel.offsetHeight + 20;
            const availableW = container.clientWidth - padding;
            const availableH = container.clientHeight - padding - labelHeight;

            const baseSize = Math.min(availableW, availableH);
            
            // 修正：偶数番目（文字回答）のときは高さを1/3にする
            const lastStep = book.steps[book.steps.length - 1];
            const isTextStep = lastStep.type === 'sketch';

            if (isTextStep) {
                wrapper.style.width = `${baseSize}px`;
                wrapper.style.height = `${baseSize / 3}px`;
            } else {
                wrapper.style.width = `${baseSize}px`;
                wrapper.style.height = `${baseSize}px`;
            }

            initCanvas();
        }

        function initCanvas() {
            canvas = document.getElementById('drawing-canvas');
            ctx = canvas.getContext('2d', { desynchronized: true });
            const wrapper = canvas.parentNode;
            const dpr = window.devicePixelRatio || 1;
            const w = wrapper.clientWidth, h = wrapper.clientHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, w, h);

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { 
                    x: (clientX - rect.left) * (w / rect.width), 
                    y: (clientY - rect.top) * (h / rect.height) 
                };
            };
            const start = (e) => { isDrawing = true; const p = getPos(e); lastX = p.x; lastY = p.y; };
            const draw = (e) => {
                if (!isDrawing) return;
                const p = getPos(e);
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(p.x, p.y);
                if (currentTool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = 30;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = currentColor;
                    ctx.lineWidth = 6;
                }
                ctx.stroke();
                lastX = p.x; lastY = p.y;
            };
            canvas.onmousedown = start;
            canvas.onmousemove = draw;
            window.onmouseup = () => isDrawing = false;
            canvas.ontouchstart = (e) => { e.preventDefault(); start(e); };
            canvas.ontouchmove = (e) => { e.preventDefault(); draw(e); };
            canvas.ontouchend = () => isDrawing = false;
        }

        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tool-${t}`).classList.add('active');
        }
        function setStrokeColor(c) { 
            currentColor = c; 
            setTool('pen'); 
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`color-${c}`);
            if (activeBtn) activeBtn.classList.add('active');
        }
        function clearCanvas() { 
            if(ctx) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } 
        }

        function startTimer() {
            let t = 60;
            const el = document.getElementById('timer');
            el.innerText = t;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                t--;
                el.innerText = t;
                if(t <= 0) { clearInterval(timerInterval); submitStep(); }
            }, 1000);
        }

        function submitStep() {
            clearInterval(timerInterval);
            const lastStep = book.steps[book.steps.length - 1];
            const content = canvas.toDataURL('image/png');
            
            book.steps.push({ 
                type: lastStep.type === 'sketch' ? 'word_image' : 'sketch', 
                value: content, 
                author: players[currentPlayerIdx],
                originalIdx: book.steps.length
            });

            currentPlayerIdx++;
            if (currentPlayerIdx >= players.length) {
                document.querySelectorAll('.whiteboard-surface > div:not(#curtain)').forEach(d => d.classList.add('hidden'));
                document.getElementById('finish-screen').classList.remove('hidden');
            } else {
                showPassScreen();
            }
        }

        function triggerReviewSequence() {
            const curtain = document.getElementById('curtain');
            curtain.classList.add('curtain-closed');
            
            setTimeout(() => {
                startReview();
                curtain.classList.remove('curtain-closed');
            }, 1000);
        }

        function startReview() {
            document.querySelectorAll('.whiteboard-surface > div:not(#curtain)').forEach(d => d.classList.add('hidden'));
            document.getElementById('reveal-screen').classList.remove('hidden');
            reviewSteps = [...book.steps].reverse();
            const stage = document.getElementById('reveal-stage');
            stage.innerHTML = '';
            
            reviewSteps.forEach((step, i) => {
                const card = document.createElement('div');
                card.id = `reveal-card-${i}`;
                card.className = "reveal-card pos-hidden-left";
                let contentHtml = '';
                if (step.type === 'word') {
                    contentHtml = `<div class="text-4xl font-black text-center py-10 text-blue-600">${step.value}</div>`;
                } else {
                    contentHtml = `<img src="${step.value}" alt="step">`;
                }
                let label = step.author === "さいしょのおだい" ? 'START おだい' : `${step.originalIdx}人目：${step.author}`;
                card.innerHTML = `
                    <div class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-tighter">${label}</div>
                    <div class="bg-gray-50 rounded-lg overflow-hidden border">
                        ${contentHtml}
                    </div>
                `;
                stage.appendChild(card);
            });
            currentRevealIdx = 0;
            updateRevealDisplay();
        }

        function updateRevealDisplay() {
            const total = reviewSteps.length;
            const titleEl = document.getElementById('reveal-title');
            const btn = document.getElementById('next-reveal-btn');
            const counter = document.getElementById('reveal-counter');

            reviewSteps.forEach((_, i) => {
                const card = document.getElementById(`reveal-card-${i}`);
                if (!card) return;

                if (currentRevealIdx === 0) {
                    if (i === 0) card.className = "reveal-card pos-center-origin";
                    else card.className = "reveal-card pos-hidden-left";
                    titleEl.innerText = "最終的な結果は...";
                } else {
                    if (i === currentRevealIdx) {
                        card.className = "reveal-card pos-center";
                    } else if (i === currentRevealIdx - 1) {
                        card.className = "reveal-card pos-right";
                    } else if (i < currentRevealIdx - 1) {
                        card.className = "reveal-card pos-hidden-right";
                    } else {
                        card.className = "reveal-card pos-hidden-left";
                    }
                    const step = reviewSteps[currentRevealIdx];
                    titleEl.innerText = step.author === "さいしょのおだい" ? "最初のお題はこれだった！" : "その前は...";
                }
            });
            counter.innerText = `${currentRevealIdx + 1} / ${total}`;
            btn.innerText = (currentRevealIdx === total - 1) ? "結果を見る！" : "さかのぼる ←";
        }

        function handleRevealNext() {
            if (currentRevealIdx < reviewSteps.length - 1) {
                currentRevealIdx++;
                updateRevealDisplay();
            } else {
                showResultComparison();
            }
        }

        function showResultComparison() {
            const curtain = document.getElementById('curtain');
            curtain.classList.add('curtain-closed');
            setTimeout(() => {
                document.getElementById('reveal-screen').classList.add('hidden');
                document.getElementById('result-comparison-screen').classList.remove('hidden');
                document.getElementById('first-word-result').innerText = book.steps[0].value;
                const lastImageEl = document.getElementById('last-image-result');
                const lastStep = book.steps[book.steps.length - 1];
                if (lastStep.type === 'sketch' || lastStep.type === 'word_image') {
                    lastImageEl.src = lastStep.value;
                    lastImageEl.classList.remove('hidden');
                } else {
                    lastImageEl.classList.add('hidden');
                }
                setTimeout(() => {
                    curtain.classList.remove('curtain-closed');
                }, 300);
            }, 800);
        }

        function showSummary() {
            document.getElementById('summary-screen').classList.remove('hidden');
            const list = document.getElementById('summary-list');
            list.innerHTML = '';
            book.steps.forEach((step, index) => {
                const item = document.createElement('div');
                item.className = "bg-white p-5 rounded-2xl border shadow-sm flex flex-col w-full max-w-sm fade-in-up";
                item.style.animationDelay = `${index * 0.1}s`;
                let contentHtml = step.type === 'word' ? 
                    `<div class="text-3xl font-black text-center text-blue-600 my-6">${step.value}</div>` : 
                    `<img src="${step.value}" class="w-full h-auto rounded-xl border bg-gray-50 mt-2">`;
                let label = step.author === "さいしょのおだい" ? 'おだい' : `${step.originalIdx}人目：${step.author}`;
                let labelColor = step.author === "さいしょのおだい" ? 'text-blue-500' : 'text-gray-500';
                item.innerHTML = `<div class="text-xs font-black ${labelColor} mb-2 border-b pb-2 tracking-wider">${label}</div>${contentHtml}`;
                list.appendChild(item);
                if (index < book.steps.length - 1) {
                    const arrow = document.createElement('div');
                    arrow.className = "flex justify-center py-2 fade-in-up";
                    arrow.style.animationDelay = `${index * 0.1 + 0.05}s`;
                    arrow.innerHTML = `<div class="bg-gray-200 rounded-full w-10 h-10 flex items-center justify-center text-gray-500 font-bold shadow-inner">↓</div>`;
                    list.appendChild(arrow);
                }
            });
        }

        function resetGame() {
            document.querySelectorAll('.whiteboard-surface > div:not(#curtain)').forEach(d => d.classList.add('hidden'));
            document.getElementById('setup-screen').classList.remove('hidden');
        }
    </script>
