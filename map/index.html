    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');
        
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #f3f4f6;
            touch-action: manipulation;
            margin: 0;
            height: 100vh; /* フォールバック */
            height: 100dvh; /* スマホのアドレスバー対策 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center; /* 上下中央に配置 */
            padding: 10px; /* 画面端に少し余白を作って角丸を見せる */
            box-sizing: border-box;
        }

        .map-wrap {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.5rem;
        }

        .map-wrap svg {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.1));
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* ポップなボタン用クラス */
        .btn-pop {
            transition: transform 0.1s, border-bottom-width 0.1s;
        }
        .btn-pop:active {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* エフェクト用 */
        #effect-overlay {
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }
        #effect-overlay.show {
            opacity: 1;
            transform: scale(1);
            animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .effect-circle { color: #ef4444; font-size: 20vh; font-weight: 900; text-shadow: 0 0 20px white; line-height: 1; }
        .effect-cross { color: #3b82f6; font-size: 20vh; font-weight: 900; text-shadow: 0 0 20px white; line-height: 1; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-800">

<div id="app" class="w-full max-w-5xl h-full max-h-full bg-white relative flex flex-col shadow-2xl overflow-hidden rounded-xl border-2 border-gray-100">

        <p class="text-rose-500 font-bold text-lg">じゅんび中...</p>
    </div>

    <div id="screen-upload" class="hidden flex-1 flex flex-col justify-center items-center h-full p-4 text-center fade-in bg-rose-50">

            <h2 class="text-xl font-black text-rose-600 mb-2">地図をえらんでね！</h2>
            <p class="text-gray-600 font-bold text-sm mb-4">
                あそぶためには <code class="bg-gray-100 text-pink-500 px-1 py-0.5 rounded">map.svg</code> が必要です。
            </p>

            <button onclick="document.getElementById('svg-file-input').click()" class="btn-pop w-full bg-rose-500 hover:bg-rose-400 text-white border-b-[4px] border-rose-700 rounded-xl py-2 font-black text-lg shadow-sm">
                ファイルをつかう
            </button>
        </div>
    </div>

    <div id="screen-title" class="hidden flex-1 flex flex-col h-full p-2 md:p-4 fade-in overflow-y-auto bg-slate-50">

            <div class="text-center mt-2 mb-4 shrink-0">

                    都道府県マスター

                <p class="text-gray-500 font-bold text-sm md:text-base">10問正解するまで終わらない！速さと正確さでハイスコアを目指せ！</p>

                    <div class="text-xs font-bold bg-green-700/30 px-2 py-0.5 rounded-lg w-full">ハイスコア<br><span id="score-easy" class="text-base">0</span></div>
                </button>

                    <div class="text-orange-900 bg-white/40 text-[10px] md:text-xs px-2 py-0.5 rounded-full font-bold mb-1.5">6択 / 苦手ゆうせん</div>

                タイトルへもどる
            </button>
        </div>
    </div>

</div>

    { id: 45, name: "宮崎県", kana: "みやざきけん", short: "宮崎", skana: "みやざき", region: 8 },
    { id: 46, name: "鹿児島県", kana: "かごしまけん", short: "鹿児島", skana: "かごしま", region: 8 },
    { id: 47, name: "沖縄県", kana: "おきなわけん", short: "沖縄", skana: "おきなわ", region: 8 }
];

const LEVEL_COLORS = [
    '#ffffff', // 0: 白
    '#ffe4e6', // 1: うすい赤 (rose-100)
    '#fecdd3', // 2: (rose-200)
    '#fda4af', // 3: (rose-300)
    '#fb7185', // 4: (rose-400)
    '#e11d48', // 5: MAX赤 (rose-600)
    '#e11d48', // 6
    '#e11d48', // 7
    '#e11d48', // 8
    '#e11d48', // 9
    '#fbbf24'  // 10: 黄色に輝く (amber-400)
];

const TOTAL_QUESTIONS = 10; // ここでの数値は「クリアに必要な正解数」となります
let originalSvgText = "";
let gameState = {
    difficulty: 'easy',
    questions: [],
    currentIndex: 0,
    correctCount: 0,
    elapsedMs: 0,       
    elapsedSeconds: 0,  
    isPaused: false,    
    lastTickTime: 0,    
    timerInterval: null,
    missCount: 0,
    currentMisses: [],
    isProcessing: false
};

document.addEventListener('DOMContentLoaded', () => {
    loadMapSVG();
    
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkTextInput();
    });
});

async function loadMapSVG() {
    try {
        if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') {
            showScreen('upload');
            return;
        }

        const response = await fetch('./map.svg');
        if (!response.ok) throw new Error('Network response was not ok');
        const svgText = await response.text();
        setupSVG(svgText);
    } catch (error) {
        console.warn('ローカルファイルの自動取得をスキップしました。');
        showScreen('upload');
    }
}

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
        setupSVG(e.target.result);
    };
    reader.onerror = () => {
        alert("ファイルの読み込みに失敗しました。");
        showScreen('upload');
    };
    reader.readAsText(file);
}

function setupSVG(svgText) {
    try {
        originalSvgText = svgText;
        document.getElementById('game-map-container').innerHTML = svgText;
        document.getElementById('collection-map-container').innerHTML = svgText;

        const svg1 = document.getElementById('game-map-container').querySelector('svg');
        const svg2 = document.getElementById('collection-map-container').querySelector('svg');
        
        if (svg1 && svg2) {
            updateTitleHighScores();
            showScreen('title');
        } else {
            throw new Error('SVG format error');
        }
    } catch (error) {
        alert("無効なSVGファイルです。");
        showScreen('upload');
    }
}

function showScreen(screenId) {
    const screens = ['loading', 'upload', 'title', 'collection', 'game', 'result'];
    screens.forEach(s => {
        document.getElementById(`screen-${s}`).classList.add('hidden');
    });
    
    if (screenId === 'title') updateTitleHighScores();
    
    document.getElementById(`screen-${screenId}`).classList.remove('hidden');
}

function updateTitleHighScores() {
    const scores = JSON.parse(localStorage.getItem('mapGameHighScores') || '{"easy":0,"normal":0,"hard":0,"super":0}');
    document.getElementById('score-easy').textContent = scores.easy.toLocaleString();
    document.getElementById('score-normal').textContent = scores.normal.toLocaleString();
    document.getElementById('score-hard').textContent = scores.hard.toLocaleString();
    document.getElementById('score-super').textContent = scores.super.toLocaleString();
}

function showCollection() {
    renderCollectionMap();
    showScreen('collection');
}

function getPrefLevel(prefId) {
    const stats = JSON.parse(localStorage.getItem('mapGameStats') || '{}');
    if (!stats[prefId]) return 0;
    
    let level = 0;
    // 今回のアップデートからlevelプロパティを使用（過去データとの互換性を保つ）
    if (stats[prefId].level !== undefined) {
        level = stats[prefId].level;
    } else {
        level = Math.max(0, stats[prefId].correct - stats[prefId].miss);
    }
    
    return Math.max(0, Math.min(10, level));
}

function saveStats(prefId, isCorrect) {
    let stats = JSON.parse(localStorage.getItem('mapGameStats') || '{}');
    if (!stats[prefId]) stats[prefId] = { correct: 0, miss: 0, level: 0 };
    
    // 過去の保存データでlevelプロパティがない場合の初期化
    if (stats[prefId].level === undefined) {
        stats[prefId].level = Math.max(0, stats[prefId].correct - stats[prefId].miss);
    }

    if (isCorrect) {
        stats[prefId].correct++;
        stats[prefId].level++; // 正解でレベルアップ
    } else {
        stats[prefId].miss++;
        stats[prefId].level = Math.max(0, stats[prefId].level - 1); // 0未満にはならないようにする
    }
    localStorage.setItem('mapGameStats', JSON.stringify(stats));
}

function renderCollectionMap() {
    document.getElementById('collection-pref-info').textContent = '地図をタップ！';
    PREFECTURES.forEach(p => {
        const level = getPrefLevel(p.id);
        const color = LEVEL_COLORS[level];
        const elements = findSVGElements(p.id, 'collection-map-container');
        
        elements.forEach(el => {
            const applyStyleAndEvent = (target) => {
                target.style.fill = color;
                if (level >= 10) {
                    target.style.stroke = '#fef08a';
                    target.style.strokeWidth = '2';
                    target.style.filter = 'drop-shadow(0 0 4px rgba(251, 191, 36, 0.9))';
                    target.parentNode.appendChild(target); 
                } else {
                    target.style.stroke = '#94a3b8';
                    target.style.strokeWidth = '1';
                    target.style.filter = 'none';
                }

                target.style.cursor = 'pointer';
                target.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('collection-pref-info').textContent = `${p.name} (レベル: ${level})`;
                };
            };

            if (['path', 'polygon', 'rect', 'circle'].includes(el.tagName.toLowerCase())) {
                applyStyleAndEvent(el);
            }
            const children = el.querySelectorAll('path, polygon, rect, circle');
            children.forEach(child => applyStyleAndEvent(child));
        });
    });
}

function startGame(difficulty) {
    gameState = {
        difficulty: difficulty,
        questions: generateQuestionList(difficulty === 'normal' || difficulty === 'super'),
        currentIndex: 0,
        correctCount: 0,
        elapsedMs: 0,
        elapsedSeconds: 0,
        isPaused: false,
        lastTickTime: Date.now(),
        missCount: 0,
        currentMisses: [],
        isProcessing: false,
        timerInterval: null
    };

    document.getElementById('ui-q-count').textContent = '0'; // 正解数を表示
    document.getElementById('ui-miss-count').textContent = '0';
    document.getElementById('ui-timer').textContent = '00:00';
    
    if (difficulty === 'easy' || difficulty === 'normal') {
        const choicesDiv = document.getElementById('ui-choices');
        choicesDiv.classList.remove('hidden');
        document.getElementById('ui-typing').classList.add('hidden');
        choicesDiv.className = 'flex flex-col gap-2 w-full';
    } else {
        document.getElementById('ui-choices').classList.add('hidden');
        document.getElementById('ui-typing').classList.remove('hidden');
        document.getElementById('answer-input').value = '';
    }

    clearInterval(gameState.timerInterval);
    gameState.timerInterval = setInterval(updateTimer, 50); 

    showScreen('game');
    setNextQuestion();
}

function updateTimer() {
    const now = Date.now();
    const delta = now - gameState.lastTickTime;
    gameState.lastTickTime = now;

    if (gameState.isPaused) return; 
    
    gameState.elapsedMs += delta;
    const currentSeconds = Math.floor(gameState.elapsedMs / 1000);
    
    if (currentSeconds !== gameState.elapsedSeconds) {
        gameState.elapsedSeconds = currentSeconds;
        const m = String(Math.floor(gameState.elapsedSeconds / 60)).padStart(2, '0');
        const s = String(gameState.elapsedSeconds % 60).padStart(2, '0');
        document.getElementById('ui-timer').textContent = `${m}:${s}`;
    }
}

// 10問だけでなくすべての都道府県をリストにする（足りなくならないように）
function generateQuestionList(useMissData) {
    let pool = [...PREFECTURES].map(p => p.id);
    if (useMissData) {
        pool.sort((a, b) => {
            const statsA = JSON.parse(localStorage.getItem('mapGameStats') || '{}')[a] || {correct:0, miss:0};
            const statsB = JSON.parse(localStorage.getItem('mapGameStats') || '{}')[b] || {correct:0, miss:0};
            const rateA = statsA.correct / (statsA.correct + statsA.miss || 1);
            const rateB = statsB.correct / (statsB.correct + statsB.miss || 1);
            if (rateA === rateB) return Math.random() - 0.5;
            return rateA - rateB; 
        });
    } else {
        pool.sort(() => Math.random() - 0.5);
    }
    return pool;
}

function setNextQuestion() {
    // 10問正解したら終了
    if (gameState.correctCount >= TOTAL_QUESTIONS) {
        endGame();
        return;
    }

    // 問題プールが尽きたら再度シャッフルしてループさせる
    if (gameState.currentIndex >= gameState.questions.length) {
        gameState.currentIndex = 0;
        gameState.questions.sort(() => Math.random() - 0.5);
    }

    gameState.isProcessing = false;
    document.getElementById('ui-q-count').textContent = gameState.correctCount;
    
    const currentPrefId = gameState.questions[gameState.currentIndex];
    const targetPref = PREFECTURES.find(p => p.id === currentPrefId);

    highlightGameMap(currentPrefId);

    if (gameState.difficulty === 'easy' || gameState.difficulty === 'normal') {
        generateChoicesUI(targetPref);
    } else {
        const inputEl = document.getElementById('answer-input');
        inputEl.value = '';
        inputEl.focus();
    }
}

function generateChoicesUI(targetPref) {
    const container = document.getElementById('ui-choices');
    container.innerHTML = '';
    
    const choiceCount = gameState.difficulty === 'normal' ? 6 : 4;
    let choices = [targetPref];
    let pool = [...PREFECTURES].filter(p => p.id !== targetPref.id);
    
    if (gameState.difficulty === 'normal') {
        const sameRegion = pool.filter(p => p.region === targetPref.region);
        sameRegion.sort(() => Math.random() - 0.5);
        pool.sort(() => Math.random() - 0.5);
        
        const dummyCandidates = [...sameRegion, ...pool];
        for (let p of dummyCandidates) {
            if (!choices.find(c => c.id === p.id)) choices.push(p);
            if (choices.length === choiceCount) break;
        }
    } else {
        pool.sort(() => Math.random() - 0.5);
        choices = choices.concat(pool.slice(0, choiceCount - 1));
    }

    choices.sort(() => Math.random() - 0.5);

    choices.forEach(p => {
        const btn = document.createElement('button');
        
        if (gameState.difficulty === 'normal') {
            btn.className = 'btn-pop w-full bg-white hover:bg-rose-50 text-gray-800 font-black py-2 px-3 rounded-xl border-2 border-b-[4px] border-gray-200 active:bg-rose-100 text-lg md:text-xl leading-tight shadow-sm text-center';
        } else {
            btn.className = 'btn-pop w-full bg-white hover:bg-rose-50 text-gray-800 font-black py-3 px-4 rounded-xl border-2 border-b-[4px] border-gray-200 active:bg-rose-100 text-xl md:text-2xl leading-tight shadow-sm text-center';
        }
        
        btn.textContent = p.name;
        btn.onclick = () => checkChoiceAnswer(p.id, targetPref.id);
        container.appendChild(btn);
    });
}

function checkChoiceAnswer(selectedId, correctId) {
    if (gameState.isProcessing) return;
    processAnswer(selectedId === correctId, correctId);
}

function checkTextInput() {
    if (gameState.isProcessing) return;
    
    const inputEl = document.getElementById('answer-input');
    const rawInput = inputEl.value;
    if (!rawInput.trim()) return;

    const correctId = gameState.questions[gameState.currentIndex];
    const targetPref = PREFECTURES.find(p => p.id === correctId);

    let input = rawInput.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    input = input.replace(/[\s　]/g, '');
    input = input.replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60));

    const validAnswers = [
        targetPref.name, targetPref.short, targetPref.kana, targetPref.skana
    ].map(s => s.replace(/[\u30a1-\u30f6]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60)));

    const isCorrect = validAnswers.includes(input);
    if (!isCorrect) inputEl.value = '';
    
    processAnswer(isCorrect, correctId);
}

function processAnswer(isCorrect, targetId) {
    gameState.isProcessing = true;
    saveStats(targetId, isCorrect);
    
    if (isCorrect) {
        showEffect('circle', 500);
        gameState.correctCount++; // 正解したらカウントアップ
        setTimeout(() => {
            gameState.currentIndex++; 
            setNextQuestion();
        }, 500);
    } else {
        const targetPref = PREFECTURES.find(p => p.id === targetId);
        showEffect('cross', 1500, `正解は「${targetPref.name}」`); 
        
        gameState.missCount++;
        document.getElementById('ui-miss-count').textContent = gameState.missCount;
        
        if (!gameState.currentMisses.includes(targetId)) {
            gameState.currentMisses.push(targetId);
        }
        
        gameState.isPaused = true; 
        
        setTimeout(() => {
            gameState.isPaused = false;
            // 不正解でも次の新しい問題へ進む（正解カウントは増えない）
            gameState.currentIndex++; 
            setNextQuestion();
        }, 1500);
    }
}

function endGame() {
    clearInterval(gameState.timerInterval);
    document.getElementById('ui-q-count').textContent = gameState.correctCount;
    
    let multiplier = 1;
    let diffName = "かんたん";
    if(gameState.difficulty === 'normal') { multiplier = 1.5; diffName = "ふつう"; }
    if(gameState.difficulty === 'hard') { multiplier = 2.0; diffName = "むずかしい"; }
    if(gameState.difficulty === 'super') { multiplier = 3.0; diffName = "げきむず"; }

    // 早ければ早いほど点数がぐんと高くなる（反比例）
    let timeScore = Math.floor(1000000 / (gameState.elapsedSeconds + 5)); 
    // 正解率の計算
    let accuracyRate = TOTAL_QUESTIONS / (TOTAL_QUESTIONS + gameState.missCount); 
    
    // スコア算出（正解率を2乗して掛けることで、ミスが多いと大きくスコアが下がる）
    let score = Math.floor(timeScore * Math.pow(accuracyRate, 2) * multiplier);
    if (score < 0) score = 0;

    let isNewRecord = false;
    const scores = JSON.parse(localStorage.getItem('mapGameHighScores') || '{"easy":0,"normal":0,"hard":0,"super":0}');
    if (score > scores[gameState.difficulty]) {
        scores[gameState.difficulty] = score;
        localStorage.setItem('mapGameHighScores', JSON.stringify(scores));
        isNewRecord = true;
    }

    const accuracyPercent = Math.floor(accuracyRate * 100);

    document.getElementById('result-difficulty').textContent = `難易度: ${diffName}`;
    document.getElementById('result-score').textContent = score.toLocaleString();
    
    if (isNewRecord && score > 0) {
        document.getElementById('new-record-badge').classList.remove('hidden');
    } else {
        document.getElementById('new-record-badge').classList.add('hidden');
    }
    
    const m = String(Math.floor(gameState.elapsedSeconds / 60)).padStart(2, '0');
    const s = String(gameState.elapsedSeconds % 60).padStart(2, '0');
    document.getElementById('result-time').textContent = `${m}:${s}`;
    document.getElementById('result-accuracy').textContent = `${accuracyPercent}%`;

    const missArea = document.getElementById('result-miss-area');
    const missList = document.getElementById('result-miss-list');
    missList.innerHTML = '';
    
    if (gameState.currentMisses.length > 0) {
        missArea.classList.remove('hidden');
        gameState.currentMisses.forEach(id => {
            const p = PREFECTURES.find(pref => pref.id === id);
            const span = document.createElement('span');
            span.className = 'bg-white border border-red-200 text-red-600 px-2 py-0.5 rounded-full text-[10px] font-bold shadow-sm';
            span.textContent = p.name;
            missList.appendChild(span);
        });
    } else {
        missArea.classList.add('hidden');
    }

    showScreen('result');
}

function showEffect(type, duration = 400, message = '') {
    const overlay = document.getElementById('effect-overlay');
    const icon = document.getElementById('effect-icon');
    const msgEl = document.getElementById('effect-message');
    
    if (type === 'circle') {
        icon.className = 'effect-circle';
        icon.textContent = '〇';
        overlay.classList.remove('bg-white/70', 'backdrop-blur-sm');
    } else {
        icon.className = 'effect-cross';
        icon.textContent = '×';
        overlay.classList.add('bg-white/70', 'backdrop-blur-sm');
    }
    
    if (message) {
        msgEl.textContent = message;
        msgEl.classList.remove('hidden');
    } else {
        msgEl.classList.add('hidden');
    }
    
    overlay.classList.add('show');
    
    setTimeout(() => {
        overlay.classList.remove('show');
        overlay.classList.remove('bg-white/70', 'backdrop-blur-sm');
    }, duration);
}

function highlightGameMap(prefId) {
    const container = document.getElementById('game-map-container');
    const paths = container.querySelectorAll('path, polygon, rect, circle');
    paths.forEach(p => {
        p.style.fill = '#ffffff';
        p.style.stroke = '#94a3b8';
        p.style.strokeWidth = '1';
        p.style.transition = 'fill 0.2s ease';
    });

    const elements = findSVGElements(prefId, 'game-map-container');
    elements.forEach(el => {
        if (['path', 'polygon', 'rect', 'circle'].includes(el.tagName.toLowerCase())) {
            el.style.fill = '#ef4444'; 
        }
        const children = el.querySelectorAll('path, polygon, rect, circle');
        children.forEach(child => {
            child.style.fill = '#ef4444';
        });
    });
}

function findSVGElements(prefId, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return [];
    const svg = container.querySelector('svg');
    if (!svg) return [];

    const idStr = prefId.toString();
    const idStr2 = idStr.padStart(2, '0');
    const prefData = PREFECTURES.find(p => p.id === prefId);
    const results = [];

    const selectors = [
        `#JP-${idStr2}`, `#jp-${idStr2}`, `#JP-${idStr}`,
        `#pref${idStr}`, `#pref${idStr2}`, `#pref-${idStr2}`,
        `#item${idStr}`, `#item${idStr2}`,
        `[id="${idStr}"]`, `[id="${idStr2}"]`,
        `[data-code="${idStr}"]`, `[data-code="${idStr2}"]`,
        `[data-id="${idStr}"]`, `[data-id="${idStr2}"]`,
        `.pref${idStr}`, `.pref${idStr2}`, `.pref-${idStr2}`
    ];

    for (let sel of selectors) {
        try {
            const els = svg.querySelectorAll(sel);
            if (els.length > 0) {
                els.forEach(e => results.push(e));
                return results;
            }
        } catch(e) {}
    }

    const ROMAJI_MAP = {
        1:"hokkaido", 2:"aomori", 3:"iwate", 4:"miyagi", 5:"akita", 6:"yamagata", 7:"fukushima",
        8:"ibaraki", 9:"tochigi", 10:"gunma", 11:"saitama", 12:"chiba", 13:"tokyo", 14:"kanagawa",
        15:"niigata", 16:"toyama", 17:"ishikawa", 18:"fukui", 19:"yamanashi", 20:"nagano", 21:"gifu",
        22:"shizuoka", 23:"aichi", 24:"mie", 25:"shiga", 26:"kyoto", 27:"osaka", 28:"hyogo", 29:"nara", 30:"wakayama",
        31:"tottori", 32:"shimane", 33:"okayama", 34:"hiroshima", 35:"yamaguchi", 36:"tokushima", 37:"kagawa", 38:"ehime", 39:"kochi",
        40:"fukuoka", 41:"saga", 42:"nagasaki", 43:"kumamoto", 44:"oita", 45:"miyazaki", 46:"kagoshima", 47:"okinawa"
    };
    const romaji = ROMAJI_MAP[prefId];
    if (romaji) {
        const UpperRomaji = romaji.charAt(0).toUpperCase() + romaji.slice(1);
        try {
            const els = svg.querySelectorAll(`[id="${romaji}"], [id="${UpperRomaji}"]`);
            if (els.length > 0) {
                els.forEach(e => results.push(e));
                return results;
            }
        } catch(e) {}
    }

    if (prefData) {
        const names = [prefData.name, prefData.short];
        const allNodes = svg.querySelectorAll('g, path, polygon');
        for (let el of allNodes) {
            const title = el.getAttribute('title') || '';
            const dataName = el.getAttribute('data-name') || '';
            const nameAttr = el.getAttribute('name') || '';
            
            if (names.includes(title) || names.includes(dataName) || names.includes(nameAttr)) {
                results.push(el);
            }
        }
        if (results.length > 0) return results;
    }

    const paths = Array.from(svg.querySelectorAll('svg > path, svg > polygon'));
    if (paths.length === 47 && (prefId - 1) < paths.length) return [paths[prefId - 1]];
    
    const groups = Array.from(svg.querySelectorAll('svg > g'));
    if (groups.length >= 47 && (prefId - 1) < groups.length) return [groups[prefId - 1]];

    return [];
}
